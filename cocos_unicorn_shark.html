<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocos2d-js Unicorn Rescue & Shark Boss</title>
    <!-- Load Cocos2d-html5 v3.14 via CDN (older standalone version before Cocos Creator bundled exports) -->
    <script src="https://cdn.jsdelivr.net/npm/cocos2d-html5@3.14.0/lib/cocos2d-js-v3.14-lite.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121220;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #E040FB;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            position: absolute;
            top: 0;
            z-index: 10;
        }
        #gameCanvas {
            margin-top: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 4px solid #9C27B0;
            border-radius: 10px;
            background-color: #81D4FA; /* Sky blue */
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            color: white;
        }
        #overlay h2 {
            font-size: 64px;
            color: #FF5252;
            margin: 0 0 20px 0;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #E040FB;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9C27B0;
        }
        button:active {
            box-shadow: 0 2px 0 #9C27B0;
            transform: translateY(4px);
        }
        .controls {
            margin-top: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>🦄 Rescue & Shark Boss (Cocos) 🦈</h1>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="controls">
        <strong>Rescue Phase:</strong> ⬅️ ➡️ to Move | <strong>UP Arrow</strong> to Jump<br>
        <strong>Boss Phase:</strong> ⬅️ ➡️ to Move | <strong>Spacebar</strong> to Shoot
    </div>

    <div id="overlay">
        <h2>Game Over!</h2>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // Note: Modern Cocos Creator compiles massive JSON-based WebGL bundles.
        // For a single-file raw HTML implementation, we use the core cocos2d-js API.

        window.onload = function(){
            cc.game.onStart = function(){
                // Setup Resolution
                cc.view.setDesignResolutionSize(800, 600, cc.ResolutionPolicy.SHOW_ALL);
                cc.view.resizeWithBrowserSize(true);

                // Define Game Scene
                var GameLayer = cc.Layer.extend({
                    // Game State
                    score: 0,
                    phase: 'rescue',
                    targetBossScore: 200,
                    gameOver: false,

                    player: null,
                    shark: null,
                    bossHpBar: null,
                    bossHpBg: null,
                    scoreText: null,
                    phaseText: null,
                    centerMsg: null,

                    unicorns: [],
                    bullets: [],

                    sharkData: { hp: 10, maxHp: 10, speed: 150, dir: 1, state: 'swimming', vy: 0 },
                    playerState: { vy: 0, isJumping: false, speed: 300 },

                    keys: {},
                    lastFired: 0,
                    pondY: 120, // Cocos y=0 is BOTTOM

                    ctor: function () {
                        this._super();

                        // 1. Water Background
                        var water = new cc.DrawNode();
                        water.drawRect(cc.p(0, 0), cc.p(800, this.pondY + 20), cc.color(2, 136, 209, 150), 0, cc.color(0,0,0,0));
                        this.addChild(water, 5);

                        // 2. Player
                        this.player = new cc.LabelTTF("🐰", "Arial", 45);
                        this.player.setPosition(400, this.pondY + 20);
                        this.addChild(this.player, 10);

                        // 3. Shark Boss
                        this.shark = new cc.LabelTTF("🦈", "Arial", 70);
                        this.shark.setPosition(400, 70);
                        this.shark.setVisible(false);
                        this.addChild(this.shark, 6);

                        // 4. UI Elements
                        this.scoreText = new cc.LabelTTF("Score: 0", "Arial", 28);
                        this.scoreText.setFontFillColor(cc.color(26, 35, 126));
                        this.scoreText.setPosition(80, 570);
                        this.addChild(this.scoreText, 20);

                        this.phaseText = new cc.LabelTTF("Phase: Rescue", "Arial", 24);
                        this.phaseText.setFontFillColor(cc.color(26, 35, 126));
                        this.phaseText.setPosition(700, 570);
                        this.addChild(this.phaseText, 20);

                        this.centerMsg = new cc.LabelTTF("", "Arial", 50);
                        this.centerMsg.setFontFillColor(cc.color(244, 67, 54));
                        this.centerMsg.setPosition(400, 300);
                        this.centerMsg.setVisible(false);
                        this.addChild(this.centerMsg, 20);

                        // Boss HP
                        this.bossHpBg = new cc.DrawNode();
                        this.bossHpBg.drawRect(cc.p(200, 530), cc.p(600, 550), cc.color(51, 51, 51), 2, cc.color(255, 255, 255));
                        this.bossHpBg.setVisible(false);
                        this.addChild(this.bossHpBg, 20);

                        this.bossHpBar = new cc.DrawNode();
                        this.bossHpBar.setVisible(false);
                        this.addChild(this.bossHpBar, 21);

                        // 5. Input Listeners
                        var self = this;
                        cc.eventManager.addListener({
                            event: cc.EventListener.KEYBOARD,
                            onKeyPressed: function(keyCode, event){
                                self.keys[keyCode] = true;

                                // UP arrow (cc.KEY.up is 38)
                                if(keyCode === 38 && self.phase === 'rescue' && !self.playerState.isJumping) {
                                    self.playerState.vy = 500; // Jump Power
                                    self.playerState.isJumping = true;
                                }
                            },
                            onKeyReleased: function(keyCode, event){
                                self.keys[keyCode] = false;
                            }
                        }, this);

                        // Start Update Loop
                        this.scheduleUpdate();

                        // Unicorn Spawner
                        this.schedule(this.spawnUnicorn, 1.0);

                        return true;
                    },

                    updateHpBar: function() {
                        this.bossHpBar.clear();
                        if (this.phase !== 'boss') return;
                        var fillWidth = 400 * (this.sharkData.hp / this.sharkData.maxHp);
                        this.bossHpBar.drawRect(cc.p(200, 530), cc.p(200 + fillWidth, 550), cc.color(244, 67, 54), 0, cc.color(0,0,0,0));
                    },

                    spawnUnicorn: function() {
                        if (this.phase !== 'rescue' || this.gameOver) return;
                        var x = 50 + Math.random() * 700;
                        var u = new cc.LabelTTF("🦄", "Arial", 40);
                        u.setPosition(x, 650);
                        this.addChild(u, 8);
                        this.unicorns.push({
                            sprite: u,
                            speed: 150 + Math.random() * 100
                        });
                    },

                    checkCollision: function(obj1, obj2, dist) {
                        var p1 = obj1.getPosition();
                        var p2 = obj2.getPosition();
                        var dx = p1.x - p2.x;
                        var dy = p1.y - p2.y;
                        return Math.sqrt(dx*dx + dy*dy) < dist;
                    },

                    triggerBoss: function() {
                        this.phase = 'boss';
                        this.phaseText.setString('Phase: BOSS FIGHT!');
                        this.phaseText.setFontFillColor(cc.color(244, 67, 54));

                        for(var i=0; i<this.unicorns.length; i++) {
                            this.removeChild(this.unicorns[i].sprite);
                        }
                        this.unicorns = [];

                        // Player to sky
                        this.player.setPositionY(500);
                        this.player.setString("🦄🐰🔫");
                        this.player.setScaleX(1);

                        // Setup Boss
                        this.sharkData.hp = 10 + (this.targetBossScore/200) * 5;
                        this.sharkData.maxHp = this.sharkData.hp;
                        this.sharkData.speed = 150 + (this.targetBossScore/200) * 50;
                        this.shark.setPosition(400, 70);
                        this.shark.setVisible(true);
                        this.sharkData.state = 'swimming';
                        this.sharkData.dir = 1;

                        this.bossHpBg.setVisible(true);
                        this.bossHpBar.setVisible(true);
                        this.updateHpBar();

                        this.centerMsg.setString("SHARK ATTACK!");
                        this.centerMsg.setVisible(true);
                        var self = this;
                        setTimeout(function(){ self.centerMsg.setVisible(false); }, 2000);
                    },

                    defeatBoss: function() {
                        this.score += 50;
                        this.targetBossScore += 200;
                        this.scoreText.setString('Score: ' + this.score);

                        this.phase = 'rescue';
                        this.phaseText.setString('Phase: Rescue');
                        this.phaseText.setFontFillColor(cc.color(26, 35, 126));

                        this.player.setPositionY(this.pondY + 20);
                        this.player.setString("🐰");

                        this.shark.setVisible(false);
                        this.bossHpBg.setVisible(false);
                        this.bossHpBar.setVisible(false);

                        for(var i=0; i<this.bullets.length; i++) {
                            this.removeChild(this.bullets[i]);
                        }
                        this.bullets = [];

                        this.centerMsg.setString("BOSS DEFEATED!");
                        this.centerMsg.setVisible(true);
                        var self = this;
                        setTimeout(function(){ self.centerMsg.setVisible(false); }, 2000);
                    },

                    update: function (dt) {
                        if (this.gameOver) return;

                        var pPos = this.player.getPosition();

                        // Movement (cc.KEY.left is 37, right is 39)
                        if (this.keys[37]) {
                            this.player.setPositionX(pPos.x - this.playerState.speed * dt);
                            if(this.phase === 'rescue') this.player.setScaleX(-1);
                        }
                        if (this.keys[39]) {
                            this.player.setPositionX(pPos.x + this.playerState.speed * dt);
                            if(this.phase === 'rescue') this.player.setScaleX(1);
                        }

                        // Bounds
                        if (this.player.getPositionX() < 30) this.player.setPositionX(30);
                        if (this.player.getPositionX() > 770) this.player.setPositionX(770);

                        if (this.phase === 'rescue') {
                            // Jump
                            if (this.playerState.isJumping) {
                                this.playerState.vy -= 900 * dt; // Gravity
                                this.player.setPositionY(this.player.getPositionY() + this.playerState.vy * dt);

                                if (this.player.getPositionY() <= this.pondY + 20) {
                                    this.player.setPositionY(this.pondY + 20);
                                    this.playerState.isJumping = false;
                                    this.playerState.vy = 0;
                                }
                            }

                            // Update Unicorns
                            for (var i = this.unicorns.length - 1; i >= 0; i--) {
                                var u = this.unicorns[i];
                                u.sprite.setPositionY(u.sprite.getPositionY() - u.speed * dt);
                                u.sprite.setRotation(u.sprite.getRotation() + 90 * dt);

                                if (this.checkCollision(this.player, u.sprite, 45)) {
                                    // Catch
                                    this.removeChild(u.sprite);
                                    this.unicorns.splice(i, 1);
                                    this.score += 20;
                                    this.scoreText.setString('Score: ' + this.score);
                                    if (this.score >= this.targetBossScore) this.triggerBoss();
                                    continue;
                                }

                                if (u.sprite.getPositionY() < -50) {
                                    this.removeChild(u.sprite);
                                    this.unicorns.splice(i, 1);
                                }
                            }
                        } 
                        else if (this.phase === 'boss') {
                            this.player.setPositionY(500); // lock y

                            // Shooting (cc.KEY.space is 32)
                            if (this.keys[32]) {
                                var now = Date.now();
                                if (now - this.lastFired > 250) {
                                    this.lastFired = now;
                                    var b = new cc.DrawNode();
                                    b.drawDot(cc.p(0,0), 6, cc.color(255, 235, 59));
                                    b.setPosition(this.player.getPositionX() + 20, this.player.getPositionY() - 20);
                                    this.addChild(b, 8);
                                    this.bullets.push(b);
                                }
                            }

                            // Update Bullets
                            for (var i = this.bullets.length - 1; i >= 0; i--) {
                                var b = this.bullets[i];
                                b.setPositionY(b.getPositionY() - 500 * dt);

                                if (this.checkCollision(b, this.shark, 45)) {
                                    this.removeChild(b);
                                    this.bullets.splice(i, 1);

                                    this.shark.setColor(cc.color(255, 0, 0));
                                    var s = this.shark;
                                    setTimeout(function(){ s.setColor(cc.color(255, 255, 255)); }, 100);

                                    this.sharkData.hp--;
                                    this.updateHpBar();

                                    if (this.sharkData.hp <= 0) this.defeatBoss();
                                    continue;
                                }

                                if (b.getPositionY() < -10) {
                                    this.removeChild(b);
                                    this.bullets.splice(i, 1);
                                }
                            }

                            // Update Boss
                            if (this.sharkData.state === 'swimming') {
                                this.shark.setPositionX(this.shark.getPositionX() + this.sharkData.speed * this.sharkData.dir * dt);
                                this.shark.setScaleX(-this.sharkData.dir);

                                if (this.shark.getPositionX() > 750) this.sharkData.dir = -1;
                                if (this.shark.getPositionX() < 50) this.sharkData.dir = 1;

                                if (Math.random() < 0.01) {
                                    this.sharkData.state = 'jumping';
                                    this.sharkData.vy = 600; // Jump power (Cocos Y is up)
                                }
                            } else if (this.sharkData.state === 'jumping') {
                                this.sharkData.vy -= 900 * dt; // Gravity
                                this.shark.setPositionY(this.shark.getPositionY() + this.sharkData.vy * dt);

                                if (this.shark.getPositionY() <= 70 && this.sharkData.vy < 0) {
                                    this.shark.setPositionY(70);
                                    this.sharkData.state = 'swimming';
                                    this.sharkData.dir = Math.random() > 0.5 ? 1 : -1;
                                }
                            }

                            // Eaten Check
                            if (this.checkCollision(this.player, this.shark, 50)) {
                                this.gameOver = true;
                                this.player.setColor(cc.color(255, 0, 0));
                                document.getElementById('overlay').style.display = 'flex';
                            }
                        }
                    }
                });

                var MyScene = cc.Scene.extend({
                    onEnter:function () {
                        this._super();
                        var layer = new GameLayer();
                        this.addChild(layer);
                    }
                });

                cc.director.runScene(new MyScene());
            };

            // Run game
            cc.game.run("gameCanvas");
        };
    </script>
</body>
</html>
