<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masha and the Bear: Pond Rescue</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #4CAF50; /* Grass green */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            color: white;
            touch-action: none;
        }
        h1 {
            margin: 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 26px;
            text-align: center;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            border: 6px solid #8D6E63;
            background-color: #81C784;
            width: 95%;
            max-width: 800px;
            aspect-ratio: 800 / 550;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #message-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        #message-overlay h2 {
            font-size: 32px;
            color: #FFEB3B;
            margin: 0 0 15px 0;
            text-shadow: 2px 2px 4px #000;
            padding: 0 20px;
        }
        #message-overlay p {
            font-size: 18px;
            margin: 0 0 20px 0;
            color: white;
            padding: 0 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 20px;
            font-family: inherit;
            background-color: #FF9800;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 0 #E65100;
            transition: all 0.1s;
            touch-action: manipulation;
        }
        button:active {
            box-shadow: 0 0 0 #E65100;
            transform: translateY(4px);
        }
        .controls {
            margin-top: 5px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 15px;
            font-size: 14px;
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        #joystick-container {
            width: 150px;
            height: 150px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 5;
        }

        #joystick-knob {
            width: 60px;
            height: 60px;
            background: rgba(255, 152, 0, 0.8);
            border-radius: 50%;
            border: 3px solid #FFF;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            position: absolute;
            pointer-events: none;
        }

        @media screen and (min-width: 768px) {
            h1 { font-size: 32px; margin: 10px 0;}
            #message-overlay h2 { font-size: 40px; }
            #message-overlay p { font-size: 24px; margin: 0 0 30px 0;}
            .controls { font-size: 16px; padding: 10px 20px; margin-top: 10px;}
            #joystick-container { display: none; }
        }

        @media screen and (max-height: 600px) {
            h1 { display: none; }
            .controls { display: none; }
            #joystick-container {
                width: 120px;
                height: 120px;
                bottom: 10px;
            }
            #joystick-knob {
                width: 50px;
                height: 50px;
            }
        }
    
    </style>
</head>
<body>

    <h1>🐻 Run from Masha! 👧</h1>

    <div style="position: relative; width: 100%; max-width: 800px; display: flex; justify-content: center; align-items: center;">
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="550"></canvas>
            <div id="message-overlay">
                <h2 id="end-title">Game Over!</h2>
                <p id="end-desc">Masha caught you!</p>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>

        <div id="joystick-container">
            <div id="joystick-knob"></div>
        </div>
    </div>

    <div class="controls">
        <strong>Controls:</strong> Use Arrow Keys (⬆️⬇️⬅️➡️) or the on-screen Joystick to move the Bear.<br>
        Avoid Masha! Don't fall into the blue pond!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('message-overlay');
        const endTitle = document.getElementById('end-title');
        const endDesc = document.getElementById('end-desc');

        // Game State
        let gameState = 'playing'; // playing, caught, pond_event
        let timer = 0;
        let pondTimer = 0;

        // Inputs
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };

        let joyVector = { x: 0, y: 0 };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
                e.preventDefault();
            }
        });

        // Joystick logic
        const joyZone = document.getElementById('joystick-container');
        const joyKnob = document.getElementById('joystick-knob');
        let joyActive = false;
        let joyCenter = { x: 0, y: 0 };
        const joyMaxRadius = 45; // Max drag distance

        function handleJoyStart(e) {
            e.preventDefault();
            joyActive = true;
            const rect = joyZone.getBoundingClientRect();
            joyCenter = {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
            handleJoyMove(e);
        }

        function handleJoyMove(e) {
            if (!joyActive) return;
            e.preventDefault();

            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            let dx = clientX - joyCenter.x;
            let dy = clientY - joyCenter.y;
            let dist = Math.hypot(dx, dy);

            // Cap the visual drag to the radius
            if (dist > joyMaxRadius) {
                dx = (dx / dist) * joyMaxRadius;
                dy = (dy / dist) * joyMaxRadius;
            }

            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;

            // Normalize vector for game logic (between -1 and 1)
            joyVector.x = dx / joyMaxRadius;
            joyVector.y = dy / joyMaxRadius;
        }

        function handleJoyEnd(e) {
            e.preventDefault();
            joyActive = false;
            joyKnob.style.transform = `translate(0px, 0px)`;
            joyVector = { x: 0, y: 0 };
        }

        joyZone.addEventListener('touchstart', handleJoyStart, {passive: false});
        joyZone.addEventListener('touchmove', handleJoyMove, {passive: false});
        joyZone.addEventListener('touchend', handleJoyEnd);
        joyZone.addEventListener('mousedown', handleJoyStart);
        window.addEventListener('mousemove', handleJoyMove);
        window.addEventListener('mouseup', handleJoyEnd);

        // Entities
        const pond = {
            x: 400,
            y: 275,
            radiusX: 180,
            radiusY: 120
        };

        const bear = {
            x: 100, y: 100, size: 40, speed: 4.5, emoji: '🐻'
        };

        const masha = {
            x: 700, y: 450, size: 30, speed: 2.5, emoji: '👧🏼'
        };

        const shark = {
            x: pond.x, y: pond.y, size: 50, speed: 2, active: false, emoji: '🦈'
        };

        function drawPond() {
            ctx.fillStyle = '#29B6F6'; // Water blue
            ctx.beginPath();
            ctx.ellipse(pond.x, pond.y, pond.radiusX, pond.radiusY, 0, 0, Math.PI * 2);
            ctx.fill();

            // Pond border / ripple
            ctx.strokeStyle = '#039BE5';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.beginPath();
            ctx.ellipse(pond.x, pond.y, pond.radiusX - 20, pond.radiusY - 15, 0, 0, Math.PI * 2);
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawEntity(entity) {
            ctx.font = entity.size + 'px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(entity.emoji, entity.x, entity.y);
        }

        function isPointInPond(x, y) {
            const dx = x - pond.x;
            const dy = y - pond.y;
            const value = (dx * dx) / (pond.radiusX * pond.radiusX) + (dy * dy) / (pond.radiusY * pond.radiusY);
            return value <= 0.8; 
        }

        function getDistance(x1, y1, x2, y2) {
            return Math.hypot(x2 - x1, y2 - y1);
        }

        function update() {
            if (gameState === 'playing') {
                // Move Bear via Keyboard
                if (keys.ArrowUp) bear.y -= bear.speed;
                if (keys.ArrowDown) bear.y += bear.speed;
                if (keys.ArrowLeft) bear.x -= bear.speed;
                if (keys.ArrowRight) bear.x += bear.speed;

                // Move Bear via Joystick
                if (joyActive) {
                    bear.x += joyVector.x * bear.speed;
                    bear.y += joyVector.y * bear.speed;
                }

                // Keep Bear in bounds
                bear.x = Math.max(20, Math.min(canvas.width - 20, bear.x));
                bear.y = Math.max(20, Math.min(canvas.height - 20, bear.y));

                // Move Masha towards Bear
                const dx = bear.x - masha.x;
                const dy = bear.y - masha.y;
                const dist = getDistance(bear.x, bear.y, masha.x, masha.y);

                if (dist > 0) {
                    masha.x += (dx / dist) * masha.speed;
                    masha.y += (dy / dist) * masha.speed;
                }

                // Check collision with Masha
                if (dist < 35) {
                    gameState = 'caught';
                    endTitle.innerText = "Oh no! Masha caught you!";
                    endTitle.style.color = "#FF9800";
                    endDesc.innerText = "You survived for " + Math.floor(timer/60) + " seconds.";
                    overlay.style.display = 'flex';
                }

                // Check collision with Pond
                if (isPointInPond(bear.x, bear.y)) {
                    gameState = 'pond_event';
                    shark.active = true;
                    // Position shark at the opposite side of the pond from the bear
                    shark.x = pond.x + (pond.x - bear.x)*0.5;
                    shark.y = pond.y + (pond.y - bear.y)*0.5;
                }

                timer++;
            } 
            else if (gameState === 'pond_event') {
                pondTimer++;

                bear.x += (pond.x - bear.x) * 0.02;
                bear.y += (pond.y - bear.y) * 0.02;

                const sdx = bear.x - shark.x;
                const sdy = bear.y - shark.y;
                const sdist = getDistance(bear.x, bear.y, shark.x, shark.y);
                if (sdist > 20) {
                    shark.x += (sdx / sdist) * shark.speed;
                    shark.y += (sdy / sdist) * shark.speed;
                }

                const mdx = bear.x - masha.x;
                const mdy = bear.y - masha.y;
                const mdist = getDistance(bear.x, bear.y, masha.x, masha.y);

                if (mdist > 80) { 
                    masha.x += (mdx / mdist) * (masha.speed * 1.5);
                    masha.y += (mdy / mdist) * (masha.speed * 1.5);
                }

                if (pondTimer > 150) {
                    gameState = 'rescued';
                    endTitle.innerText = "Shark Attack!";
                    endTitle.style.color = "#F44336";
                    endDesc.innerText = "You fell in the pond! A giant shark attacked, but Masha pulled you out just in time!";
                    overlay.style.display = 'flex';
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw decorative grass dots
            ctx.fillStyle = '#66BB6A';
            for(let i=0; i<30; i++) {
                let gx = (Math.sin(i*123) * 0.5 + 0.5) * canvas.width;
                let gy = (Math.cos(i*321) * 0.5 + 0.5) * canvas.height;
                ctx.beginPath();
                ctx.arc(gx, gy, 4, 0, Math.PI*2);
                ctx.fill();
            }

            drawPond();

            if (shark.active) drawEntity(shark);

            if (gameState === 'pond_event') {
                ctx.globalAlpha = 0.7;
            }
            drawEntity(bear);
            ctx.globalAlpha = 1.0;

            drawEntity(masha);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.resetGame = function() {
            bear.x = 100; bear.y = 100;
            masha.x = 700; masha.y = 450;
            shark.active = false;
            gameState = 'playing';
            timer = 0;
            pondTimer = 0;
            overlay.style.display = 'none';
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
