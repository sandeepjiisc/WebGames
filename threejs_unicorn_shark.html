<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Unicorn Rescue & Shark Boss</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }
        #boss-ui {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            text-align: center;
            display: none;
            z-index: 10;
        }
        #boss-hp-bar {
            width: 100%;
            height: 15px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        #boss-hp-fill {
            width: 100%;
            height: 100%;
            background: #ff0000;
            transition: width 0.1s;
        }
        #center-message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            color: #FF5252;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            display: none;
            z-index: 15;
            text-align: center;
            width: 100%;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #overlay h2 {
            font-size: 48px;
            color: #FF5252;
            margin: 0 0 20px 0;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #E040FB;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9C27B0;
            touch-action: manipulation;
        }
        button:active {
            box-shadow: 0 2px 0 #9C27B0;
            transform: translateY(4px);
        }
        .controls-info {
            position: absolute;
            top: 50px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 5;
            pointer-events: none;
        }

        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
            z-index: 15;
            gap: 10px;
        }

        .d-pad {
            display: flex;
            gap: 10px;
        }

        .mobile-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            user-select: none;
            touch-action: manipulation;
        }

        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        .action-btn {
            background: rgba(224, 64, 251, 0.4);
            border-color: rgba(224, 64, 251, 0.8);
            width: 80px;
            height: 80px;
        }

        .action-btn:active {
            background: rgba(224, 64, 251, 0.6);
        }

        @media screen and (min-width: 768px) {
            #ui-layer { font-size: 28px; top: 20px; left: 20px; width: calc(100% - 40px); }
            #boss-ui { top: 70px; }
            #boss-hp-bar { height: 20px; }
            #center-message { font-size: 64px; }
            .controls-info { bottom: 20px; top: auto; left: 50%; transform: translateX(-50%); font-size: 16px; padding: 10px 20px; text-align: center; pointer-events: auto;}
            #overlay h2 { font-size: 64px; }
            #mobile-controls { display: none; }
        }

        @media screen and (max-height: 400px) {
            .controls-info { display: none; }
            #mobile-controls { bottom: 10px; }
            .mobile-btn { width: 50px; height: 50px; font-size: 24px;}
            .action-btn { width: 60px; height: 60px; }
        }
    </style>
    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div>Score: <span id="score">0</span></div>
        <div>Phase: <span id="phase-text" style="color: #E040FB;">Rescue</span></div>
    </div>

    <div id="boss-ui">
        <div style="color: #FF5252; font-weight: bold; font-size: 20px; text-shadow: 1px 1px 2px #000;">SHARK BOSS</div>
        <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
    </div>

    <div id="center-message">SHARK ATTACK!</div>

    <div class="controls-info" id="desktop-controls">
        <strong>Rescue:</strong> ⬅️ ➡️ to Move | <strong>UP Arrow/Action</strong> to Jump<br>
        <strong>Boss Fight:</strong> ⬅️ ➡️ to Move | <strong>Spacebar/Action</strong> to Shoot
    </div>

    <div id="game-container"></div>

    <div id="mobile-controls">
        <div class="d-pad">
            <div class="mobile-btn" id="btn-left">⬅️</div>
            <div class="mobile-btn" id="btn-right">➡️</div>
        </div>
        <div class="mobile-btn action-btn" id="btn-action">💥</div>
    </div>

    <div id="overlay">
        <h2>Game Over!</h2>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

        // Adjust camera position based on screen width for mobile
        const isMobile = window.innerWidth < 768;
        camera.position.set(0, isMobile ? 8 : 5, isMobile ? 35 : 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        // Optimization for mobile
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // --- MATERIALS & GEOMETRIES ---
        const rabbitGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const rabbitMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const playerMesh = new THREE.Mesh(rabbitGeo, rabbitMat);
        playerMesh.castShadow = true;

        const earGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
        const earMat = new THREE.MeshLambertMaterial({ color: 0xffaaaa });
        const leftEar = new THREE.Mesh(earGeo, earMat);
        leftEar.position.set(-0.4, 1.2, 0);
        const rightEar = new THREE.Mesh(earGeo, earMat);
        rightEar.position.set(0.4, 1.2, 0);
        playerMesh.add(leftEar);
        playerMesh.add(rightEar);

        scene.add(playerMesh);

        const pondGeo = new THREE.PlaneGeometry(80, 60);
        const pondMat = new THREE.MeshLambertMaterial({ color: 0x0288D1, transparent: true, opacity: 0.8 });
        const pond = new THREE.Mesh(pondGeo, pondMat);
        pond.rotation.x = -Math.PI / 2;
        pond.position.y = -2;
        pond.receiveShadow = true;
        scene.add(pond);

        const islandGeo = new THREE.CylinderGeometry(8, 9, 1, 32);
        const islandMat = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.position.y = -1.5;
        island.receiveShadow = true;
        scene.add(island);

        const sharkGeo = new THREE.CylinderGeometry(1.5, 0.5, 6, 8);
        const sharkMat = new THREE.MeshLambertMaterial({ color: 0x607D8B });
        const sharkMesh = new THREE.Mesh(sharkGeo, sharkMat);
        sharkMesh.rotation.z = Math.PI / 2; 
        sharkMesh.castShadow = true;

        const finGeo = new THREE.ConeGeometry(0.8, 1.5, 4);
        const fin = new THREE.Mesh(finGeo, sharkMat);
        fin.position.set(0, 1.5, 0);
        sharkMesh.add(fin);

        sharkMesh.visible = false; 
        scene.add(sharkMesh);

        const unicornGeo = new THREE.SphereGeometry(1, 16, 16);
        const unicornMat = new THREE.MeshLambertMaterial({ color: 0xE040FB });

        const bulletGeo = new THREE.SphereGeometry(0.4, 8, 8);
        const bulletMat = new THREE.MeshBasicMaterial({ color: 0xFFEB3B });

        // --- GAME STATE ---
        let score = 0;
        let phase = 'rescue';
        let targetBossScore = 200;
        let gameOver = false;

        const player = {
            x: 0,
            y: 0,
            vy: 0,
            speed: isMobile ? 0.35 : 0.25, // Slightly faster on mobile to cross screen quicker
            isJumping: false,
            bounds: isMobile ? 12 : 15 
        };

        let unicorns = [];
        let bullets = [];

        let sharkData = {
            hp: 10,
            maxHp: 10,
            speed: 0.15,
            dir: 1, 
            state: 'swimming', 
            vy: 0
        };

        // --- INPUTS ---
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            Space: false
        };

        let lastFired = 0;

        window.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.code)) keys[e.code] = true;

            if (e.code === 'ArrowUp' && phase === 'rescue' && !player.isJumping) {
                doJump();
            }
        });

        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        window.addEventListener('resize', () => {
            const mobile = window.innerWidth < 768;
            camera.position.set(0, mobile ? 8 : 5, mobile ? 35 : 25);
            player.bounds = mobile ? 12 : 15;

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Touch Controls
        function bindTouch(id, code) {
            const el = document.getElementById(id);
            if (!el) return;
            const start = (e) => { e.preventDefault(); keys[code] = true; };
            const end = (e) => { e.preventDefault(); keys[code] = false; };
            el.addEventListener('touchstart', start, {passive: false});
            el.addEventListener('mousedown', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        }

        bindTouch('btn-left', 'ArrowLeft');
        bindTouch('btn-right', 'ArrowRight');

        const btnAction = document.getElementById('btn-action');
        let touchCanAction = true;

        const handleActionPress = (e) => {
            e.preventDefault();
            keys.Space = true;
            if (touchCanAction) {
                if (phase === 'rescue' && !player.isJumping) {
                    doJump();
                } else if (phase === 'boss') {
                    shoot();
                }
                touchCanAction = false;
            }
        };

        const handleActionRelease = (e) => {
            e.preventDefault();
            keys.Space = false;
            touchCanAction = true;
        };

        btnAction.addEventListener('touchstart', handleActionPress, {passive: false});
        btnAction.addEventListener('mousedown', handleActionPress);
        btnAction.addEventListener('touchend', handleActionRelease);
        btnAction.addEventListener('mouseup', handleActionRelease);
        btnAction.addEventListener('mouseleave', handleActionRelease);

        // Direct screen touch for movement
        let isTouchingScreen = false;
        let touchTargetX = 0;

        document.getElementById('game-container').addEventListener('touchstart', (e) => {
            e.preventDefault();
            isTouchingScreen = true;
            updateTouchTarget(e);
        }, {passive: false});

        document.getElementById('game-container').addEventListener('touchmove', (e) => {
            e.preventDefault();
            updateTouchTarget(e);
        }, {passive: false});

        document.getElementById('game-container').addEventListener('touchend', () => {
            isTouchingScreen = false;
        });

        function updateTouchTarget(e) {
            const touch = e.touches[0];
            // Map screen X to world X (-bounds to +bounds)
            const screenX = touch.clientX / window.innerWidth;
            touchTargetX = (screenX * 2 - 1) * player.bounds * 1.5;
        }

        // --- UI ELEMENTS ---
        const scoreEl = document.getElementById('score');
        const phaseEl = document.getElementById('phase-text');
        const bossUI = document.getElementById('boss-ui');
        const hpFill = document.getElementById('boss-hp-fill');
        const centerMsg = document.getElementById('center-message');
        const overlay = document.getElementById('overlay');

        // --- GAME LOGIC ---
        function doJump() {
            player.vy = 0.6; 
            player.isJumping = true;
        }

        function spawnUnicorn() {
            if (phase !== 'rescue' || gameOver) return;
            if (Math.random() < 0.02) { 
                const uMesh = new THREE.Mesh(unicornGeo, unicornMat);
                // Adjust spawn width based on screen size
                const spawnWidth = isMobile ? 20 : 30;
                uMesh.position.set((Math.random() - 0.5) * spawnWidth, 20, 0); 
                scene.add(uMesh);
                unicorns.push({
                    mesh: uMesh,
                    speed: 0.1 + Math.random() * 0.1
                });
            }
        }

        function shoot() {
            const now = Date.now();
            if (now - lastFired < 300) return; 
            lastFired = now;

            const bMesh = new THREE.Mesh(bulletGeo, bulletMat);
            bMesh.position.copy(playerMesh.position);
            bMesh.position.y -= 1.5;
            scene.add(bMesh);
            bullets.push(bMesh);
        }

        function triggerBoss() {
            phase = 'boss';
            phaseEl.innerText = "BOSS FIGHT!";
            phaseEl.style.color = '#FF5252';

            unicorns.forEach(u => scene.remove(u.mesh));
            unicorns = [];

            player.y = 12;
            player.vy = 0;
            playerMesh.material.color.setHex(0xE040FB); 
            island.position.y = -10; 

            sharkData.hp = 10 + (targetBossScore/200) * 5;
            sharkData.maxHp = sharkData.hp;
            sharkData.speed = 0.15 + (targetBossScore/200) * 0.05;
            sharkMesh.position.set(0, -2, 0);
            sharkMesh.visible = true;
            sharkData.state = 'swimming';
            sharkData.dir = 1;

            bossUI.style.display = 'block';
            hpFill.style.width = '100%';

            centerMsg.innerText = "SHARK ATTACK!";
            centerMsg.style.display = 'block';
            setTimeout(() => centerMsg.style.display = 'none', 2000);

            // Adjust camera for boss fight
            if (isMobile) {
                camera.position.z = 40;
                camera.position.y = 10;
            }
        }

        function defeatBoss() {
            score += 50;
            targetBossScore += 200;
            scoreEl.innerText = score;

            phase = 'rescue';
            phaseEl.innerText = "Rescue";
            phaseEl.style.color = '#E040FB';

            player.y = 0;
            playerMesh.material.color.setHex(0xffffff); 
            island.position.y = -1.5; 

            sharkMesh.visible = false;
            bossUI.style.display = 'none';
            bullets.forEach(b => scene.remove(b));
            bullets = [];

            centerMsg.innerText = "BOSS DEFEATED!";
            centerMsg.style.display = 'block';
            setTimeout(() => centerMsg.style.display = 'none', 2000);

            // Reset camera
            if (isMobile) {
                camera.position.z = 35;
                camera.position.y = 8;
            }
        }

        function checkCollision(obj1, obj2, dist) {
            return obj1.position.distanceTo(obj2.position) < dist;
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (gameOver) return;

            // 1. Player Movement
            if (keys.ArrowLeft) player.x -= player.speed;
            if (keys.ArrowRight) player.x += player.speed;

            // Touch screen direct movement
            if (isTouchingScreen && !keys.ArrowLeft && !keys.ArrowRight) {
                const diff = touchTargetX - player.x;
                if (Math.abs(diff) > 0.5) {
                    player.x += Math.sign(diff) * player.speed;
                }
            }

            // Constrain X
            if (player.x < -player.bounds) player.x = -player.bounds;
            if (player.x > player.bounds) player.x = player.bounds;

            if (phase === 'rescue') {
                if (player.isJumping) {
                    player.vy -= 0.03; 
                    player.y += player.vy;
                    if (player.y <= 0) {
                        player.y = 0;
                        player.isJumping = false;
                        player.vy = 0;
                    }
                }

                spawnUnicorn();
                for (let i = unicorns.length - 1; i >= 0; i--) {
                    let u = unicorns[i];
                    u.mesh.position.y -= u.speed;

                    u.mesh.rotation.x += 0.05;
                    u.mesh.rotation.y += 0.05;

                    if (checkCollision(playerMesh, u.mesh, 2.5)) {
                        scene.remove(u.mesh);
                        unicorns.splice(i, 1);
                        score += 20;
                        scoreEl.innerText = score;

                        if (score >= targetBossScore) {
                            triggerBoss();
                        }
                        continue;
                    }

                    if (u.mesh.position.y < -5) {
                        scene.remove(u.mesh);
                        unicorns.splice(i, 1);
                    }
                }
            } 

            else if (phase === 'boss') {
                if (keys.Space) shoot();

                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    b.position.y -= 0.6;

                    if (checkCollision(b, sharkMesh, 3.5)) {
                        scene.remove(b);
                        bullets.splice(i, 1);

                        sharkMesh.material.color.setHex(0xff0000);
                        setTimeout(() => sharkMesh.material.color.setHex(0x607D8B), 100);

                        sharkData.hp--;
                        hpFill.style.width = (sharkData.hp / sharkData.maxHp * 100) + '%';

                        if (sharkData.hp <= 0) defeatBoss();
                        continue;
                    }

                    if (b.position.y < -5) {
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                }

                if (sharkData.state === 'swimming') {
                    sharkMesh.position.x += sharkData.speed * sharkData.dir;

                    sharkMesh.rotation.z = sharkData.dir === 1 ? -Math.PI/2 : Math.PI/2;

                    // Adjust wall bounce based on screen bounds
                    const sharkBounds = player.bounds + 3;
                    if (sharkMesh.position.x > sharkBounds) sharkData.dir = -1;
                    if (sharkMesh.position.x < -sharkBounds) sharkData.dir = 1;

                    if (Math.random() < 0.015) {
                        sharkData.state = 'jumping';
                        sharkData.vy = 0.8; 
                        sharkMesh.rotation.z = 0; 
                    }
                } else if (sharkData.state === 'jumping') {
                    sharkData.vy -= 0.03; 
                    sharkMesh.position.y += sharkData.vy;

                    let targetRot = sharkData.vy > 0 ? 0 : Math.PI;
                    sharkMesh.rotation.z += (targetRot - sharkMesh.rotation.z) * 0.1;

                    if (sharkMesh.position.y <= -2 && sharkData.vy < 0) {
                        sharkMesh.position.y = -2;
                        sharkData.state = 'swimming';
                        sharkData.dir = Math.random() > 0.5 ? 1 : -1;
                    }
                }

                if (checkCollision(playerMesh, sharkMesh, 3.5)) {
                    gameOver = true;
                    playerMesh.material.color.setHex(0xff0000);
                    overlay.style.display = 'flex';
                }
            }

            playerMesh.position.x = player.x;
            playerMesh.position.y = player.y;

            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>
</html>
