<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Unicorn Rescue & Shark Boss</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            width: calc(100% - 40px);
            display: flex;
            justify-content: space-between;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }
        #boss-ui {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            text-align: center;
            display: none;
            z-index: 10;
        }
        #boss-hp-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border: 3px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        #boss-hp-fill {
            width: 100%;
            height: 100%;
            background: #ff0000;
            transition: width 0.1s;
        }
        #center-message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            color: #FF5252;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            display: none;
            z-index: 15;
            text-align: center;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }
        #overlay h2 {
            font-size: 64px;
            color: #FF5252;
            margin: 0 0 20px 0;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #E040FB;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9C27B0;
        }
        button:active {
            box-shadow: 0 2px 0 #9C27B0;
            transform: translateY(4px);
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
        }
    </style>
    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div>Score: <span id="score">0</span></div>
        <div>Phase: <span id="phase-text" style="color: #E040FB;">Rescue</span></div>
    </div>

    <div id="boss-ui">
        <div style="color: #FF5252; font-weight: bold; font-size: 24px; text-shadow: 1px 1px 2px #000;">SHARK BOSS</div>
        <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
    </div>

    <div id="center-message">SHARK ATTACK!</div>

    <div class="controls">
        <strong>Rescue:</strong> ⬅️ ➡️ to Move | <strong>UP Arrow</strong> to Jump<br>
        <strong>Boss Fight:</strong> ⬅️ ➡️ to Move | <strong>Spacebar</strong> to Shoot
    </div>

    <div id="game-container"></div>

    <div id="overlay">
        <h2>Game Over!</h2>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // --- MATERIALS & GEOMETRIES ---
        // We will use simple 3D primitives to represent our characters since we can't load external 3D models securely via raw HTML/JS easily.

        // Rabbit (Player) - White cube with ears
        const rabbitGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const rabbitMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const playerMesh = new THREE.Mesh(rabbitGeo, rabbitMat);
        playerMesh.castShadow = true;

        // Ears
        const earGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
        const earMat = new THREE.MeshLambertMaterial({ color: 0xffaaaa });
        const leftEar = new THREE.Mesh(earGeo, earMat);
        leftEar.position.set(-0.4, 1.2, 0);
        const rightEar = new THREE.Mesh(earGeo, earMat);
        rightEar.position.set(0.4, 1.2, 0);
        playerMesh.add(leftEar);
        playerMesh.add(rightEar);

        scene.add(playerMesh);

        // Ground / Water
        const pondGeo = new THREE.PlaneGeometry(60, 40);
        const pondMat = new THREE.MeshLambertMaterial({ color: 0x0288D1, transparent: true, opacity: 0.8 });
        const pond = new THREE.Mesh(pondGeo, pondMat);
        pond.rotation.x = -Math.PI / 2;
        pond.position.y = -2;
        pond.receiveShadow = true;
        scene.add(pond);

        // Island (where rabbit stands in rescue phase)
        const islandGeo = new THREE.CylinderGeometry(8, 9, 1, 32);
        const islandMat = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
        const island = new THREE.Mesh(islandGeo, islandMat);
        island.position.y = -1.5;
        island.receiveShadow = true;
        scene.add(island);

        // Shark Boss - Grey cylinder (torpedo shape)
        const sharkGeo = new THREE.CylinderGeometry(1.5, 0.5, 6, 8);
        const sharkMat = new THREE.MeshLambertMaterial({ color: 0x607D8B });
        const sharkMesh = new THREE.Mesh(sharkGeo, sharkMat);
        sharkMesh.rotation.z = Math.PI / 2; // Lay flat
        sharkMesh.castShadow = true;

        // Fin
        const finGeo = new THREE.ConeGeometry(0.8, 1.5, 4);
        const fin = new THREE.Mesh(finGeo, sharkMat);
        fin.position.set(0, 1.5, 0);
        sharkMesh.add(fin);

        sharkMesh.visible = false; // Hide initially
        scene.add(sharkMesh);

        // Unicorn Material (Pink/Purple Spheres)
        const unicornGeo = new THREE.SphereGeometry(1, 16, 16);
        const unicornMat = new THREE.MeshLambertMaterial({ color: 0xE040FB });

        // Bullet Material (Yellow glowing spheres)
        const bulletGeo = new THREE.SphereGeometry(0.3, 8, 8);
        const bulletMat = new THREE.MeshBasicMaterial({ color: 0xFFEB3B });

        // --- GAME STATE ---
        let score = 0;
        let phase = 'rescue';
        let targetBossScore = 200;
        let gameOver = false;

        // Player Physics
        const player = {
            x: 0,
            y: 0,
            vy: 0,
            speed: 0.25,
            isJumping: false,
            bounds: 15 // Move limit left/right
        };

        // Arrays for dynamic objects
        let unicorns = [];
        let bullets = [];

        // Boss Data
        let sharkData = {
            hp: 10,
            maxHp: 10,
            speed: 0.15,
            dir: 1, // 1 right, -1 left
            state: 'swimming', // swimming, jumping
            vy: 0
        };

        // --- INPUTS ---
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            Space: false
        };

        let lastFired = 0;

        window.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.code)) keys[e.code] = true;

            // Jump logic
            if (e.code === 'ArrowUp' && phase === 'rescue' && !player.isJumping) {
                player.vy = 0.6; // Jump strength
                player.isJumping = true;
            }
        });
        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI ELEMENTS ---
        const scoreEl = document.getElementById('score');
        const phaseEl = document.getElementById('phase-text');
        const bossUI = document.getElementById('boss-ui');
        const hpFill = document.getElementById('boss-hp-fill');
        const centerMsg = document.getElementById('center-message');
        const overlay = document.getElementById('overlay');

        // --- GAME LOGIC ---
        function spawnUnicorn() {
            if (phase !== 'rescue' || gameOver) return;
            if (Math.random() < 0.02) { // Roughly 1 per second at 60fps
                const uMesh = new THREE.Mesh(unicornGeo, unicornMat);
                uMesh.position.set((Math.random() - 0.5) * 30, 20, 0); // Random X, High Y
                scene.add(uMesh);
                unicorns.push({
                    mesh: uMesh,
                    speed: 0.1 + Math.random() * 0.1
                });
            }
        }

        function shoot() {
            const now = Date.now();
            if (now - lastFired < 300) return; // Fire rate limit
            lastFired = now;

            const bMesh = new THREE.Mesh(bulletGeo, bulletMat);
            bMesh.position.copy(playerMesh.position);
            bMesh.position.y -= 1;
            scene.add(bMesh);
            bullets.push(bMesh);
        }

        function triggerBoss() {
            phase = 'boss';
            phaseEl.innerText = "BOSS FIGHT!";
            phaseEl.style.color = '#FF5252';

            // Clear unicorns
            unicorns.forEach(u => scene.remove(u.mesh));
            unicorns = [];

            // Move player to sky (Riding unicorn)
            player.y = 12;
            player.vy = 0;
            playerMesh.material.color.setHex(0xE040FB); // Turn pink to represent riding unicorn
            island.position.y = -10; // sink island

            // Setup Boss
            sharkData.hp = 10 + (targetBossScore/200) * 5;
            sharkData.maxHp = sharkData.hp;
            sharkData.speed = 0.15 + (targetBossScore/200) * 0.05;
            sharkMesh.position.set(0, -2, 0);
            sharkMesh.visible = true;
            sharkData.state = 'swimming';
            sharkData.dir = 1;

            // UI
            bossUI.style.display = 'block';
            hpFill.style.width = '100%';

            centerMsg.innerText = "SHARK ATTACK!";
            centerMsg.style.display = 'block';
            setTimeout(() => centerMsg.style.display = 'none', 2000);
        }

        function defeatBoss() {
            score += 50;
            targetBossScore += 200;
            scoreEl.innerText = score;

            phase = 'rescue';
            phaseEl.innerText = "Rescue";
            phaseEl.style.color = '#E040FB';

            // Reset player
            player.y = 0;
            playerMesh.material.color.setHex(0xffffff); // Back to white rabbit
            island.position.y = -1.5; // Raise island

            // Hide boss UI
            sharkMesh.visible = false;
            bossUI.style.display = 'none';
            bullets.forEach(b => scene.remove(b));
            bullets = [];

            centerMsg.innerText = "BOSS DEFEATED!";
            centerMsg.style.display = 'block';
            setTimeout(() => centerMsg.style.display = 'none', 2000);
        }

        function checkCollision(obj1, obj2, dist) {
            return obj1.position.distanceTo(obj2.position) < dist;
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (gameOver) return;

            // 1. Player Movement
            if (keys.ArrowLeft) player.x -= player.speed;
            if (keys.ArrowRight) player.x += player.speed;

            // Constrain X
            if (player.x < -player.bounds) player.x = -player.bounds;
            if (player.x > player.bounds) player.x = player.bounds;

            if (phase === 'rescue') {
                // Gravity / Jumping
                if (player.isJumping) {
                    player.vy -= 0.03; // Gravity
                    player.y += player.vy;
                    if (player.y <= 0) {
                        player.y = 0;
                        player.isJumping = false;
                        player.vy = 0;
                    }
                }

                // Spawn & Update Unicorns
                spawnUnicorn();
                for (let i = unicorns.length - 1; i >= 0; i--) {
                    let u = unicorns[i];
                    u.mesh.position.y -= u.speed;

                    // Rotate for visual effect
                    u.mesh.rotation.x += 0.05;
                    u.mesh.rotation.y += 0.05;

                    // Catch Check (Hitbox ~ 2 units)
                    if (checkCollision(playerMesh, u.mesh, 2.5)) {
                        scene.remove(u.mesh);
                        unicorns.splice(i, 1);
                        score += 20;
                        scoreEl.innerText = score;

                        // Check transition
                        if (score >= targetBossScore) {
                            triggerBoss();
                        }
                        continue;
                    }

                    // Missed
                    if (u.mesh.position.y < -5) {
                        scene.remove(u.mesh);
                        unicorns.splice(i, 1);
                    }
                }
            } 

            else if (phase === 'boss') {
                // Player shooting
                if (keys.Space) shoot();

                // Update Bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    b.position.y -= 0.6;

                    // Boss Hit Check (Hitbox ~ 2.5 units)
                    if (checkCollision(b, sharkMesh, 2.5)) {
                        scene.remove(b);
                        bullets.splice(i, 1);

                        // Flash shark red
                        sharkMesh.material.color.setHex(0xff0000);
                        setTimeout(() => sharkMesh.material.color.setHex(0x607D8B), 100);

                        sharkData.hp--;
                        hpFill.style.width = (sharkData.hp / sharkData.maxHp * 100) + '%';

                        if (sharkData.hp <= 0) defeatBoss();
                        continue;
                    }

                    if (b.position.y < -5) {
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                }

                // Update Shark Boss
                if (sharkData.state === 'swimming') {
                    sharkMesh.position.x += sharkData.speed * sharkData.dir;

                    // Face direction of travel
                    sharkMesh.rotation.z = sharkData.dir === 1 ? -Math.PI/2 : Math.PI/2;

                    // Bounce walls
                    if (sharkMesh.position.x > 18) sharkData.dir = -1;
                    if (sharkMesh.position.x < -18) sharkData.dir = 1;

                    // Random jump attack
                    if (Math.random() < 0.015) {
                        sharkData.state = 'jumping';
                        sharkData.vy = 0.8; // jump strength
                        // Rotate to point up
                        sharkMesh.rotation.z = 0; 
                    }
                } else if (sharkData.state === 'jumping') {
                    sharkData.vy -= 0.03; // gravity
                    sharkMesh.position.y += sharkData.vy;

                    // Rotate based on velocity (arc)
                    let targetRot = sharkData.vy > 0 ? 0 : Math.PI;
                    sharkMesh.rotation.z += (targetRot - sharkMesh.rotation.z) * 0.1;

                    // Splash down
                    if (sharkMesh.position.y <= -2 && sharkData.vy < 0) {
                        sharkMesh.position.y = -2;
                        sharkData.state = 'swimming';
                        sharkData.dir = Math.random() > 0.5 ? 1 : -1;
                    }
                }

                // Eaten Check (Player vs Shark)
                if (checkCollision(playerMesh, sharkMesh, 3)) {
                    gameOver = true;
                    playerMesh.material.color.setHex(0xff0000);
                    overlay.style.display = 'flex';
                }
            }

            // Apply player positions
            playerMesh.position.x = player.x;
            playerMesh.position.y = player.y;

            // Render
            renderer.render(scene, camera);
        }

        // Start game loop
        animate();

    </script>
</body>
</html>
