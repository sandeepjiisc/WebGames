<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Colorful Snake — SAGEWorks</title>
  <style>
    :root{--ui-bg:rgba(0,0,0,0.45);--accent:#ffcc00}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;display:flex;align-items:center;justify-content:center;background:#111}
    #app{width:100%;max-width:1100px;height:88vh;padding:12px;box-sizing:border-box;display:grid;grid-template-columns:1fr 300px;gap:12px}
    canvas{width:100%;height:100%;background:linear-gradient(160deg,#030420,#05203a 35%,#07203a);border-radius:10px;display:block}
    .panel{background:var(--ui-bg);backdrop-filter:blur(6px);padding:12px;border-radius:10px;color:#fff}
    .panel h2{margin:4px 0 8px;font-size:16px}
    .row{display:flex;gap:8px;align-items:center;margin:6px 0}
    button{background:transparent;border:1px solid rgba(255,255,255,0.12);padding:8px 10px;border-radius:8px;color:#fff;cursor:pointer}
    button.primary{background:linear-gradient(90deg,var(--accent),#ff66cc);border:none}
    .stats{display:flex;flex-direction:column;gap:6px}
    .small{font-size:12px;color:#ddd}
    input[type=range]{width:100%}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    .touch-controls{display:none}
    @media (max-width:900px){#app{grid-template-columns:1fr;grid-template-rows:55vh auto; height: 100vh;} .touch-controls{display:flex} .panel{font-size:14px; overflow-y:auto;}}
  </style>
</head>
<body>
  <div id="app">
    <div style="min-height:0;">
      <canvas id="c"></canvas>
    </div>
    <div class="panel" id="ui">
      <h2>Colorful Snake</h2>
      <div class="touch-controls" style="margin-bottom:12px;flex-direction:column;gap:6px">
        <button id="tUp" style="padding:15px; font-size: 20px;">▲</button>
        <div style="display:flex;gap:6px;width:100%">
          <button id="tLeft" style="flex:1; padding:15px; font-size: 20px;">◀</button>
          <button id="tDown" style="flex:1; padding:15px; font-size: 20px;">▼</button>
          <button id="tRight" style="flex:1; padding:15px; font-size: 20px;">▶</button>
        </div>
      </div>
      <div class="row">
        <button id="startBtn" class="primary">Start / Restart</button>
        <button id="pauseBtn">Pause</button>
      </div>
      <div class="row stats">
        <div>Score: <strong id="score">0</strong></div>
        <div>High Score: <strong id="high">0</strong></div>
        <div class="small">Length: <span id="length">0</span> &nbsp; Speed: <span id="speedLabel">Normal</span></div>
      </div>
      <hr style="opacity:.12" />
      <div class="row">
        <div style="flex:1">
          <label class="small">Speed</label>
          <input id="speed" type="range" min="4" max="24" value="12">
        </div>
      </div>
      <div class="row">
        <div style="flex:1">
          <label class="small">Theme Hue</label>
          <input id="hue" type="range" min="0" max="360" value="200">
        </div>
      </div>
      <div class="row">
        <div style="flex:1">
          <label class="small">Trail</label>
          <input id="trail" type="range" min="0" max="0.98" step="0.02" value="0.6">
        </div>
      </div>
      <hr style="opacity:.12" />
      <div class="row controls">
        <button id="toggleGrid">Toggle Grid</button>
        <button id="toggleParticles">Particles</button>
        <button id="toggleSound">Sound</button>
      </div>
      <hr style="opacity:.12" />
      <div class="small">Controls: Arrow keys / WASD / Swipe (mobile). Space = Pause</div>
    </div>
  </div>

  <script src="snake_cool_dep/js/core.js"></script>
  <script src="snake_cool_dep/js/modes/index.js"></script>
  <script src="snake_cool_dep/js/modes/physics.js"></script>
  <script src="snake_cool_dep/js/modes/vectorfield.js"></script>
  <script src="snake_cool_dep/js/modes/hamiltonian.js"></script>
  <script>
  // expose simple controls for selecting mode from console / future UI
  (function(){
    window.setMode = function(m){ if(window.game) window.game.mode = m; else console.log('game not ready'); };
    // do nothing — core.js will initialize the game
  })();
  </script>
</body>
</html>
