<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rescue the Fish - Pull the Pin Puzzle</title>
    <style>
        :root {
            --bg: #0c4a6e;
            --surface: #075985;
            --primary: #38bdf8;
            --danger: #ef4444;
            --lava: #f97316;
            --water: #0ea5e9;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background: #111;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 80vh;
        }

        .ui-top {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .level-indicator {
            font-size: 24px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 20px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #overlay h2 { font-size: 48px; margin-bottom: 20px; }
        .msg-success { color: #4ade80; }
        .msg-fail { color: #f87171; }

        @media (max-width: 600px) {
            #overlay h2 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="ui-top">
            <a href="index.html" class="btn" style="background: rgba(255,255,255,0.2)">🏠 Hub</a>
            <div class="level-indicator">Level <span id="level-num">1</span></div>
            <button class="btn" onclick="restartLevel()">🔄 Restart</button>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="overlay">
            <h2 id="overlay-title">SUCCESS!</h2>
            <button id="next-btn" class="btn" style="padding: 15px 40px; font-size: 20px;" onclick="nextLevel()">Next Level</button>
            <button id="retry-btn" class="btn" style="padding: 15px 40px; font-size: 20px; background: var(--danger);" onclick="restartLevel()">Try Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelNumEl = document.getElementById('level-num');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const nextBtn = document.getElementById('next-btn');
        const retryBtn = document.getElementById('retry-btn');

        const CANVAS_WIDTH = 400;
        const CANVAS_HEIGHT = 600;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        let currentLevel = 0;
        let particles = [];
        let pins = [];
        let walls = [];
        let fish = { x: 200, y: 500, width: 60, height: 40 };
        let gameStatus = 'playing'; // 'playing', 'won', 'lost'

        const levels = [
            // 1-3: The Basics
            {
                walls: [
                    {x: 120, y: 100, w: 20, h: 300}, {x: 260, y: 100, w: 20, h: 300},
                    {x: 120, y: 450, w: 160, h: 20}
                ],
                pins: [{x1: 120, y1: 300, x2: 280, y2: 300, pulled: false, id: 0}],
                liquids: [{x: 200, y: 150, type: 'water', count: 80}],
                fishPos: {x: 170, y: 410}
            },
            {
                walls: [
                    {x: 80, y: 100, w: 20, h: 350}, {x: 300, y: 100, w: 20, h: 350},
                    {x: 190, y: 100, w: 20, h: 200}, {x: 80, y: 450, w: 240, h: 20}
                ],
                pins: [
                    {x1: 80, y1: 300, x2: 210, y2: 300, pulled: false, id: 0},
                    {x1: 190, y1: 350, x2: 320, y2: 350, pulled: false, id: 1}
                ],
                liquids: [{x: 140, y: 150, type: 'water', count: 100}],
                fishPos: {x: 230, y: 410}
            },
            {
                walls: [
                    {x: 50, y: 50, w: 10, h: 400}, {x: 340, y: 50, w: 10, h: 400},
                    {x: 50, y: 450, w: 300, h: 10}, {x: 150, y: 200, w: 100, h: 10}
                ],
                pins: [{x1: 50, y1: 350, x2: 350, y2: 350, pulled: false, id: 0}],
                liquids: [{x: 200, y: 100, type: 'water', count: 120}],
                fishPos: {x: 170, y: 400}
            },
            // 4-7: Introducing Hazards (Lava)
            {
                walls: [
                    {x: 100, y: 50, w: 10, h: 450}, {x: 290, y: 50, w: 10, h: 450},
                    {x: 100, y: 500, w: 200, h: 10}
                ],
                pins: [
                    {x1: 100, y1: 200, x2: 300, y2: 200, pulled: false, id: 0},
                    {x1: 100, y1: 350, x2: 300, y2: 350, pulled: false, id: 1}
                ],
                liquids: [
                    {x: 200, y: 100, type: 'lava', count: 60},
                    {x: 200, y: 250, type: 'water', count: 80}
                ],
                fishPos: {x: 170, y: 450}
            },
            {
                walls: [
                    {x: 50, y: 50, w: 10, h: 200}, {x: 340, y: 50, w: 10, h: 200},
                    {x: 50, y: 250, w: 300, h: 10}, {x: 190, y: 250, w: 10, h: 300},
                    {x: 50, y: 550, w: 300, h: 10}
                ],
                pins: [
                    {x1: 50, y1: 200, x2: 200, y2: 200, pulled: false, id: 0},
                    {x1: 190, y1: 200, x2: 350, y2: 200, pulled: false, id: 1}
                ],
                liquids: [
                    {x: 120, y: 100, type: 'water', count: 80},
                    {x: 280, y: 100, type: 'lava', count: 80}
                ],
                fishPos: {x: 100, y: 500}
            },
            {
                walls: [
                    {x: 100, y: 50, w: 10, h: 500}, {x: 300, y: 50, w: 10, h: 500},
                    {x: 100, y: 550, w: 210, h: 10}, {x: 100, y: 400, w: 100, h: 10}
                ],
                pins: [
                    {x1: 100, y1: 250, x2: 300, y2: 250, pulled: false, id: 0},
                    {x1: 200, y1: 400, x2: 310, y2: 400, pulled: false, id: 1}
                ],
                liquids: [
                    {x: 200, y: 100, type: 'lava', count: 70},
                    {x: 250, y: 300, type: 'water', count: 70}
                ],
                fishPos: {x: 120, y: 500}
            },
            {
                walls: [
                    {x: 50, y: 50, w: 10, h: 500}, {x: 340, y: 50, w: 10, h: 500},
                    {x: 50, y: 550, w: 300, h: 10}, {x: 150, y: 50, w: 10, h: 300}
                ],
                pins: [
                    {x1: 50, y1: 350, x2: 160, y2: 350, pulled: false, id: 0},
                    {x1: 150, y1: 450, x2: 350, y2: 450, pulled: false, id: 1}
                ],
                liquids: [
                    {x: 100, y: 100, type: 'water', count: 100},
                    {x: 250, y: 100, type: 'lava', count: 100}
                ],
                fishPos: {x: 250, y: 500}
            },
            // 8-10: Mixing Liquids
            {
                walls: [
                    {x: 120, y: 50, w: 10, h: 500}, {x: 280, y: 50, w: 10, h: 500},
                    {x: 120, y: 550, w: 170, h: 10}
                ],
                pins: [
                    {x1: 120, y1: 200, x2: 290, y2: 200, pulled: false, id: 0},
                    {x1: 120, y1: 350, x2: 290, y2: 350, pulled: false, id: 1}
                ],
                liquids: [
                    {x: 200, y: 100, type: 'water', count: 100},
                    {x: 200, y: 250, type: 'lava', count: 80}
                ],
                fishPos: {x: 170, y: 500}
            },
            {
                walls: [
                    {x: 50, y: 50, w: 10, h: 500}, {x: 350, y: 50, w: 10, h: 500},
                    {x: 50, y: 550, w: 310, h: 10}, {x: 150, y: 250, w: 100, h: 10}
                ],
                pins: [
                    {x1: 50, y1: 200, x2: 350, y2: 200, pulled: false, id: 0},
                    {x1: 150, y1: 400, x2: 350, y2: 400, pulled: false, id: 1}
                ],
                liquids: [
                    {x: 100, y: 100, type: 'water', count: 60},
                    {x: 300, y: 100, type: 'lava', count: 60},
                    {x: 200, y: 300, type: 'water', count: 60}
                ],
                fishPos: {x: 100, y: 500}
            },
            {
                walls: [
                    {x: 50, y: 50, w: 10, h: 500}, {x: 350, y: 50, w: 10, h: 500},
                    {x: 50, y: 550, w: 310, h: 10}, {x: 50, y: 250, w: 100, h: 10},
                    {x: 250, y: 250, w: 110, h: 10}
                ],
                pins: [
                    {x1: 50, y1: 150, x2: 350, y2: 150, pulled: false, id: 0},
                    {x1: 150, y1: 300, x2: 250, y2: 300, pulled: false, id: 1},
                    {x1: 50, y1: 450, x2: 350, y2: 450, pulled: false, id: 2}
                ],
                liquids: [
                    {x: 200, y: 80, type: 'water', count: 120},
                    {x: 100, y: 350, type: 'lava', count: 60},
                    {x: 300, y: 350, type: 'lava', count: 60}
                ],
                fishPos: {x: 170, y: 500}
            }
        ];

        class Particle {
            constructor(x, y, type) {
                this.x = x + (Math.random() - 0.5) * 40;
                this.y = y + (Math.random() - 0.5) * 40;
                this.type = type;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = 0;
                this.radius = 4;
            }

            update() {
                this.vy += 0.2; // gravity
                this.x += this.vx;
                this.y += this.vy;

                // Wall collisions
                walls.forEach(w => {
                    if (this.x + this.radius > w.x && this.x - this.radius < w.x + w.w &&
                        this.y + this.radius > w.y && this.y - this.radius < w.y + w.h) {
                        
                        // Simple resolution
                        if (Math.abs(this.x - (w.x + w.w/2)) / w.w > Math.abs(this.y - (w.y + w.h/2)) / w.h) {
                            this.vx *= -0.5;
                            this.x = this.x < w.x + w.w/2 ? w.x - this.radius : w.x + w.w + this.radius;
                        } else {
                            this.vy *= -0.2;
                            this.vx += (Math.random() - 0.5);
                            this.y = this.y < w.y + w.h/2 ? w.y - this.radius : w.y + w.h + this.radius;
                        }
                    }
                });

                // Pin collisions
                pins.forEach(p => {
                    if (p.pulled) return;
                    // Horizontal pin check
                    if (this.y + this.radius > p.y1 - 5 && this.y - this.radius < p.y1 + 5 &&
                        this.x > p.x1 && this.x < p.x2) {
                        this.vy *= -0.2;
                        this.y = p.y1 - this.radius - 1;
                        this.vx += (Math.random() - 0.5);
                    }
                });

                // Particle interactions (Lava + Water = Stone)
                if (this.type !== 'stone') {
                    for(let i=0; i<particles.length; i++) {
                        let other = particles[i];
                        if (other === this || other.type === 'stone') continue;
                        
                        let dx = other.x - this.x;
                        let dy = other.y - this.y;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < this.radius * 2) {
                            if ((this.type === 'water' && other.type === 'lava') || 
                                (this.type === 'lava' && other.type === 'water')) {
                                this.type = 'stone';
                                other.type = 'stone';
                            }
                            // Simple repulsion
                            let angle = Math.atan2(dy, dx);
                            this.vx -= Math.cos(angle) * 0.1;
                            this.vy -= Math.sin(angle) * 0.1;
                        }
                    }
                }

                // Fish interaction
                if (gameStatus === 'playing') {
                    let dx = this.x - (fish.x + fish.width/2);
                    let dy = this.y - (fish.y + fish.height/2);
                    if (Math.abs(dx) < fish.width/2 && Math.abs(dy) < fish.height/2) {
                        if (this.type === 'water') win();
                        if (this.type === 'lava') fail("Fish got burned!");
                    }
                }

                // Boundaries
                if (this.x < 0 || this.x > CANVAS_WIDTH) this.vx *= -1;
                if (this.y > CANVAS_HEIGHT) return false;
                return true;
            }

            draw() {
                ctx.fillStyle = this.type === 'water' ? '#0ea5e9' : (this.type === 'lava' ? '#f97316' : '#555');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function loadLevel(idx) {
            currentLevel = idx;
            levelNumEl.innerText = idx + 1;
            const data = levels[idx];
            
            walls = data.walls;
            pins = JSON.parse(JSON.stringify(data.pins));
            particles = [];
            data.liquids.forEach(l => {
                for(let i=0; i<l.count; i++) {
                    particles.push(new Particle(l.x, l.y, l.type));
                }
            });
            fish.x = data.fishPos.x;
            fish.y = data.fishPos.y;
            gameStatus = 'playing';
            overlay.style.display = 'none';
        }

        function restartLevel() { loadLevel(currentLevel); }
        function nextLevel() {
            if (currentLevel < levels.length - 1) loadLevel(currentLevel + 1);
            else {
                overlayTitle.innerText = "ALL LEVELS CLEAR!";
                nextBtn.style.display = 'none';
            }
        }

        function win() {
            if (gameStatus !== 'playing') return;
            gameStatus = 'won';
            overlay.style.display = 'flex';
            overlayTitle.innerText = "SUCCESS!";
            overlayTitle.className = "msg-success";
            nextBtn.style.display = 'block';
            retryBtn.style.display = 'none';
        }

        function fail(msg) {
            if (gameStatus !== 'playing') return;
            gameStatus = 'lost';
            overlay.style.display = 'flex';
            overlayTitle.innerText = "FAILED!";
            overlayTitle.className = "msg-fail";
            nextBtn.style.display = 'none';
            retryBtn.style.display = 'block';
        }

        // Interaction
        canvas.addEventListener('mousedown', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            handleClick({
                clientX: touch.clientX,
                clientY: touch.clientY
            });
        });

        function handleClick(e) {
            if (gameStatus !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (CANVAS_WIDTH / rect.width);
            const y = (e.clientY - rect.top) * (CANVAS_HEIGHT / rect.height);

            pins.forEach(p => {
                // Click near the pin handle (start or end)
                const d1 = Math.hypot(x - p.x1, y - p.y1);
                const d2 = Math.hypot(x - p.x2, y - p.y2);
                if (d1 < 30 || d2 < 30) {
                    p.pulled = true;
                }
            });
        }

        function update() {
            particles = particles.filter(p => p.update());
            
            // If all water particles fall out and fish not saved
            if (particles.length > 0 && !particles.some(p => p.type === 'water') && gameStatus === 'playing') {
                setTimeout(() => { if (gameStatus === 'playing') fail("Out of water!"); }, 2000);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Walls
            ctx.fillStyle = '#334155';
            walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

            // Pins
            pins.forEach(p => {
                if (p.pulled) return;
                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(p.x1, p.y1);
                ctx.lineTo(p.x2, p.y2);
                ctx.stroke();
                
                // Pin handle
                ctx.fillStyle = '#f8fafc';
                ctx.beginPath();
                ctx.arc(p.x1, p.y1, 10, 0, Math.PI*2);
                ctx.fill();
            });

            // Particles
            particles.forEach(p => p.draw());

            // Fish
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🐠', fish.x + fish.width/2, fish.y + fish.height/2);

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        window.onload = () => {
            loadLevel(0);
            draw();
        };
    </script>
</body>
</html>
