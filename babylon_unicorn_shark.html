<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon.js Unicorn Rescue & Shark Boss</title>
    <!-- Load Babylon.js from CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            color: white;
        }
        #overlay h2 {
            font-size: 64px;
            color: #FF5252;
            margin: 0 0 20px 0;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #E040FB;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9C27B0;
        }
        button:active {
            box-shadow: 0 2px 0 #9C27B0;
            transform: translateY(4px);
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
            color: white;
        }
    </style>
</head>
<body>

    <div class="controls">
        <strong>Rescue:</strong> ⬅️ ➡️ to Move | <strong>UP Arrow</strong> to Jump<br>
        <strong>Boss Fight:</strong> ⬅️ ➡️ to Move | <strong>Spacebar</strong> to Shoot
    </div>

    <canvas id="renderCanvas"></canvas>

    <div id="overlay">
        <h2>Game Over!</h2>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        // Game State Variables
        let score = 0;
        let phase = 'rescue';
        let targetBossScore = 200;
        let gameOver = false;

        let player, shark, island;
        let unicorns = [];
        let bullets = [];

        let sharkData = { hp: 10, maxHp: 10, speed: 0.15, dir: 1, state: 'swimming', vy: 0 };
        let playerState = { vy: 0, isJumping: false, speed: 0.3, bounds: 15 };

        // Input map
        let inputMap = {};
        let lastFired = 0;

        // UI Variables
        let advancedTexture, scoreText, phaseText, bossHpBar, bossHpBg, centerMsgText;

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.53, 0.81, 0.92, 1); // Sky blue

            // Camera
            const camera = new BABYLON.FreeCamera("camera1", new BABYLON.Vector3(0, 5, -25), scene);
            camera.setTarget(BABYLON.Vector3.Zero());

            // Lighting
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.7;
            const dirLight = new BABYLON.DirectionalLight("dirLight", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.position = new BABYLON.Vector3(20, 40, 20);
            dirLight.intensity = 0.8;

            // Shadows
            const shadowGenerator = new BABYLON.ShadowGenerator(1024, dirLight);
            shadowGenerator.useBlurExponentialShadowMap = true;

            // Materials
            const rabbitMat = new BABYLON.StandardMaterial("rabbitMat", scene);
            rabbitMat.diffuseColor = new BABYLON.Color3(1, 1, 1);

            const pinkMat = new BABYLON.StandardMaterial("pinkMat", scene);
            pinkMat.diffuseColor = new BABYLON.Color3(0.88, 0.25, 0.98); // #E040FB

            const earMat = new BABYLON.StandardMaterial("earMat", scene);
            earMat.diffuseColor = new BABYLON.Color3(1, 0.7, 0.7);

            const waterMat = new BABYLON.StandardMaterial("waterMat", scene);
            waterMat.diffuseColor = new BABYLON.Color3(0.01, 0.53, 0.82); // #0288D1
            waterMat.alpha = 0.8;

            const islandMat = new BABYLON.StandardMaterial("islandMat", scene);
            islandMat.diffuseColor = new BABYLON.Color3(0.3, 0.69, 0.31); // #4CAF50

            const sharkMat = new BABYLON.StandardMaterial("sharkMat", scene);
            sharkMat.diffuseColor = new BABYLON.Color3(0.38, 0.49, 0.55); // #607D8B

            const redMat = new BABYLON.StandardMaterial("redMat", scene);
            redMat.diffuseColor = new BABYLON.Color3(1, 0, 0);

            // Create Player (Rabbit)
            player = BABYLON.MeshBuilder.CreateBox("player", {width: 1.5, height: 1.5, depth: 1.5}, scene);
            player.material = rabbitMat;
            player.position.y = 0.75;
            shadowGenerator.addShadowCaster(player);

            const leftEar = BABYLON.MeshBuilder.CreateBox("leftEar", {width: 0.3, height: 1, depth: 0.3}, scene);
            leftEar.parent = player;
            leftEar.position = new BABYLON.Vector3(-0.4, 1.2, 0);
            leftEar.material = earMat;

            const rightEar = BABYLON.MeshBuilder.CreateBox("rightEar", {width: 0.3, height: 1, depth: 0.3}, scene);
            rightEar.parent = player;
            rightEar.position = new BABYLON.Vector3(0.4, 1.2, 0);
            rightEar.material = earMat;

            // Create Pond/Water
            const water = BABYLON.MeshBuilder.CreateGround("water", {width: 60, height: 40}, scene);
            water.material = waterMat;
            water.position.y = -2;
            water.receiveShadows = true;

            // Create Island
            island = BABYLON.MeshBuilder.CreateCylinder("island", {height: 1, diameter: 16}, scene);
            island.material = islandMat;
            island.position.y = -1.5;
            island.receiveShadows = true;

            // Create Shark Boss
            shark = BABYLON.MeshBuilder.CreateCylinder("shark", {height: 6, diameterTop: 0, diameterBottom: 1.5, tessellation: 8}, scene);
            shark.material = sharkMat;
            shark.rotation.z = Math.PI / 2; // Lay flat
            shark.position.y = -2;
            shark.isVisible = false;
            shadowGenerator.addShadowCaster(shark);

            const fin = BABYLON.MeshBuilder.CreateCylinder("fin", {height: 1.5, diameterTop: 0, diameterBottom: 0.8, tessellation: 4}, scene);
            fin.parent = shark;
            fin.position = new BABYLON.Vector3(0, 1.5, 0);
            fin.material = sharkMat;

            // --- GUI Setup ---
            advancedTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI");

            scoreText = new BABYLON.GUI.TextBlock();
            scoreText.text = "Score: 0";
            scoreText.color = "white";
            scoreText.fontSize = 32;
            scoreText.fontWeight = "bold";
            scoreText.textHorizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
            scoreText.textVerticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
            scoreText.left = "20px";
            scoreText.top = "20px";
            scoreText.shadowColor = "black";
            scoreText.shadowBlur = 4;
            advancedTexture.addControl(scoreText);

            phaseText = new BABYLON.GUI.TextBlock();
            phaseText.text = "Phase: Rescue";
            phaseText.color = "#E040FB";
            phaseText.fontSize = 32;
            phaseText.fontWeight = "bold";
            phaseText.textHorizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_RIGHT;
            phaseText.textVerticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
            phaseText.left = "-20px";
            phaseText.top = "20px";
            phaseText.shadowColor = "black";
            phaseText.shadowBlur = 4;
            advancedTexture.addControl(phaseText);

            // Boss HP UI
            bossHpBg = new BABYLON.GUI.Rectangle();
            bossHpBg.width = "400px";
            bossHpBg.height = "25px";
            bossHpBg.background = "#333333";
            bossHpBg.thickness = 3;
            bossHpBg.color = "white";
            bossHpBg.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_CENTER;
            bossHpBg.verticalAlignment = BABYLON.GUI.Control.VERTICAL_ALIGNMENT_TOP;
            bossHpBg.top = "70px";
            bossHpBg.isVisible = false;
            advancedTexture.addControl(bossHpBg);

            bossHpBar = new BABYLON.GUI.Rectangle();
            bossHpBar.width = 1; // 100%
            bossHpBar.height = "100%";
            bossHpBar.background = "red";
            bossHpBar.thickness = 0;
            bossHpBar.horizontalAlignment = BABYLON.GUI.Control.HORIZONTAL_ALIGNMENT_LEFT;
            bossHpBg.addControl(bossHpBar);

            let bossLabel = new BABYLON.GUI.TextBlock();
            bossLabel.text = "SHARK BOSS";
            bossLabel.color = "#FF5252";
            bossLabel.fontSize = 24;
            bossLabel.fontWeight = "bold";
            bossLabel.top = "-30px";
            bossLabel.shadowColor = "black";
            bossLabel.shadowBlur = 2;
            bossHpBg.addControl(bossLabel);

            // Center Messages
            centerMsgText = new BABYLON.GUI.TextBlock();
            centerMsgText.text = "";
            centerMsgText.color = "#FF5252";
            centerMsgText.fontSize = 72;
            centerMsgText.fontWeight = "bold";
            centerMsgText.shadowColor = "black";
            centerMsgText.shadowOffsetX = 3;
            centerMsgText.shadowOffsetY = 3;
            centerMsgText.isVisible = false;
            advancedTexture.addControl(centerMsgText);

            // Inputs
            scene.onKeyboardObservable.add((kbInfo) => {
                switch (kbInfo.type) {
                    case BABYLON.KeyboardEventTypes.KEYDOWN:
                        inputMap[kbInfo.event.key] = true;

                        if (kbInfo.event.key === "ArrowUp" && phase === 'rescue' && !playerState.isJumping) {
                            playerState.vy = 0.6;
                            playerState.isJumping = true;
                        }
                        break;
                    case BABYLON.KeyboardEventTypes.KEYUP:
                        inputMap[kbInfo.event.key] = false;
                        break;
                }
            });

            // Store materials for reuse
            scene.pinkMat = pinkMat;
            scene.rabbitMat = rabbitMat;
            scene.sharkMat = sharkMat;
            scene.redMat = redMat;
            scene.shadowGen = shadowGenerator;

            return scene;
        };

        const scene = createScene();

        // Helpers
        function checkCollision(mesh1, mesh2, dist) {
            return BABYLON.Vector3.Distance(mesh1.position, mesh2.position) < dist;
        }

        function triggerBoss() {
            phase = 'boss';
            phaseText.text = "Phase: BOSS FIGHT!";
            phaseText.color = "#FF5252";

            unicorns.forEach(u => u.mesh.dispose());
            unicorns = [];

            // Ascend to sky
            player.position.y = 12;
            player.material = scene.pinkMat; // Riding unicorn
            island.position.y = -10; // sink island

            sharkData.hp = 10 + (targetBossScore/200) * 5;
            sharkData.maxHp = sharkData.hp;
            sharkData.speed = 0.15 + (targetBossScore/200) * 0.05;
            shark.position.set(0, -2, 0);
            shark.isVisible = true;
            sharkData.state = 'swimming';
            sharkData.dir = 1;

            bossHpBg.isVisible = true;
            bossHpBar.width = 1;

            centerMsgText.text = "SHARK ATTACK!";
            centerMsgText.isVisible = true;
            setTimeout(() => centerMsgText.isVisible = false, 2000);
        }

        function defeatBoss() {
            score += 50;
            targetBossScore += 200;
            scoreText.text = "Score: " + score;

            phase = 'rescue';
            phaseText.text = "Phase: Rescue";
            phaseText.color = "#E040FB";

            player.position.y = 0.75;
            player.material = scene.rabbitMat;
            island.position.y = -1.5;

            shark.isVisible = false;
            bossHpBg.isVisible = false;
            bullets.forEach(b => b.dispose());
            bullets = [];

            centerMsgText.text = "BOSS DEFEATED!";
            centerMsgText.isVisible = true;
            setTimeout(() => centerMsgText.isVisible = false, 2000);
        }

        // Game Loop
        engine.runRenderLoop(function () {
            if (gameOver) return;

            // Player Movement
            if (inputMap["ArrowLeft"]) player.position.x -= playerState.speed;
            if (inputMap["ArrowRight"]) player.position.x += playerState.speed;

            if (player.position.x < -playerState.bounds) player.position.x = -playerState.bounds;
            if (player.position.x > playerState.bounds) player.position.x = playerState.bounds;

            if (phase === 'rescue') {
                // Jumping logic
                if (playerState.isJumping) {
                    playerState.vy -= 0.03; // gravity
                    player.position.y += playerState.vy;
                    if (player.position.y <= 0.75) {
                        player.position.y = 0.75;
                        playerState.isJumping = false;
                        playerState.vy = 0;
                    }
                }

                // Spawn Unicorns
                if (Math.random() < 0.02) {
                    const uMesh = BABYLON.MeshBuilder.CreateSphere("unicorn", {diameter: 2}, scene);
                    uMesh.material = scene.pinkMat;
                    uMesh.position.set((Math.random() - 0.5) * 30, 20, 0);
                    scene.shadowGen.addShadowCaster(uMesh);
                    unicorns.push({ mesh: uMesh, speed: 0.1 + Math.random() * 0.1 });
                }

                // Update Unicorns
                for (let i = unicorns.length - 1; i >= 0; i--) {
                    let u = unicorns[i];
                    u.mesh.position.y -= u.speed;
                    u.mesh.rotation.x += 0.05;

                    if (checkCollision(player, u.mesh, 2.5)) {
                        u.mesh.dispose();
                        unicorns.splice(i, 1);
                        score += 20;
                        scoreText.text = "Score: " + score;
                        if (score >= targetBossScore) triggerBoss();
                        continue;
                    }

                    if (u.mesh.position.y < -5) {
                        u.mesh.dispose();
                        unicorns.splice(i, 1);
                    }
                }
            } 
            else if (phase === 'boss') {
                // Shooting
                if (inputMap[" "] || inputMap["Spacebar"]) {
                    let now = Date.now();
                    if (now - lastFired > 300) {
                        lastFired = now;
                        const bMesh = BABYLON.MeshBuilder.CreateSphere("bullet", {diameter: 0.8}, scene);
                        const bMat = new BABYLON.StandardMaterial("bMat", scene);
                        bMat.emissiveColor = new BABYLON.Color3(1, 1, 0);
                        bMesh.material = bMat;
                        bMesh.position.copyFrom(player.position);
                        bMesh.position.y -= 1;
                        bullets.push(bMesh);
                    }
                }

                // Update Bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    b.position.y -= 0.6;

                    if (checkCollision(b, shark, 3)) {
                        b.dispose();
                        bullets.splice(i, 1);

                        // Flash
                        shark.material = scene.redMat;
                        setTimeout(() => { if(shark) shark.material = scene.sharkMat; }, 100);

                        sharkData.hp--;
                        bossHpBar.width = sharkData.hp / sharkData.maxHp;

                        if (sharkData.hp <= 0) defeatBoss();
                        continue;
                    }

                    if (b.position.y < -5) {
                        b.dispose();
                        bullets.splice(i, 1);
                    }
                }

                // Boss AI
                if (sharkData.state === 'swimming') {
                    shark.position.x += sharkData.speed * sharkData.dir;
                    shark.rotation.y = sharkData.dir === 1 ? 0 : Math.PI;

                    if (shark.position.x > 18) sharkData.dir = -1;
                    if (shark.position.x < -18) sharkData.dir = 1;

                    if (Math.random() < 0.015) {
                        sharkData.state = 'jumping';
                        sharkData.vy = 0.8;
                        shark.rotation.z = 0; // point up
                    }
                } else if (sharkData.state === 'jumping') {
                    sharkData.vy -= 0.03;
                    shark.position.y += sharkData.vy;

                    let targetRot = sharkData.vy > 0 ? 0 : Math.PI;
                    shark.rotation.z += (targetRot - shark.rotation.z) * 0.1;

                    if (shark.position.y <= -2 && sharkData.vy < 0) {
                        shark.position.y = -2;
                        sharkData.state = 'swimming';
                        shark.rotation.z = Math.PI / 2; // flat
                        sharkData.dir = Math.random() > 0.5 ? 1 : -1;
                    }
                }

                // Game Over Check
                if (checkCollision(player, shark, 3.5)) {
                    gameOver = true;
                    player.material = scene.redMat;
                    document.getElementById('overlay').style.display = 'flex';
                }
            }

            scene.render();
        });

        // Resize
        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
