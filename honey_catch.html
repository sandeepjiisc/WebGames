<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey Jar Catch!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB; /* Sky blue background */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        h1 {
            color: #FF8C00;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
            margin: 10px 0;
            font-size: 36px;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            border: 5px solid #FFD700;
            background: linear-gradient(180deg, #A1EAFF 0%, #E2F9FF 100%);
        }
        canvas {
            display: block;
        }
        #score-board {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #FF1493;
            text-shadow: 2px 2px 0px #fff;
        }
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        #game-over h2 {
            font-size: 48px;
            color: #FF3333;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px #000;
        }
        #game-over p {
            font-size: 24px;
            margin: 0 0 30px 0;
        }
        button {
            padding: 15px 30px;
            font-size: 24px;
            font-family: inherit;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #2E8B57;
            transition: all 0.1s;
        }
        button:active {
            box-shadow: 0 2px 0 #2E8B57;
            transform: translateY(3px);
        }
        #instructions {
            margin-top: 15px;
            font-size: 18px;
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🍯 Catch the Smiles! 😊</h1>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="500"></canvas>
        <div id="score-board">Score: <span id="score">0</span></div>

        <div id="game-over">
            <h2>Oh no! Game Over!</h2>
            <p>You caught an angry red smiley!</p>
            <p>Final Score: <span id="final-score">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div id="instructions">
        <strong>How to play:</strong> Use ⬅️ and ➡️ arrow keys to move the honey jar.<br>
        Catch the happy smileys for points! Avoid the 🔴 <strong>red angry smileys</strong>!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        // Game state
        let score = 0;
        let isGameOver = false;
        let animationId;
        let frameCount = 0;

        // Inputs
        const keys = {
            ArrowLeft: false,
            ArrowRight: false
        };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
                e.preventDefault();
            }
        });

        // Jar Object
        const jar = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 90,
            width: 80,
            height: 80,
            speed: 7,

            draw() {
                // Jar body
                ctx.fillStyle = '#DAA520'; // Goldenrod
                ctx.beginPath();
                ctx.moveTo(this.x + 10, this.y + 20);
                ctx.lineTo(this.x + this.width - 10, this.y + 20);
                ctx.bezierCurveTo(this.x + this.width, this.y + 40, this.x + this.width, this.y + this.height - 10, this.x + this.width - 15, this.y + this.height);
                ctx.lineTo(this.x + 15, this.y + this.height);
                ctx.bezierCurveTo(this.x, this.y + this.height - 10, this.x, this.y + 40, this.x + 10, this.y + 20);
                ctx.fill();

                // Jar rim
                ctx.fillStyle = '#B8860B'; // DarkGoldenrod
                ctx.beginPath();
                ctx.roundRect(this.x + 5, this.y + 5, this.width - 10, 15, 5);
                ctx.fill();

                // Honey inside
                ctx.fillStyle = '#FFD700'; // Gold
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, this.y + 20, this.width/2 - 15, 5, 0, 0, Math.PI * 2);
                ctx.fill();

                // Label
                ctx.fillStyle = '#FFF8DC';
                ctx.fillRect(this.x + 15, this.y + 40, this.width - 30, 25);
                ctx.fillStyle = '#8B4513';
                ctx.font = '14px Comic Sans MS';
                ctx.textAlign = 'center';
                ctx.fillText('HONEY', this.x + this.width/2, this.y + 57);
            },

            update() {
                if (keys.ArrowLeft) this.x -= this.speed;
                if (keys.ArrowRight) this.x += this.speed;

                // Boundaries
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
            }
        };

        // Smileys
        const smileys = [];

        const smileyTypes = [
            { color: '#FFD700', type: 'happy', points: 10 },    // Yellow
            { color: '#00FFFF', type: 'happy', points: 15 },    // Cyan (faster maybe)
            { color: '#FF69B4', type: 'happy', points: 20 },    // Pink
            { color: '#FF3333', type: 'angry', points: 0 }      // Red (Game over)
        ];

        class Smiley {
            constructor() {
                this.radius = 20;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;

                // Increase difficulty (speed) as score goes up
                const speedMultiplier = 1 + (score / 150);
                this.speed = (Math.random() * 2 + 2) * speedMultiplier; 

                // 25% chance for a red angry smiley, else pick a random happy one
                const rand = Math.random();
                if (rand < 0.25) {
                    this.data = smileyTypes[3]; // Angry Red
                } else {
                    this.data = smileyTypes[Math.floor(Math.random() * 3)]; // Happy Colors
                }

                // Cyan ones are faster
                if(this.data.color === '#00FFFF') this.speed *= 1.5;
            }

            draw() {
                // Face circle
                ctx.fillStyle = this.data.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Eyes
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(this.x - 7, this.y - 4, 3, 0, Math.PI * 2); // Left eye
                ctx.arc(this.x + 7, this.y - 4, 3, 0, Math.PI * 2); // Right eye
                ctx.fill();

                // Mouth
                ctx.beginPath();
                if (this.data.type === 'happy') {
                    // Smile
                    ctx.arc(this.x, this.y + 2, 10, 0, Math.PI);
                } else {
                    // Frown
                    ctx.arc(this.x, this.y + 12, 10, Math.PI, Math.PI * 2);
                    // Angry eyebrows
                    ctx.moveTo(this.x - 12, this.y - 12);
                    ctx.lineTo(this.x - 4, this.y - 8);
                    ctx.moveTo(this.x + 12, this.y - 12);
                    ctx.lineTo(this.x + 4, this.y - 8);
                }
                ctx.stroke();
            }

            update() {
                this.y += this.speed;
            }
        }

        function spawnSmiley() {
            // Spawn rate gets faster as score increases
            const spawnRate = Math.max(30, 80 - Math.floor(score / 5)); 
            if (frameCount % spawnRate === 0) {
                smileys.push(new Smiley());
            }
        }

        function detectCollision() {
            for (let i = 0; i < smileys.length; i++) {
                const s = smileys[i];

                // Simple AABB box collision checking if circle center is inside jar top area
                if (s.y + s.radius > jar.y + 10 && 
                    s.y - s.radius < jar.y + 30 && 
                    s.x > jar.x && 
                    s.x < jar.x + jar.width) {

                    if (s.data.type === 'angry') {
                        gameOver();
                    } else {
                        score += s.data.points;
                        scoreElement.innerText = score;
                        // Pop effect
                        createParticles(s.x, s.y, s.data.color);
                        smileys.splice(i, 1);
                        i--;
                    }
                }
            }
        }

        // Particle effect array
        const particles = [];
        function createParticles(x, y, color) {
            for(let i=0; i<8; i++){
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 20,
                    color: color
                });
            }
        }

        function updateParticles() {
            for(let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            gameOverScreen.style.display = 'flex';
            finalScoreElement.innerText = score;
        }

        function resetGame() {
            score = 0;
            scoreElement.innerText = score;
            smileys.length = 0;
            particles.length = 0;
            jar.x = canvas.width / 2 - 40;
            isGameOver = false;
            frameCount = 0;
            gameOverScreen.style.display = 'none';
            gameLoop();
        }

        function gameLoop() {
            if (isGameOver) return;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw and update
            jar.update();
            jar.draw();

            spawnSmiley();

            for (let i = 0; i < smileys.length; i++) {
                const s = smileys[i];
                s.update();
                s.draw();

                // Remove if off screen
                if (s.y - s.radius > canvas.height) {
                    smileys.splice(i, 1);
                    i--;
                }
            }

            detectCollision();
            updateParticles();

            frameCount++;
            animationId = requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
