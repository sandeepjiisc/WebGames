<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Pong: The Classic</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .back-to-hub { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.7); color: white; border: 2px solid #06b6d4; padding: 8px 15px; border-radius: 20px; cursor: pointer; z-index: 1000; text-decoration: none; font-size: 14px; font-weight: bold; transition: all 0.2s; }
        .back-to-hub:hover { background: #06b6d4; color: #000; }
        
        #ui-layer { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 50px; pointer-events: none; z-index: 500; }
        .score-box { background: transparent; color: #fff; font-weight: bold; font-size: 60px; text-shadow: 0 0 20px #06b6d4; }
        
        #rotate-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e1b4b); color: white; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000; text-align: center;
        }
        #rotate-overlay .icon { font-size: 80px; margin-bottom: 20px; animation: rotateAnim 2s infinite; }
        @keyframes rotateAnim { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }
        @media screen and (orientation: portrait) { #rotate-overlay { display: flex; } }
        
        #game-over, #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1500; text-align: center; color: white;
        }
        #game-over { display: none; }
        #start-screen h2, #game-over h2 { font-size: 60px; margin: 0 0 20px 0; text-shadow: 0 0 20px #06b6d4; }
        #start-screen .btn-group { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        button { padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer; background: #06b6d4; border: none; color: black; border-radius: 10px; box-shadow: 0 5px 0 #0891b2; transition: transform 0.1s, box-shadow 0.1s;}
        button:active { transform: translateY(5px); box-shadow: 0 0 0 #0891b2; }

    </style>
</head>
<body>
    <a href="index.html" class="back-to-hub">🏠 Back to Hub</a>
    
    <div id="rotate-overlay">
        <div class="icon">📱🔄</div>
        <h2>ROTATE YOUR DEVICE</h2>
        <p>Pong requires a wide court</p>
    </div>

    <div id="ui-layer">
        <div class="score-box" id="p1-score">0</div>
        <div class="score-box" id="p2-score" style="text-shadow: 0 0 20px #f43f5e;">0</div>
    </div>

    <div id="start-screen">
        <h2>SELECT DIFFICULTY</h2>
        <div class="btn-group">
            <button onclick="startGame('easy')">EASY</button>
            <button onclick="startGame('medium')">MEDIUM</button>
            <button onclick="startGame('hard')">HARD</button>
        </div>
    </div>

    <div id="game-over">
        <h2 id="go-title">PLAYER WINS!</h2>
        <button onclick="resetGame()">MAIN MENU</button>
    </div>

    <div id="game-container"></div>

    <script>
    const GAME_WIDTH = 1200;
    const GAME_HEIGHT = 800;

    const config = {
        type: Phaser.WEBGL,
        width: GAME_WIDTH,
        height: GAME_HEIGHT,
        parent: 'game-container',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        backgroundColor: '#020617',
        physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
        scene: { create: create, update: update }
    };

    const game = new Phaser.Game(config);

    let player, ai, ball;
    let cursors;
    let p1Score = 0, p2Score = 0;
    const WIN_SCORE = 11;
    let isGameOver = false;
    let gameStarted = false;
    let difficulty = 'medium';
    let particles;

    // Movement state for mobile drag
    let targetY = GAME_HEIGHT / 2;

    // Advanced Physics State
    let volleyCount = 0;
    const BASE_SPEED = 500;
    let currentSpeed = BASE_SPEED;

    function create() {
        // Center dashed line
        let g = this.add.graphics();
        g.lineStyle(4, 0x334155, 0.5);
        for (let y = 0; y < GAME_HEIGHT; y += 40) {
            g.beginPath(); g.moveTo(GAME_WIDTH/2, y); g.lineTo(GAME_WIDTH/2, y + 20); g.strokePath();
        }

        // Particle System
        particles = this.add.particles(0, 0, 'particle', {
            speed: { min: 50, max: 200 },
            scale: { start: 1, end: 0 },
            blendMode: 'ADD',
            lifespan: 400
        });

        // Generate Textures
        let tg = this.add.graphics();
        tg.fillStyle(0xffffff, 1);
        tg.fillRect(0, 0, 20, 20); // Original was a square
        tg.generateTexture('ballTex', 20, 20);
        tg.clear();

        tg.fillStyle(0xffffff, 1);
        tg.fillRect(0, 0, 20, 120);
        tg.generateTexture('paddleTex', 20, 120);
        tg.clear();
        
        tg.fillStyle(0xffffff, 1); tg.fillCircle(4, 4, 4); tg.generateTexture('particle', 8, 8); tg.clear();

        // Paddles
        player = this.physics.add.sprite(50, GAME_HEIGHT/2, 'paddleTex').setImmovable(true);
        player.setTint(0x06b6d4);
        
        ai = this.physics.add.sprite(GAME_WIDTH - 50, GAME_HEIGHT/2, 'paddleTex').setImmovable(true);
        ai.setTint(0xf43f5e);

        // Ball
        ball = this.physics.add.sprite(GAME_WIDTH/2, GAME_HEIGHT/2, 'ballTex');
        ball.setBounce(1, 1);
        ball.setCollideWorldBounds(true);
        
        // Collisions
        this.physics.add.collider(ball, player, hitPaddle, null, this);
        this.physics.add.collider(ball, ai, hitPaddle, null, this);

        // Input
        cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.addKey('W');
        this.input.keyboard.addKey('S');

        // Mobile / Touch controls
        this.input.on('pointermove', function (pointer) {
            if (pointer.x < this.scale.width / 2) targetY = (pointer.y / this.scale.height) * GAME_HEIGHT;
        }, this);

        this.input.on('pointerdown', function (pointer) {
            if (pointer.x < this.scale.width / 2) targetY = (pointer.y / this.scale.height) * GAME_HEIGHT;
        }, this);
    }

    window.startGame = function(diff) {
        difficulty = diff;
        document.getElementById('start-screen').style.display = 'none';
        gameStarted = true;
        resetBall.call(game.scene.scenes[0], 1);
    }

    function resetBall(direction = 1) {
        ball.setPosition(GAME_WIDTH/2, GAME_HEIGHT/2);
        volleyCount = 0;
        currentSpeed = BASE_SPEED;
        
        // Serve toward the player who just conceded
        let angle = (Math.random() * Math.PI / 4) - Math.PI / 8; // -22.5 to 22.5 deg (shallow serve)
        if (direction === -1) angle += Math.PI; 

        ball.setVelocity(Math.cos(angle) * currentSpeed, Math.sin(angle) * currentSpeed);
        ball.clearTint();
        particles.stop();
    }

    function hitPaddle(ballObj, paddle) {
        ballObj.setTint(paddle.tintTopLeft);
        particles.start();
        particles.startFollow(ballObj);
        particles.particleTint = paddle.tintTopLeft;

        volleyCount++;
        if (volleyCount === 4 || volleyCount === 12) {
            currentSpeed *= 1.3; // Significant speed bumps at specific volleys
        } else {
            currentSpeed *= 1.02; // Micro speed bump on every hit
        }

        // 8-Segment Paddle Logic (Classic Mechanics)
        // Offset relative to center (-60 to +60)
        let offset = ballObj.y - paddle.y; 
        
        // Normalize offset to -1 to 1
        let normalizedOffset = Phaser.Math.Clamp(offset / (paddle.height / 2), -1, 1);
        
        // Max bounce angle (74 degrees in radians)
        const MAX_BOUNCE_ANGLE = 74 * (Math.PI / 180);
        
        // Calculate new angle based on segment hit
        let bounceAngle = normalizedOffset * MAX_BOUNCE_ANGLE;
        
        // If hitting the AI paddle (right side), flip the X angle
        let directionX = paddle.x < GAME_WIDTH / 2 ? 1 : -1;
        
        if (directionX === -1) {
            bounceAngle = Math.PI - bounceAngle;
        }

        // Apply new velocity
        ballObj.setVelocity(
            Math.cos(bounceAngle) * currentSpeed * directionX,
            Math.sin(bounceAngle) * currentSpeed
        );

        this.cameras.main.shake(100, 0.005);
    }

    window.resetGame = function() {
        p1Score = 0; p2Score = 0;
        document.getElementById('p1-score').innerText = p1Score;
        document.getElementById('p2-score').innerText = p2Score;
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
        isGameOver = false;
        gameStarted = false;
        ball.setPosition(GAME_WIDTH/2, GAME_HEIGHT/2);
        ball.setVelocity(0, 0);
        ball.clearTint();
        particles.stop();
    }

    function update(time, delta) {
        if (isGameOver || !gameStarted) return;

        // --- Player Controls ---
        const PADDLE_SPEED = 700;
        player.setVelocityY(0);

        if (cursors.up.isDown || this.input.keyboard.keys[87]?.isDown) {
            player.setVelocityY(-PADDLE_SPEED);
            targetY = player.y; 
        } else if (cursors.down.isDown || this.input.keyboard.keys[83]?.isDown) {
            player.setVelocityY(PADDLE_SPEED);
            targetY = player.y;
        } else {
            if (Math.abs(player.y - targetY) > 10) {
                player.y += (targetY - player.y) * 0.25; 
            }
        }

        // Top Boundary Bug (Classic Mechanic): Cannot reach the very top 10%
        const topLimit = GAME_HEIGHT * 0.1;
        if (player.y < topLimit + 60) player.y = topLimit + 60;
        if (player.y > GAME_HEIGHT - 60) player.y = GAME_HEIGHT - 60;

        // --- AI Controls ---
        let aiSpeed = 480; 
        let errorMargin = 15;
        
        if (difficulty === 'easy') {
            aiSpeed = 250;
            errorMargin = 30;
        } else if (difficulty === 'medium') {
            aiSpeed = 450;
            errorMargin = 15;
            if (currentSpeed > 800) aiSpeed = 600;
        } else if (difficulty === 'hard') {
            aiSpeed = 600;
            errorMargin = 5;
            if (currentSpeed > 1000) aiSpeed = 850; 
        }

        let predictedY = ball.y;
        
        if (ai.y < predictedY - errorMargin) {
            ai.setVelocityY(aiSpeed);
        } else if (ai.y > predictedY + errorMargin) {
            ai.setVelocityY(-aiSpeed);
        } else {
            ai.setVelocityY(0);
        }

        // Clamp AI with the same "Top Boundary" limitation
        if (ai.y < topLimit + 60) ai.y = topLimit + 60;
        if (ai.y > GAME_HEIGHT - 60) ai.y = GAME_HEIGHT - 60;

        // --- Scoring ---
        if (ball.x < -20) {
            p2Score++;
            document.getElementById('p2-score').innerText = p2Score;
            checkWin.call(this);
            if(!isGameOver) resetBall.call(this, -1); // Serve to P1
        } else if (ball.x > GAME_WIDTH + 20) {
            p1Score++;
            document.getElementById('p1-score').innerText = p1Score;
            checkWin.call(this);
            if(!isGameOver) resetBall.call(this, 1); // Serve to CPU
        }
    }

    function checkWin() {
        if (p1Score >= WIN_SCORE || p2Score >= WIN_SCORE) {
            isGameOver = true;
            ball.setVelocity(0,0);
            particles.stop();
            let goTitle = document.getElementById('go-title');
            if (p1Score >= WIN_SCORE) {
                goTitle.innerText = "YOU WIN!";
                goTitle.style.color = "#06b6d4";
            } else {
                goTitle.innerText = "CPU WINS!";
                goTitle.style.color = "#f43f5e";
            }
            document.getElementById('game-over').style.display = 'flex';
        }
    }
    </script>
</body>
</html>
