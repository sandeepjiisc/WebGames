<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casual Smiley Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ecf0f1;
            touch-action: none;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 24px;
            text-align: center;
        }
        #game-wrapper {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 10px;
            overflow: hidden;
            border: 4px solid #34495e;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            width: 95%;
            max-width: 600px;
            aspect-ratio: 6 / 7;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            text-shadow: 1px 1px 0px #fff;
            pointer-events: none;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }
        #overlay h2 {
            font-size: 36px;
            margin: 0 0 10px 0;
            color: #f1c40f;
        }
        #overlay p {
            font-size: 20px;
            margin: 0 0 20px 0;
        }
        button {
            padding: 12px 30px;
            font-size: 22px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 0 #27ae60;
            transition: all 0.1s;
            touch-action: manipulation;
        }
        button:active {
            box-shadow: 0 2px 0 #27ae60;
            transform: translateY(3px);
        }
        .controls-info {
            margin-top: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        #mobile-controls {
            display: flex;
            width: 95%;
            max-width: 600px;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px;
        }

        .d-pad {
            display: flex;
            gap: 10px;
            flex: 1;
        }

        .mobile-btn {
            flex: 1;
            padding: 15px 5px;
            background: rgba(52, 152, 219, 0.8);
            border: 3px solid #2980b9;
            color: white;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            user-select: none;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 4px 0 #2980b9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mobile-btn.action {
            background: rgba(231, 76, 60, 0.8);
            border-color: #c0392b;
            box-shadow: 0 4px 0 #c0392b;
            flex: 1.2;
        }

        .mobile-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 transparent;
        }

        @media screen and (min-width: 768px) {
            h1 { font-size: 32px; margin: 10px 0; }
            #ui-layer { font-size: 24px; left: 20px; right: 20px; }
            .controls-info { font-size: 16px; padding: 10px 20px; margin-top: 15px; }
            #mobile-controls { display: none; }
            #overlay h2 { font-size: 48px; }
            #overlay p { font-size: 24px; margin-bottom: 30px;}
        }

        @media screen and (max-height: 600px) {
            h1 { display: none; }
            .controls-info { display: none; }
            #mobile-controls { margin-top: 5px; }
            .mobile-btn { padding: 10px 5px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <h1>👧 Casual Smiley Shooter! 💥</h1>

    <div id="game-wrapper">
        <div id="ui-layer">
            <div>Score: <span id="score">0</span> / 500</div>
            <div>Level: <span id="level">1</span></div>
        </div>

        <canvas id="gameCanvas" width="600" height="700"></canvas>

        <div id="overlay">
            <h2 id="end-title">🏆 You Win! 🏆</h2>
            <p id="end-desc">You reached 500 points!</p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="d-pad">
            <div class="mobile-btn" id="btn-left">⬅️</div>
            <div class="mobile-btn" id="btn-right">➡️</div>
        </div>
        <div class="mobile-btn action" id="btn-shoot">💥 SHOOT</div>
    </div>

    <div class="controls-info">
        <strong>Controls:</strong> ⬅️ ➡️ Buttons/Arrow Keys to Move &nbsp;|&nbsp; <strong>Shoot Button/Spacebar</strong> to Shoot<br>
        <em>Relax Mode: Game continues even if smileys fall down! Tap game area to move/shoot directly.</em>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const overlay = document.getElementById('overlay');
        const endTitle = document.getElementById('end-title');
        const endDesc = document.getElementById('end-desc');

        let score = 0;
        let level = 1;
        let gameState = 'playing'; // playing, win
        let frameCount = 0;

        // Input handling
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        let canShoot = true; 

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'Space') {
                if (canShoot && gameState === 'playing') {
                    shoot();
                    canShoot = false;
                }
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
            if (e.code === 'Space') canShoot = true;
        });

        // Touch Controls Mapping
        function bindTouch(id, code) {
            const el = document.getElementById(id);
            if (!el) return;
            const start = (e) => { e.preventDefault(); keys[code] = true; };
            const end = (e) => { e.preventDefault(); keys[code] = false; };
            el.addEventListener('touchstart', start, {passive: false});
            el.addEventListener('mousedown', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        }

        bindTouch('btn-left', 'ArrowLeft');
        bindTouch('btn-right', 'ArrowRight');

        // Custom shoot button handling to prevent rapid fire machine gunning on hold
        const btnShoot = document.getElementById('btn-shoot');
        let touchCanShoot = true;

        const handleShootPress = (e) => {
            e.preventDefault();
            if (touchCanShoot && gameState === 'playing') {
                shoot();
                touchCanShoot = false;
            }
        };
        const handleShootRelease = (e) => {
            e.preventDefault();
            touchCanShoot = true;
        };

        btnShoot.addEventListener('touchstart', handleShootPress, {passive: false});
        btnShoot.addEventListener('mousedown', handleShootPress);
        btnShoot.addEventListener('touchend', handleShootRelease);
        btnShoot.addEventListener('mouseup', handleShootRelease);
        btnShoot.addEventListener('mouseleave', handleShootRelease);

        // Direct Canvas Touch Controls (Drag to move, Tap to shoot)
        let scaleX = 1;
        let scaleY = 1;

        function updateScale() {
            const rect = canvas.getBoundingClientRect();
            scaleX = canvas.width / rect.width;
            scaleY = canvas.height / rect.height;
        }

        window.addEventListener('resize', updateScale);
        setTimeout(updateScale, 100);

        let isDragging = false;

        canvas.addEventListener('touchstart', (e) => {
            if (gameState !== 'playing') return;
            e.preventDefault();
            updateScale();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = (touch.clientX - rect.left) * scaleX;
            const touchY = (touch.clientY - rect.top) * scaleY;

            // If touching near player, start drag
            if (touchY > canvas.height - 150) {
                isDragging = true;
                player.x = touchX - player.width / 2;
            } else {
                // Tapping upper screen shoots
                if (touchCanShoot) {
                    shoot();
                    touchCanShoot = false;
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            if (gameState !== 'playing' || !isDragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = (touch.clientX - rect.left) * scaleX;

            player.x = touchX - player.width / 2;
            if (player.x < 30) player.x = 30;
            if (player.x > canvas.width - 40) player.x = canvas.width - 40;
        }, {passive: false});

        canvas.addEventListener('touchend', () => { 
            isDragging = false; 
            touchCanShoot = true;
        });

        // Player (Girl with gun)
        const player = {
            x: 300,
            y: 630,
            width: 50,
            height: 60,
            speed: 6,
            draw() {
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👧', this.x, this.y);

                ctx.font = '30px Arial';
                ctx.fillText('🔫', this.x + 20, this.y - 10);
            },
            update() {
                if (keys.ArrowLeft) this.x -= this.speed;
                if (keys.ArrowRight) this.x += this.speed;

                if (this.x < 30) this.x = 30;
                if (this.x > canvas.width - 40) this.x = canvas.width - 40;
            }
        };

        let bullets = [];
        let smileys = [];
        const smileyEmojis = ['😀', '😂', '😎', '😍', '🥳', '😜'];

        function shoot() {
            bullets.push({
                x: player.x + 20, 
                y: player.y - 30,
                radius: 6,
                speed: 10,
                color: '#e74c3c'
            });
        }

        class Smiley {
            constructor() {
                this.radius = 25;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -30;

                let baseSpeed = level === 1 ? 1 : 2.5; 
                this.speed = baseSpeed + Math.random() * 1.0;

                this.emoji = smileyEmojis[Math.floor(Math.random() * smileyEmojis.length)];
            }
            draw() {
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, this.x, this.y);
            }
            update() {
                this.y += this.speed;
            }
        }

        function spawnSmileys() {
            let spawnRate = level === 1 ? 80 : 50; 
            if (frameCount % spawnRate === 0) {
                smileys.push(new Smiley());
            }
        }

        let particles = [];
        function createExplosion(x, y) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 20,
                    color: ['#f1c40f', '#e67e22', '#e74c3c'][Math.floor(Math.random()*3)]
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function checkLevelProgression() {
            if (score >= 500 && gameState === 'playing') {
                gameState = 'win';
                overlay.style.display = 'flex';
            } 
            else if (score >= 200 && level === 1) {
                level = 2;
                levelEl.innerText = level;
                levelEl.style.color = '#e74c3c';

                let banner = document.createElement('div');
                banner.innerText = "LEVEL 2 - SPEED UP!";
                banner.style.position = 'absolute';
                banner.style.top = '30%';
                banner.style.left = '50%';
                banner.style.transform = 'translate(-50%, -50%)';
                banner.style.color = '#e74c3c';
                banner.style.fontSize = '40px';
                banner.style.fontWeight = 'bold';
                banner.style.textShadow = '2px 2px #fff';
                banner.style.zIndex = '5';
                banner.style.textAlign = 'center';
                banner.style.width = '100%';
                document.getElementById('game-wrapper').appendChild(banner);

                setTimeout(() => banner.remove(), 2000);
            }
        }

        function updateLogic() {
            if (gameState !== 'playing') return;

            player.update();
            spawnSmileys();

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y -= b.speed;
                if (b.y < 0) bullets.splice(i, 1); 
            }

            for (let i = smileys.length - 1; i >= 0; i--) {
                let s = smileys[i];
                s.update();

                if (s.y > canvas.height + 20) {
                    smileys.splice(i, 1);
                    continue; 
                }

                // Check collision with bullets
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let dist = Math.hypot(b.x - s.x, b.y - s.y);
                    if (dist < s.radius + b.radius) {
                        createExplosion(s.x, s.y);
                        smileys.splice(i, 1);
                        bullets.splice(j, 1);

                        score += 20; 
                        scoreEl.innerText = score;
                        checkLevelProgression();
                        break; 
                    }
                }
            }
            frameCount++;
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = b.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            smileys.forEach(s => s.draw());
            player.draw();
            updateParticles();
        }

        function gameLoop() {
            updateLogic();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        window.resetGame = function() {
            score = 0;
            level = 1;
            scoreEl.innerText = score;
            levelEl.innerText = level;
            levelEl.style.color = '#2c3e50';
            bullets = [];
            smileys = [];
            particles = [];
            player.x = 300;
            gameState = 'playing';
            overlay.style.display = 'none';
            frameCount = 0;
        }

        // Start
        gameLoop();
    </script>
</body>
</html>
