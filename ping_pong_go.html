<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ping Pong Go! - Arcade Table Tennis</title>
    <style>
        :root {
            --bg: #0f172a;
            --table: #1e3a8a;
            --table-light: #3b82f6;
            --primary: #fbbf24;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        canvas {
            background: #111;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 4px solid #334155;
            cursor: none;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .score-box {
            background: rgba(0,0,0,0.5);
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            backdrop-filter: blur(5px);
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            pointer-events: auto;
            text-decoration: none;
            font-size: 16px;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: auto;
        }

        #overlay h2 { font-size: 48px; margin-bottom: 20px; color: var(--primary); }
        .btn-large {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-large:active { transform: scale(0.95); }

        .level-info {
            font-size: 20px;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        @media (max-width: 600px) {
            #overlay h2 { font-size: 32px; }
            .hud { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-layer">
            <div class="hud">
                <a href="index.html" class="back-btn">🏠 Hub</a>
                <div class="score-box">
                    YOU <span id="player-score">0</span> - <span id="ai-score">0</span> AI
                </div>
                <div id="level-indicator">Level 1</div>
            </div>
        </div>

        <div id="overlay">
            <div class="level-info" id="level-desc">Level 1: Rookie Tournament</div>
            <h2 id="overlay-title">PING PONG GO!</h2>
            <button class="btn-large" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pScoreEl = document.getElementById('player-score');
        const aScoreEl = document.getElementById('ai-score');
        const levelEl = document.getElementById('level-indicator');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const levelDescEl = document.getElementById('level-desc');

        // Responsive Canvas
        let W = 800;
        let H = 500;
        function resize() {
            const aspect = 8 / 5;
            let w = Math.min(window.innerWidth - 40, 800);
            let h = w / aspect;
            canvas.width = w;
            canvas.height = h;
            W = w; H = h;
        }
        window.addEventListener('resize', resize);
        resize();

        // Game State
        let gameActive = false;
        let scorePlayer = 0;
        let scoreAI = 0;
        let currentLevel = 1;
        const maxScore = 7;

        const levelData = [
            { name: "Rookie Tournament", aiSpeed: 0.05, aiError: 30 },
            { name: "Pro Circuit", aiSpeed: 0.08, aiError: 20 },
            { name: "Global Masters", aiSpeed: 0.12, aiError: 10 },
            { name: "Ultimate Ninja", aiSpeed: 0.18, aiError: 5 }
        ];

        // Entities
        const ball = {
            x: W / 2, y: H / 2,
            z: 0, // Depth simulation
            vx: 4, vy: 2, vz: 5,
            radius: 10,
            color: '#fbbf24'
        };

        const paddlePlayer = {
            x: W / 2, y: H - 50,
            w: 100, h: 15,
            targetX: W / 2,
            color: '#ef4444'
        };

        const paddleAI = {
            x: W / 2, y: 50,
            w: 100, h: 15,
            color: '#3b82f6'
        };

        function startGame() {
            overlay.style.display = 'none';
            gameActive = true;
            resetBall();
        }

        function resetBall() {
            ball.x = W / 2;
            ball.y = H / 2;
            ball.z = 0;
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * (3 + currentLevel);
            ball.vy = (Math.random() > 0.5 ? 1 : -1) * (2 + currentLevel * 0.5);
            ball.vz = 0; // Flat for simplicity
        }

        function handleMove(clientX) {
            const rect = canvas.getBoundingClientRect();
            let x = (clientX - rect.left) * (W / rect.width);
            paddlePlayer.x = Math.max(paddlePlayer.w / 2, Math.min(W - paddlePlayer.w / 2, x));
        }

        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX));
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleMove(e.touches[0].clientX);
        }, { passive: false });

        function update() {
            if (!gameActive) return;

            // Ball Physics
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Wall Bounce
            if (ball.x < ball.radius || ball.x > W - ball.radius) {
                ball.vx *= -1;
            }

            // AI Logic
            const ld = levelData[currentLevel - 1] || levelData[0];
            const aiTarget = ball.x + (Math.random() - 0.5) * ld.aiError;
            paddleAI.x += (aiTarget - paddleAI.x) * ld.aiSpeed;
            paddleAI.x = Math.max(paddleAI.w / 2, Math.min(W - paddleAI.w / 2, paddleAI.x));

            // Collision - Player
            if (ball.vy > 0 && ball.y > paddlePlayer.y - 10 && ball.y < paddlePlayer.y + 10) {
                if (ball.x > paddlePlayer.x - paddlePlayer.w / 2 && ball.x < paddlePlayer.x + paddlePlayer.w / 2) {
                    ball.vy *= -1.05;
                    // Add spin based on where it hit the paddle
                    let delta = ball.x - paddlePlayer.x;
                    ball.vx += delta * 0.1;
                }
            }

            // Collision - AI
            if (ball.vy < 0 && ball.y < paddleAI.y + 10 && ball.y > paddleAI.y - 10) {
                if (ball.x > paddleAI.x - paddleAI.w / 2 && ball.x < paddleAI.x + paddleAI.w / 2) {
                    ball.vy *= -1.05;
                    let delta = ball.x - paddleAI.x;
                    ball.vx += delta * 0.1;
                }
            }

            // Scoring
            if (ball.y < 0) {
                scorePlayer++;
                pScoreEl.innerText = scorePlayer;
                checkWin();
                resetBall();
            } else if (ball.y > H) {
                scoreAI++;
                aScoreEl.innerText = scoreAI;
                checkWin();
                resetBall();
            }
        }

        function checkWin() {
            if (scorePlayer >= maxScore) {
                if (currentLevel < levelData.length) {
                    currentLevel++;
                    overlayTitle.innerText = "YOU WON!";
                    levelDescEl.innerText = `Next: Level ${currentLevel} - ${levelData[currentLevel-1].name}`;
                } else {
                    overlayTitle.innerText = "GRAND CHAMPION!";
                    levelDescEl.innerText = "You beat all tournaments!";
                }
                resetMatch();
            } else if (scoreAI >= maxScore) {
                overlayTitle.innerText = "GAME OVER";
                levelDescEl.innerText = "Better luck next time!";
                resetMatch();
            }
        }

        function resetMatch() {
            gameActive = false;
            overlay.style.display = 'flex';
            scorePlayer = 0;
            scoreAI = 0;
            pScoreEl.innerText = '0';
            aScoreEl.innerText = '0';
            levelEl.innerText = `Level ${currentLevel}`;
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Table Background
            ctx.fillStyle = '#1e3a8a';
            ctx.fillRect(0, 0, W, H);

            // Table Markings
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            ctx.strokeRect(10, 10, W - 20, H - 20);
            
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(0, H / 2);
            ctx.lineTo(W, H / 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Paddles
            ctx.fillStyle = paddlePlayer.color;
            ctx.fillRect(paddlePlayer.x - paddlePlayer.w / 2, paddlePlayer.y, paddlePlayer.w, paddlePlayer.h);
            
            ctx.fillStyle = paddleAI.color;
            ctx.fillRect(paddleAI.x - paddleAI.w / 2, paddleAI.y - paddleAI.h, paddleAI.w, paddleAI.h);

            // Ball
            ctx.fillStyle = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Ball Glow
            ctx.shadowBlur = 10;
            ctx.shadowColor = ball.color;
            ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
