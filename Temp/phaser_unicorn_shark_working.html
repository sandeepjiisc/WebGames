<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Critical for mobile and iframes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PixiJS Unicorn Rescue & Shark Boss</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #121220;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overscroll-behavior: none;
        }
        h1 {
            color: #E040FB;
            margin: 10px 0;
            font-size: clamp(20px, 4vw, 24px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
            text-align: center;
        }
        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 10px;
            box-sizing: border-box;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 4px solid #9C27B0;
            border-radius: 10px;
            overflow: hidden; /* Canvas stays inside */
            width: 100%;
            aspect-ratio: 4 / 3;
            background-color: #81D4FA;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            touch-action: none;
        }

        /* DESKTOP CONTROLS */
        .controls {
            margin: 10px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            color: white;
            z-index: 10;
            display: block;
        }

        /* MOBILE CONTROLS OVERLAY */
        #mobile-controls {
            /* Positioned absolute TO THE GAME CONTAINER so it's always visible over the canvas */
            position: absolute;
            bottom: 5%; 
            left: 0;
            width: 100%;
            padding: 0 5%;
            box-sizing: border-box;
            display: flex; /* FORCE VISIBLE BY DEFAULT ON MOBILE */
            justify-content: space-between;
            z-index: 9999;
            pointer-events: none; /* Let touches pass through the empty space */
        }

        .d-pad, .action-pad {
            display: flex;
            gap: 15px;
            pointer-events: auto; /* Re-enable for buttons */
        }

        .m-btn {
            width: clamp(50px, 15vw, 75px);
            height: clamp(50px, 15vw, 75px);
            background: rgba(224, 64, 251, 0.7);
            border: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(20px, 6vw, 30px);
            color: white;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .m-btn:active {
            background: rgba(224, 64, 251, 1);
            transform: scale(0.9);
        }

        #btn-action {
            width: clamp(60px, 18vw, 85px);
            height: clamp(60px, 18vw, 85px);
            font-weight: bold;
            font-size: clamp(14px, 4vw, 20px);
            border-radius: 20px;
        }

        /* HIDE MOBILE CONTROLS ON LARGE DESKTOP SCREENS */
        @media (min-width: 1024px) {
            #mobile-controls {
                display: none !important;
            }
        }

        /* HIDE DESKTOP INSTRUCTIONS ON MOBILE */
        @media (max-width: 1023px) {
            .controls {
                display: none !important;
            }
        }

        /* GAME OVER OVERLAY */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
        }
        #overlay h2 {
            font-size: clamp(30px, 8vw, 48px);
            color: #FF5252;
            margin: 0 0 20px 0;
        }
        #overlay button {
            padding: 12px 30px;
            font-size: clamp(16px, 4vw, 22px);
            background-color: #E040FB;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🦄 Rescue & Shark Boss</h1>

    <div id="game-wrapper">
        <div id="game-container">
            <!-- PixiJS Canvas injects here -->

            <!-- CONTROLS ARE INSIDE THE CONTAINER SO THEY STAY OVER THE GAME -->
            <div id="mobile-controls">
                <div class="d-pad">
                    <div class="m-btn" id="btn-left">⬅️</div>
                    <div class="m-btn" id="btn-right">➡️</div>
                </div>
                <div class="action-pad">
                    <div class="m-btn" id="btn-action">JUMP</div>
                </div>
            </div>

            <div id="overlay">
                <h2>Game Over!</h2>
                <button onclick="location.reload()">Play Again</button>
            </div>
        </div>
    </div>

    <div class="controls" id="desktop-controls">
        <strong>Rescue:</strong> ⬅️ ➡️ to Move | <strong>UP Arrow</strong> to Jump<br>
        <strong>Boss:</strong> ⬅️ ➡️ to Move | <strong>Spacebar</strong> to Shoot
    </div>

    <script>
        // --- PIXI SETUP ---
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        const POND_Y = 480;

        const app = new PIXI.Application({
            width: GAME_WIDTH,
            height: GAME_HEIGHT,
            backgroundColor: 0x81D4FA,
            antialias: true
        });

        // Insert canvas inside game-container but BEFORE the mobile controls and overlay
        const container = document.getElementById('game-container');
        container.insertBefore(app.view, container.firstChild);

        // --- GAME STATE ---
        let score = 0;
        let phase = 'rescue';
        let targetBossScore = 200;
        let gameOver = false;

        let unicorns = [];
        let bullets = [];
        let savedRabbits = [];

        let sharkData = { hp: 10, maxHp: 10, speed: 3.5, dir: 1, state: 'swimming', vy: 0 };
        let playerState = { vy: 0, isJumping: false, speed: 5 };

        // --- INPUTS ---
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, Space: false };
        let lastFired = 0;

        // Desktop Keyboards
        window.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if(e.code === 'ArrowUp' && phase === 'rescue' && !playerState.isJumping) {
                playerState.vy = -12;
                playerState.isJumping = true;
            }
        });
        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        // Mobile Touch mapping
        const bindTouch = (id, onDown, onUp) => {
            const btn = document.getElementById(id);
            if(!btn) return;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(); }, {passive: false});
            btn.addEventListener('touchend', (e) => { e.preventDefault(); onUp(); }, {passive: false});
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); onUp(); }, {passive: false});
        };

        bindTouch('btn-left', () => keys.ArrowLeft = true, () => keys.ArrowLeft = false);
        bindTouch('btn-right', () => keys.ArrowRight = true, () => keys.ArrowRight = false);
        bindTouch('btn-action', 
            () => {
                keys.Space = true;
                keys.ArrowUp = true;
                if (phase === 'rescue' && !playerState.isJumping) {
                    playerState.vy = -12;
                    playerState.isJumping = true;
                }
            }, 
            () => {
                keys.Space = false;
                keys.ArrowUp = false;
            }
        );

        setInterval(() => {
            const btnAction = document.getElementById('btn-action');
            if(btnAction) {
                btnAction.innerText = phase === 'boss' ? 'FIRE' : 'JUMP';
            }
        }, 500);

        // --- CONTAINERS (Layers) ---
        const bgLayer = new PIXI.Container();
        const mainLayer = new PIXI.Container();
        const waterLayer = new PIXI.Container();
        const uiLayer = new PIXI.Container();

        app.stage.addChild(bgLayer);
        app.stage.addChild(mainLayer);
        app.stage.addChild(waterLayer);
        app.stage.addChild(uiLayer);

        // --- GRAPHICS & TEXTURES ---
        const waterRect = new PIXI.Graphics();
        waterRect.beginFill(0x0288D1, 0.6);
        waterRect.drawRect(0, POND_Y + 20, GAME_WIDTH, GAME_HEIGHT - POND_Y);
        waterRect.endFill();
        waterLayer.addChild(waterRect);

        const groundLine = new PIXI.Graphics();
        groundLine.beginFill(0x1A237E, 1);
        groundLine.drawRect(0, POND_Y + 15, GAME_WIDTH, 5);
        groundLine.endFill();
        bgLayer.addChild(groundLine);

        const createEmojiSprite = (emoji, size, x, y, anchorY = 1) => {
            const text = new PIXI.Text(emoji, new PIXI.TextStyle({ fontSize: size, fill: '#ffffff' }));
            text.anchor.set(0.5, anchorY);
            text.x = x;
            text.y = y;
            return text;
        };

        // --- ENTITIES ---
        const player = createEmojiSprite('🐰', 45, GAME_WIDTH/2, POND_Y);
        mainLayer.addChild(player);

        const shark = createEmojiSprite('🦈', 70, GAME_WIDTH/2, 530, 0.5);
        shark.visible = false;
        mainLayer.addChild(shark);

        // --- UI ---
        const scoreText = new PIXI.Text('Score: 0', new PIXI.TextStyle({ fontSize: 28, fill: '#1A237E', fontWeight: 'bold' }));
        scoreText.position.set(20, 15);
        uiLayer.addChild(scoreText);

        const phaseText = new PIXI.Text('Phase: Rescue', new PIXI.TextStyle({ fontSize: 24, fill: '#1A237E', fontWeight: 'bold' }));
        phaseText.anchor.set(1, 0);
        phaseText.position.set(GAME_WIDTH - 20, 15);
        uiLayer.addChild(phaseText);

        const centerMsg = new PIXI.Text('', new PIXI.TextStyle({ fontSize: 50, fill: '#F44336', fontWeight: 'bold', stroke: '#ffffff', strokeThickness: 6 }));
        centerMsg.anchor.set(0.5);
        centerMsg.position.set(GAME_WIDTH/2, 300);
        centerMsg.visible = false;
        uiLayer.addChild(centerMsg);

        const bossHpBg = new PIXI.Graphics();
        bossHpBg.beginFill(0x333333);
        bossHpBg.lineStyle(3, 0xffffff);
        bossHpBg.drawRect(200, 50, 400, 20);
        bossHpBg.endFill();
        bossHpBg.visible = false;
        uiLayer.addChild(bossHpBg);

        const bossHpFill = new PIXI.Graphics();
        bossHpFill.visible = false;
        uiLayer.addChild(bossHpFill);

        function updateHpBar() {
            bossHpFill.clear();
            if(phase !== 'boss') return;
            const fillWidth = 400 * (sharkData.hp / sharkData.maxHp);
            bossHpFill.beginFill(0xF44336);
            bossHpFill.drawRect(200, 50, fillWidth, 20);
            bossHpFill.endFill();
        }

        function checkCollision(obj1, obj2, dist) {
            const dx = obj1.x - obj2.x;
            const dy = (obj1.y - (obj1.height/2)) - (obj2.y - (obj2.height/2));
            return Math.sqrt(dx*dx + dy*dy) < dist;
        }

        function triggerBoss() {
            phase = 'boss';
            phaseText.text = 'Phase: BOSS FIGHT!';
            phaseText.style.fill = '#F44336';

            unicorns.forEach(u => mainLayer.removeChild(u.sprite));
            unicorns = [];

            player.y = 80;
            player.text = '🦄🐰🔫';
            player.scale.x = 1;

            sharkData.hp = 10 + (targetBossScore/200) * 5;
            sharkData.maxHp = sharkData.hp;
            sharkData.speed = 3.5 + (targetBossScore/200);
            shark.x = GAME_WIDTH/2;
            shark.y = 530;
            shark.visible = true;
            sharkData.state = 'swimming';
            sharkData.dir = 1;

            bossHpBg.visible = true;
            bossHpFill.visible = true;
            updateHpBar();

            centerMsg.text = "SHARK ATTACK!";
            centerMsg.visible = true;
            setTimeout(() => centerMsg.visible = false, 2000);
        }

        function defeatBoss() {
            score += 50;
            targetBossScore += 200;
            scoreText.text = 'Score: ' + score;

            phase = 'rescue';
            phaseText.text = 'Phase: Rescue';
            phaseText.style.fill = '#1A237E';

            player.y = POND_Y;
            player.text = '🐰';

            shark.visible = false;
            bossHpBg.visible = false;
            bossHpFill.visible = false;
            bullets.forEach(b => mainLayer.removeChild(b));
            bullets = [];

            centerMsg.text = "BOSS DEFEATED!";
            centerMsg.visible = true;
            setTimeout(() => centerMsg.visible = false, 2000);
        }

        // --- MAIN LOOP ---
        app.ticker.add((delta) => {
            if (gameOver) return;

            if (keys.ArrowLeft) {
                player.x -= playerState.speed * delta;
                if(phase === 'rescue') player.scale.x = -1;
            }
            if (keys.ArrowRight) {
                player.x += playerState.speed * delta;
                if(phase === 'rescue') player.scale.x = 1;
            }

            if (player.x < 30) player.x = 30;
            if (player.x > GAME_WIDTH - 30) player.x = GAME_WIDTH - 30;

            if (phase === 'rescue') {
                if (playerState.isJumping) {
                    playerState.vy += 0.5 * delta;
                    player.y += playerState.vy * delta;

                    if (player.y >= POND_Y) {
                        player.y = POND_Y;
                        playerState.isJumping = false;
                        playerState.vy = 0;
                    }
                }

                if (Math.random() < 0.015 * delta) {
                    const uSprite = createEmojiSprite('🦄', 40, 50 + Math.random() * 700, -30, 0.5);
                    mainLayer.addChild(uSprite);
                    unicorns.push({ sprite: uSprite, speed: 2 + Math.random() * 2 });
                }

                for (let i = unicorns.length - 1; i >= 0; i--) {
                    let u = unicorns[i];
                    u.sprite.y += u.speed * delta;

                    if (checkCollision(player, u.sprite, 45)) {
                        const saved = createEmojiSprite('🦄🐰', 40, u.sprite.x, u.sprite.y, 0.5);
                        mainLayer.addChild(saved);
                        savedRabbits.push({ sprite: saved, life: 60 });

                        mainLayer.removeChild(u.sprite);
                        unicorns.splice(i, 1);
                        score += 20;
                        scoreText.text = 'Score: ' + score;

                        if (score >= targetBossScore) triggerBoss();
                        continue;
                    }

                    if (u.sprite.y > GAME_HEIGHT + 50) {
                        mainLayer.removeChild(u.sprite);
                        unicorns.splice(i, 1);
                    }
                }

                for (let i = savedRabbits.length - 1; i >= 0; i--) {
                    let s = savedRabbits[i];
                    s.sprite.y -= 3 * delta;
                    s.life -= delta;
                    s.sprite.alpha = s.life / 60;
                    if(s.life <= 0) {
                        mainLayer.removeChild(s.sprite);
                        savedRabbits.splice(i, 1);
                    }
                }

            } 
            else if (phase === 'boss') {
                player.y = 80;

                if (keys.Space) {
                    let now = Date.now();
                    if (now - lastFired > 250) {
                        lastFired = now;
                        const b = new PIXI.Graphics();
                        b.beginFill(0xFFEB3B);
                        b.drawCircle(0, 0, 8);
                        b.endFill();
                        b.x = player.x + 20;
                        b.y = player.y;
                        mainLayer.addChild(b);
                        bullets.push(b);
                    }
                }

                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    b.y += 10 * delta;

                    if (checkCollision(b, shark, 40)) {
                        mainLayer.removeChild(b);
                        bullets.splice(i, 1);

                        shark.tint = 0xff0000;
                        setTimeout(() => { shark.tint = 0xFFFFFF; }, 100);

                        sharkData.hp--;
                        updateHpBar();

                        if (sharkData.hp <= 0) defeatBoss();
                        continue;
                    }

                    if (b.y > GAME_HEIGHT) {
                        mainLayer.removeChild(b);
                        bullets.splice(i, 1);
                    }
                }

                if (sharkData.state === 'swimming') {
                    shark.x += sharkData.speed * sharkData.dir * delta;
                    shark.scale.x = -sharkData.dir;

                    if (shark.x > GAME_WIDTH - 50) sharkData.dir = -1;
                    if (shark.x < 50) sharkData.dir = 1;

                    if (Math.random() < 0.015 * delta) {
                        sharkData.state = 'jumping';
                        sharkData.vy = -15;
                    }
                } else if (sharkData.state === 'jumping') {
                    sharkData.vy += 0.4 * delta;
                    shark.y += sharkData.vy * delta;

                    if (shark.y >= 530 && sharkData.vy > 0) {
                        shark.y = 530;
                        sharkData.state = 'swimming';
                        sharkData.dir = Math.random() > 0.5 ? 1 : -1;
                    }
                }

                if (checkCollision(player, shark, 50)) {
                    gameOver = true;
                    player.tint = 0xff0000;
                    document.getElementById('overlay').style.display = 'flex';
                    app.ticker.stop();
                }
            }
        });
    </script>
</body>
</html>
