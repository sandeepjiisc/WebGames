<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smiley Shooter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ecf0f1;
        }
        h1 {
            margin: 10px 0;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #game-wrapper {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 10px;
            overflow: hidden;
            border: 4px solid #34495e;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            text-shadow: 1px 1px 0px #fff;
            pointer-events: none;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }
        #overlay h2 {
            font-size: 48px;
            margin: 0 0 10px 0;
            color: #e74c3c;
        }
        #overlay p {
            font-size: 24px;
            margin: 0 0 30px 0;
        }
        button {
            padding: 12px 30px;
            font-size: 22px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 0 #27ae60;
            transition: all 0.1s;
        }
        button:active {
            box-shadow: 0 2px 0 #27ae60;
            transform: translateY(3px);
        }
        .controls {
            margin-top: 15px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>👧 Smiley Shooter! 💥</h1>

    <div id="game-wrapper">
        <div id="ui-layer">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>

        <canvas id="gameCanvas" width="600" height="700"></canvas>

        <div id="overlay">
            <h2 id="end-title">Game Over!</h2>
            <p id="end-desc">A smiley reached the ground!</p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div class="controls">
        <strong>Controls:</strong> ⬅️ ➡️ Arrow Keys to Move &nbsp;|&nbsp; <strong>Spacebar</strong> to Shoot
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const overlay = document.getElementById('overlay');
        const endTitle = document.getElementById('end-title');
        const endDesc = document.getElementById('end-desc');

        let score = 0;
        let level = 1;
        let gameState = 'playing'; // playing, gameover, win
        let frameCount = 0;

        // Input handling
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };

        let canShoot = true; // Prevent holding spacebar for infinite bullets

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'Space') {
                if (canShoot && gameState === 'playing') {
                    shoot();
                    canShoot = false;
                }
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
            if (e.code === 'Space') canShoot = true;
        });

        // Player (Girl with gun)
        const player = {
            x: 300,
            y: 630,
            width: 50,
            height: 60,
            speed: 6,
            draw() {
                // Draw Girl Emoji
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👧', this.x, this.y);

                // Draw Gun Emoji
                ctx.font = '30px Arial';
                ctx.fillText('🔫', this.x + 20, this.y - 10);
            },
            update() {
                if (keys.ArrowLeft) this.x -= this.speed;
                if (keys.ArrowRight) this.x += this.speed;

                // Boundaries
                if (this.x < 30) this.x = 30;
                if (this.x > canvas.width - 40) this.x = canvas.width - 40;
            }
        };

        // Arrays for projectiles and targets
        let bullets = [];
        let smileys = [];

        const smileyEmojis = ['😀', '😂', '😎', '😍', '🥳', '😜'];

        function shoot() {
            bullets.push({
                x: player.x + 20, // Align with gun barrel
                y: player.y - 30,
                radius: 6,
                speed: 10,
                color: '#e74c3c'
            });
        }

        class Smiley {
            constructor() {
                this.radius = 25;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -30;

                // Base speed depending on level
                let baseSpeed = level === 1 ? 2 : 4.5;
                // Add a little randomness
                this.speed = baseSpeed + Math.random() * 1.5;

                this.emoji = smileyEmojis[Math.floor(Math.random() * smileyEmojis.length)];
            }
            draw() {
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, this.x, this.y);
            }
            update() {
                this.y += this.speed;
            }
        }

        function spawnSmileys() {
            let spawnRate = level === 1 ? 70 : 45; // Faster spawning in level 2
            if (frameCount % spawnRate === 0) {
                smileys.push(new Smiley());
            }
        }

        // Particle System for explosion effects
        let particles = [];
        function createExplosion(x, y) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 20,
                    color: ['#f1c40f', '#e67e22', '#e74c3c'][Math.floor(Math.random()*3)]
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function checkLevelProgression() {
            if (score >= 500 && gameState === 'playing') {
                gameState = 'win';
                endTitle.innerText = "🏆 You Win! 🏆";
                endTitle.style.color = "#f1c40f";
                endDesc.innerText = "You reached 500 points!";
                overlay.style.display = 'flex';
            } 
            else if (score >= 200 && level === 1) {
                level = 2;
                levelEl.innerText = level;
                levelEl.style.color = '#e74c3c';

                // Level Up Banner Effect
                let banner = document.createElement('div');
                banner.innerText = "LEVEL 2 - SPEED UP!";
                banner.style.position = 'absolute';
                banner.style.top = '30%';
                banner.style.left = '50%';
                banner.style.transform = 'translate(-50%, -50%)';
                banner.style.color = '#e74c3c';
                banner.style.fontSize = '40px';
                banner.style.fontWeight = 'bold';
                banner.style.textShadow = '2px 2px #fff';
                banner.style.zIndex = '5';
                document.getElementById('game-wrapper').appendChild(banner);

                setTimeout(() => banner.remove(), 2000);
            }
        }

        function updateLogic() {
            if (gameState !== 'playing') return;

            player.update();
            spawnSmileys();

            // Update Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y -= b.speed;
                if (b.y < 0) bullets.splice(i, 1); // remove off screen
            }

            // Update Smileys & Collision
            for (let i = smileys.length - 1; i >= 0; i--) {
                let s = smileys[i];
                s.update();

                // Check if smiley reached bottom
                if (s.y > canvas.height + 20) {
                    gameState = 'gameover';
                    endTitle.innerText = "Game Over!";
                    endTitle.style.color = "#e74c3c";
                    endDesc.innerText = `Final Score: ${score}`;
                    overlay.style.display = 'flex';
                    return; // Stop updating
                }

                // Check collision with bullets
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    // Distance check
                    let dist = Math.hypot(b.x - s.x, b.y - s.y);
                    if (dist < s.radius + b.radius) {
                        // Hit!
                        createExplosion(s.x, s.y);
                        smileys.splice(i, 1);
                        bullets.splice(j, 1);

                        score += 20; // 20 points per hit
                        scoreEl.innerText = score;
                        checkLevelProgression();
                        break; // Move to next smiley
                    }
                }
            }
            frameCount++;
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Bullets
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fill();

                // Bullet glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = b.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw Smileys
            smileys.forEach(s => s.draw());

            // Draw Player
            player.draw();

            // Draw Particles
            updateParticles();
        }

        function gameLoop() {
            updateLogic();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            score = 0;
            level = 1;
            scoreEl.innerText = score;
            levelEl.innerText = level;
            levelEl.style.color = '#2c3e50';
            bullets = [];
            smileys = [];
            particles = [];
            player.x = 300;
            gameState = 'playing';
            overlay.style.display = 'none';
            frameCount = 0;
        }

        // Start
        gameLoop();
    </script>
</body>
</html>
