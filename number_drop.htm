<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Drop - Target Sum</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #111827, #4c1d95);
            color: white;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #ui {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            background: rgba(0,0,0,0.5);
            font-size: 1.2rem;
            z-index: 10;
        }
        #target-display {
            color: #fbbf24;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px #f59e0b;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
            background: rgba(255,255,255,0.05);
            border-left: 2px solid rgba(255,255,255,0.1);
            border-right: 2px solid rgba(255,255,255,0.1);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            display: none;
        }
        button {
            padding: 12px 24px;
            font-size: 1.2rem;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.5);
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.6);
            pointer-events: none;
        }
    
    </style>
</head>
<body>
    <div id="ui">
        <div>Score: <span id="score">0</span></div>
        <div id="target-display">Target Sum: <span id="target">10</span></div>
    </div>
    
    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div class="instruction">Tap lane to shoot matching number</div>
        <div id="game-over">
            <h2>City Breached!</h2>
            <p>Score: <span id="final-score">0</span></p>
            <button onclick="resetGame()">Defend Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        
        let width, height;
        const lanes = 4;
        let laneWidth;
        
        let targetSum = 10;
        let score = 0;
        let isGameOver = false;
        let animationId;
        
        let fallingBlocks = [];
        let bullets = [];
        let playerAmmo = 0; // The number the player is about to shoot

        function resize() {
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
            laneWidth = width / lanes;
        }
        window.addEventListener('resize', resize);
        resize();

        function generatePlayerAmmo() {
            playerAmmo = Math.floor(Math.random() * (targetSum - 1)) + 1;
        }

        function spawnBlock() {
            if(Math.random() < 0.02 + (score * 0.0005)) {
                let lane = Math.floor(Math.random() * lanes);
                let val = targetSum - (Math.floor(Math.random() * (targetSum - 1)) + 1); // Ensures it can sum to target
                
                fallingBlocks.push({
                    x: lane * laneWidth + laneWidth/2,
                    y: -30,
                    val: val,
                    lane: lane,
                    speed: 1 + (score * 0.05),
                    radius: 25,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                });
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath();
            ctx.moveTo(width/2, height - 10);
            ctx.lineTo(width/2 - 20, height - 40);
            ctx.lineTo(width/2 + 20, height - 40);
            ctx.fill();

            // Draw next ammo
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(width/2, height - 60, 20, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(playerAmmo, width/2, height - 60);
        }

        function shoot(laneIndex) {
            if (isGameOver) return;
            bullets.push({
                x: laneIndex * laneWidth + laneWidth/2,
                y: height - 40,
                val: playerAmmo,
                speed: 10,
                radius: 15
            });
            generatePlayerAmmo();
        }

        container.addEventListener('mousedown', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const lane = Math.floor(x / laneWidth);
            shoot(lane);
        });

        container.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = container.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const lane = Math.floor(x / laneWidth);
            shoot(lane);
        }, {passive: false});

        function update() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, width, height);

            // Draw lanes
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            for(let i=1; i<lanes; i++) {
                ctx.beginPath();
                ctx.moveTo(i*laneWidth, 0);
                ctx.lineTo(i*laneWidth, height);
                ctx.stroke();
            }

            spawnBlock();

            // Update & Draw Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.y -= b.speed;
                
                ctx.fillStyle = '#60a5fa';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.fillText(b.val, b.x, b.y);

                if (b.y < -20) bullets.splice(i, 1);
            }

            // Update & Draw Falling Blocks
            for (let i = fallingBlocks.length - 1; i >= 0; i--) {
                let f = fallingBlocks[i];
                f.y += f.speed;
                
                // Draw
                ctx.fillStyle = f.color;
                ctx.shadowColor = f.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.roundRect(f.x - f.radius, f.y - f.radius, f.radius*2, f.radius*2, 10);
                ctx.fill();
                ctx.shadowBlur = 0; // reset
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.fillText(f.val, f.x, f.y);

                // Collision with floor
                if (f.y + f.radius > height - 80) {
                    gameOver();
                }

                // Collision with bullets
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let dist = Math.hypot(f.x - b.x, f.y - b.y);
                    if (dist < f.radius + b.radius) {
                        if (f.val + b.val === targetSum) {
                            // Match!
                            score += 10;
                            document.getElementById('score').innerText = score;
                            fallingBlocks.splice(i, 1);
                            bullets.splice(j, 1);
                            
                            // Increase difficulty randomly
                            if(score > 0 && score % 100 === 0) {
                                targetSum = [10, 15, 20, 25][Math.floor(Math.random()*4)];
                                document.getElementById('target').innerText = targetSum;
                            }
                            break;
                        } else {
                            // Penalty for wrong sum
                            b.val = "X";
                            b.speed = 0; // stops rendering cleanly
                            bullets.splice(j, 1); // just destroy bullet
                        }
                    }
                }
            }

            drawPlayer();

            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        window.resetGame = function() {
            isGameOver = false;
            score = 0;
            targetSum = 10;
            document.getElementById('score').innerText = score;
            document.getElementById('target').innerText = targetSum;
            document.getElementById('game-over').style.display = 'none';
            fallingBlocks = [];
            bullets = [];
            generatePlayerAmmo();
            update();
        }

        generatePlayerAmmo();
        update();
    </script>
</body>
</html>
