<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit Rescue & Shark Boss</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121220;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ecf0f1;
            overflow: hidden;
        }
        h1 {
            margin: 10px 0;
            color: #E040FB;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #game-wrapper {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 10px;
            overflow: hidden;
            border: 4px solid #9C27B0;
            background: linear-gradient(to bottom, #81D4FA 0%, #E1F5FE 70%, #0288D1 70%, #01579B 100%);
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: #1A237E;
            text-shadow: 1px 1px 0px #fff;
            pointer-events: none;
            z-index: 5;
        }
        #center-message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #F44336;
            text-shadow: 2px 2px 0px #fff;
            display: none;
            z-index: 6;
            text-align: center;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }
        #overlay h2 {
            font-size: 48px;
            margin: 0 0 10px 0;
            color: #FF5252;
        }
        #overlay p {
            font-size: 24px;
            margin: 0 0 30px 0;
            color: white;
        }
        button {
            padding: 12px 30px;
            font-size: 22px;
            background-color: #E040FB;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 0 #9C27B0;
            transition: all 0.1s;
        }
        button:active {
            box-shadow: 0 2px 0 #9C27B0;
            transform: translateY(3px);
        }
        .controls {
            margin-top: 15px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            line-height: 1.5;
        }
        #boss-hp-bar {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 10px;
            display: none;
            overflow: hidden;
            z-index: 5;
        }
        #boss-hp-fill {
            width: 100%;
            height: 100%;
            background: #F44336;
            transition: width 0.2s;
        }
    </style>
</head>
<body>

    <h1>🐰 Unicorn Rescue & Shark Attack! 🦄</h1>

    <div id="game-wrapper">
        <div id="ui-layer">
            <div>Score: <span id="score">0</span></div>
            <div>Phase: <span id="phase-text">Rescue</span></div>
        </div>

        <div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>
        <div id="center-message">SHARK ATTACK!</div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="overlay">
            <h2 id="end-title">Game Over!</h2>
            <p id="end-desc">The Shark got you!</p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div class="controls">
        <strong>Normal Phase:</strong> ⬅️ ➡️ to Move | <strong>Space</strong> to Jump onto Unicorns<br>
        <strong>Boss Phase:</strong> ⬅️ ➡️ to Move | <strong>Space</strong> to Shoot the Shark
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const phaseEl = document.getElementById('phase-text');
        const overlay = document.getElementById('overlay');
        const endTitle = document.getElementById('end-title');
        const endDesc = document.getElementById('end-desc');
        const centerMessage = document.getElementById('center-message');
        const bossHpBar = document.getElementById('boss-hp-bar');
        const bossHpFill = document.getElementById('boss-hp-fill');

        let score = 0;
        let gameState = 'rescue'; // rescue, boss, gameover
        let targetBossScore = 200;
        let frameCount = 0;
        const POND_Y = 450;

        // Input
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            Space: false
        };
        let canShoot = true;
        let canJump = true;

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'Space') {
                if (gameState === 'rescue' && canJump) {
                    player.jump();
                    canJump = false;
                } else if (gameState === 'boss' && canShoot) {
                    shoot();
                    canShoot = false;
                }
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
            if (e.code === 'Space') {
                canShoot = true;
                canJump = true;
            }
        });

        // --- Player (Rabbit in pond / Unicorn in sky) ---
        const player = {
            x: 400,
            y: POND_Y,
            vy: 0,
            speed: 6,
            isJumping: false,
            gravity: 0.6,
            jumpPower: -14,
            width: 40,

            draw() {
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                if (gameState === 'rescue') {
                    // Rabbit
                    ctx.fillText('🐰', this.x, this.y);
                } else {
                    // Unicorn holding a gun with rabbit
                    ctx.fillText('🦄', this.x, this.y);
                    ctx.font = '30px Arial';
                    ctx.fillText('🐰', this.x - 15, this.y - 20);
                    ctx.fillText('🔫', this.x + 20, this.y + 10);
                }
            },

            update() {
                if (keys.ArrowLeft) this.x -= this.speed;
                if (keys.ArrowRight) this.x += this.speed;

                // Bounds
                if (this.x < 30) this.x = 30;
                if (this.x > canvas.width - 30) this.x = canvas.width - 30;

                if (gameState === 'rescue') {
                    // Physics for jump
                    this.y += this.vy;
                    if (this.y < POND_Y) {
                        this.vy += this.gravity;
                        this.isJumping = true;
                    } else {
                        this.y = POND_Y;
                        this.vy = 0;
                        this.isJumping = false;
                    }
                }
            },

            jump() {
                if (!this.isJumping) {
                    this.vy = this.jumpPower;
                    this.isJumping = true;
                }
            }
        };

        // --- Rescue Phase Entities ---
        let unicorns = [];
        let savedRabbits = []; // Animation of them flying away

        function spawnUnicorn() {
            if (frameCount % 60 === 0) {
                unicorns.push({
                    x: Math.random() * (canvas.width - 60) + 30,
                    y: -30,
                    speed: 3 + Math.random() * 2,
                    radius: 25
                });
            }
        }

        // --- Boss Phase Entities ---
        const shark = {
            x: 400, y: 500, vx: 5, vy: 0, hp: 10, maxHp: 10, radius: 40, state: 'swimming',
            draw() {
                ctx.font = '70px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.vx > 0) ctx.scale(-1, 1); // flip based on direction
                ctx.fillText('🦈', 0, 0);
                ctx.restore();
            },
            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.state === 'swimming') {
                    // Bounce edges
                    if (this.x < 50 || this.x > canvas.width - 50) this.vx *= -1;

                    // Random jump
                    if (Math.random() < 0.01) {
                        this.state = 'jumping';
                        this.vy = -18;
                    }
                } else if (this.state === 'jumping') {
                    this.vy += 0.5; // Gravity
                    if (this.y >= 500) {
                        this.y = 500;
                        this.vy = 0;
                        this.state = 'swimming';
                        // randomly change direction after jump
                        this.vx = (Math.random() > 0.5 ? 5 : -5);
                    }
                }
            }
        };

        let bullets = [];

        function shoot() {
            bullets.push({
                x: player.x,
                y: player.y + 30,
                radius: 8,
                speed: 12,
                color: '#FFEB3B'
            });
        }

        // --- Particles ---
        let particles = [];
        function createParticles(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        // --- Main Logic ---
        function checkBossTrigger() {
            if (score >= targetBossScore && gameState === 'rescue') {
                gameState = 'boss';
                phaseEl.innerText = "BOSS FIGHT!";
                phaseEl.style.color = '#F44336';

                // Transition player
                player.y = 100; // Fly to top
                player.vy = 0;
                player.isJumping = false;

                // Init Shark
                shark.hp = 10 + (targetBossScore/200) * 5; // Boss gets harder
                shark.maxHp = shark.hp;
                shark.x = canvas.width/2;
                shark.y = 500;
                shark.state = 'swimming';

                // UI
                bossHpBar.style.display = 'block';
                bossHpFill.style.width = '100%';

                centerMessage.innerText = "SHARK ATTACK!";
                centerMessage.style.display = 'block';
                setTimeout(() => centerMessage.style.display = 'none', 2000);
            }
        }

        function updateLogic() {
            if (gameState === 'gameover') return;

            player.update();
            checkBossTrigger();

            if (gameState === 'rescue') {
                spawnUnicorn();

                // Update falling unicorns
                for (let i = unicorns.length - 1; i >= 0; i--) {
                    let u = unicorns[i];
                    u.y += u.speed;

                    // Collision with player (rescue)
                    let dist = Math.hypot(player.x - u.x, player.y - u.y);
                    if (dist < u.radius + 20) {
                        createParticles(u.x, u.y, '#E040FB');

                        // Add to saved animations
                        savedRabbits.push({x: u.x, y: u.y, vy: -5, life: 60});

                        unicorns.splice(i, 1);
                        score += 20;
                        scoreEl.innerText = score;
                        continue;
                    }

                    // Remove if in water
                    if (u.y > POND_Y + 50) {
                        unicorns.splice(i, 1);
                    }
                }

                // Update saved animations
                for(let i=savedRabbits.length-1; i>=0; i--) {
                    savedRabbits[i].y += savedRabbits[i].vy;
                    savedRabbits[i].life--;
                    if(savedRabbits[i].life <= 0) savedRabbits.splice(i,1);
                }

            } else if (gameState === 'boss') {
                shark.update();

                // Update bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    b.y += b.speed;

                    // Collision with shark
                    let dist = Math.hypot(b.x - shark.x, b.y - shark.y);
                    if (dist < shark.radius + b.radius) {
                        createParticles(shark.x, shark.y, '#F44336');
                        bullets.splice(i, 1);
                        shark.hp--;

                        bossHpFill.style.width = (shark.hp / shark.maxHp) * 100 + '%';

                        if (shark.hp <= 0) {
                            // Boss Defeated
                            score += 50;
                            scoreEl.innerText = score;
                            targetBossScore += 200;

                            gameState = 'rescue';
                            phaseEl.innerText = "Rescue";
                            phaseEl.style.color = '#1A237E';
                            bossHpBar.style.display = 'none';

                            centerMessage.innerText = "BOSS DEFEATED!";
                            centerMessage.style.display = 'block';
                            setTimeout(() => centerMessage.style.display = 'none', 2000);

                            // Reset player to pond
                            player.y = POND_Y;
                            player.vy = 0;
                            bullets = [];
                        }
                        continue;
                    }
                    if (b.y > canvas.height) bullets.splice(i, 1);
                }

                // Check if Shark hits Player
                let hitDist = Math.hypot(player.x - shark.x, player.y - shark.y);
                if (hitDist < 40 + shark.radius - 10) { // Slight forgiveness radius
                    gameState = 'gameover';
                    overlay.style.display = 'flex';
                }
            }

            frameCount++;
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Water overlay (bottom part)
            // The canvas background handles the sky

            // Draw Rescue Entities
            if (gameState === 'rescue') {
                unicorns.forEach(u => {
                    ctx.font = '40px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🦄', u.x, u.y);
                });

                savedRabbits.forEach(sr => {
                    ctx.globalAlpha = sr.life / 60;
                    ctx.font = '40px Arial';
                    ctx.fillText('🦄🐰', sr.x, sr.y);
                    ctx.globalAlpha = 1.0;
                });
            }

            // Draw Boss Entities
            if (gameState === 'boss') {
                shark.draw();

                bullets.forEach(b => {
                    ctx.fillStyle = b.color;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = b.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            }

            // Draw Water styling (semi-transparent over the pond area)
            ctx.fillStyle = 'rgba(2, 136, 209, 0.4)'; // Water overlay
            ctx.fillRect(0, POND_Y + 20, canvas.width, canvas.height - POND_Y);

            // Draw Player
            player.draw();

            updateParticles();
        }

        function gameLoop() {
            updateLogic();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            score = 0;
            gameState = 'rescue';
            targetBossScore = 200;
            scoreEl.innerText = score;
            phaseEl.innerText = "Rescue";
            phaseEl.style.color = '#1A237E';

            player.x = canvas.width/2;
            player.y = POND_Y;
            player.vy = 0;

            unicorns = [];
            bullets = [];
            savedRabbits = [];
            particles = [];

            overlay.style.display = 'none';
            bossHpBar.style.display = 'none';
            centerMessage.style.display = 'none';
            frameCount = 0;
        }

        // Start
        gameLoop();
    </script>
</body>
</html>
