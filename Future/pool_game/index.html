<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui, viewport-fit=cover" />
    <title>8 Ball Billiards Classic</title>
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; overflow: hidden; touch-action: none; font-family: sans-serif; width: 100vw; height: 100vh; }
        #mygame { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; }
        canvas { max-width: 100%; max-height: 100%; }
        #rotate-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; text-align: center; }
        @media screen and (orientation: portrait) { #rotate-overlay { display: flex; } }
        
        #loading-screen {
            position: absolute; width: 100%; height: 100%; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
        }
        .bar-outer { width: 300px; height: 10px; border: 1px solid #0f0; margin-top: 15px; border-radius: 5px; overflow: hidden; }
        .bar-inner { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #load-status { font-size: 14px; color: #0f0; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="rotate-overlay"><div style="font-size: 50px;">🎱🔄</div><h2>ROTATE DEVICE</h2></div>
    
    <div id="loading-screen">
        <div style="font-size: 24px; color: #fff; letter-spacing: 5px;">BILLIARDS</div>
        <div class="bar-outer"><div id="load-bar" class="bar-inner"></div></div>
        <div id="load-status">INITIALIZING...</div>
    </div>

    <div id="mygame"></div>

    <script>
        // --- COMPLETE SDK EMulation ---
        window.gameID = "8-ball-billiards-classic";
        window.famobi = {
            init: function() { return Promise.resolve(); },
            __: function(key) { return key; },
            hasFeature: function(feat) { return true; },
            getOrientation: function() { return window.innerWidth > window.innerHeight ? "landscape" : "portrait"; },
            getOffsets: function() { return { top: 0, right: 0, bottom: 0, left: 0 }; },
            getBrandingButtonImage: function() { return "assets/img/famobi.png"; },
            localStorage: {
                getItem: function(k) { try { return window.localStorage.getItem(window.gameID + ":" + k); } catch(e){return null;} },
                setItem: function(k, v) { try { window.localStorage.setItem(window.gameID + ":" + k, v); } catch(e){} }
            },
            config: { 
                logging: false, ads: { off: true },
                features: { highscores: 1, credits: 1, multiplayer_local: 1 },
                game_i18n: { default: {} },
                gameParams: { orientation: "landscape" }
            },
            game: { init: function(){}, pause: function(){}, resume: function(){}, canResume: function(){ return true; } },
            adapters: { 
                add: function(){}, 
                run: function(){} 
            },
            gametranslation: { init: function(){}, translateHtml: function(e){ return e; } },
            menu: { create: function(){}, show: function(){}, hideAll: function(){} },
            orientation: { init: function(){}, update: function(){} },
            onOrientationChange: function(cb) { window.addEventListener("resize", cb); }
        };
        window.famobi_analytics = { trackScreen: function(){}, trackEvent: function(){} };
        window.SDK_INTERFACE = { isSDKInterfaceDone: true };
        
        // Zepto Shim
        window.faZepto = window.Zepto = function(arg) { 
            if (typeof arg === 'string') return document.querySelectorAll(arg);
            return arg;
        };
        window.Zepto.each = function(obj, cb) {
            if (Array.isArray(obj)) { for(var i=0; i<obj.length; i++) cb(i, obj[i]); }
            else { for(var k in obj) cb(k, obj[k]); }
        };

        // --- SCRIPT LIST ---
        const scripts = [
            "html5games/gameapi/zepto.min.js",
            "html5games/gameapi/detection.js",
            "html5games/gameapi/famobi_analytics_v1.js",
            "html5games/gameapi/fenster.js",
            "assets/src/01phaser.js",
            "assets/src/02Ball.js",
            "assets/src/03contactListener.js",
            "assets/src/04billiardPhysics.js",
            "assets/src/05levelData.js",
            "assets/src/06maths.js",
            "assets/src/07vector2d.js",
            "assets/src/08render.js",
            "assets/src/09sound.js",
            "assets/src/10effects.js",
            "assets/src/11timer.js",
            "assets/src/12load.js",
            "assets/src/13mainMenu.js",
            "assets/src/14setup.js",
            "assets/src/15gameController.js",
            "assets/src/16boot.js"
        ];

        let loaded = 0;
        const total = scripts.length;
        const bar = document.getElementById('load-bar');
        const status = document.getElementById('load-status');

        function loadNext() {
            if (scripts.length === 0) {
                status.innerText = "STARTING ENGINE...";
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    // The "deviceready" event is crucial for boot.js
                    var e = document.createEvent("Events");
                    e.initEvent("deviceready", true, false);
                    document.dispatchEvent(e);
                    
                    // Force the first state transition manually if boot fails to auto-start
                    if (window.game && window.game.state) {
                         console.log("Forcing initial state check...");
                    }
                }, 1000);
                return;
            }
            let src = scripts.shift();
            status.innerText = "PREPARING: " + src.split('/').pop();
            let s = document.createElement('script');
            s.src = src;
            s.async = false;
            s.onload = () => {
                loaded++;
                bar.style.width = (loaded / total * 100) + "%";
                loadNext();
            };
            s.onerror = () => { loadNext(); };
            document.body.appendChild(s);
        }

        window.addEventListener('load', loadNext);
        
        // Final layout enforcer - keep canvas stretched and visible
        setInterval(function() {
            var c = document.querySelector('canvas');
            if (c) {
                if (c.style.display === 'none') c.style.display = 'block';
                c.style.maxWidth = "100vw";
                c.style.maxHeight = "100vh";
                c.style.width = "auto";
                c.style.height = "auto";
            }
        }, 1000);
    </script>
</body>
</html>
