<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phaser Archery Game</title>
    <!-- Using Phaser 3 based on your game dev preferences -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #game-container { box-shadow: 0 0 20px rgba(0,0,0,0.8); border-radius: 8px; overflow: hidden; }
        #loading { color: white; position: absolute; }
    </style>
</head>
<body>
    <div id="loading">Loading Game Assets...</div>
    <div id="game-container"></div>
    <script src="game.js"></script>
</body>
</html>
