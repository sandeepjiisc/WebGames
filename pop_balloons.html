<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pop Balloons and Have Fun</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #87CEEB;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
        }

        .back-to-hub {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #FF6B6B;
            border: 3px solid #FF6B6B;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 2000;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .back-to-hub:active { transform: scale(0.9); }

        /* HUD */
        .hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 1000;
        }

        .target-display {
            background: white;
            padding: 10px 40px;
            border-radius: 50px;
            border: 5px solid var(--primary);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            cursor: pointer;
        }

        .target-label {
            font-size: 18px;
            color: #666;
            font-weight: bold;
        }

        .target-letter {
            font-size: 60px;
            color: var(--primary);
            font-weight: bold;
            line-height: 1;
        }

        .score-board {
            margin-top: 15px;
            font-size: 32px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.2);
            padding: 5px 25px;
            border-radius: 20px;
        }

        /* Balloons */
        .balloon {
            position: absolute;
            width: 100px;
            height: 130px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2);
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 15px solid inherit;
            border-bottom-color: inherit;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 50%;
            width: 2px;
            height: 40px;
            background: rgba(0,0,0,0.2);
        }

        /* Particles/Pop effect */
        .pop-effect {
            position: absolute;
            pointer-events: none;
            animation: popOut 0.5s ease-out forwards;
        }

        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .floating-text {
            position: absolute;
            font-size: 40px;
            font-weight: bold;
            color: var(--secondary);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        @media (max-width: 600px) {
            .target-letter { font-size: 40px; }
            .target-display { padding: 5px 25px; }
            .balloon { width: 80px; height: 100px; font-size: 40px; }
            .score-board { font-size: 24px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-hub">🏠 Hub</a>

    <div class="hud">
        <div class="target-display" onclick="speakTarget()">
            <div class="target-label">POP THE LETTER</div>
            <div class="target-letter" id="target-letter">?</div>
        </div>
        <div class="score-board">Score: <span id="score">0</span></div>
    </div>

    <div id="game-area" style="position: absolute; width: 100%; height: 100%;"></div>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F1C', '#E71D36', '#2EC4B6', '#7209B7', '#FF00FF', '#00FF00'];
        let score = 0;
        let targetLetter = "";
        const gameArea = document.getElementById('game-area');
        const targetDisplay = document.getElementById('target-letter');
        const scoreDisplay = document.getElementById('score');

        function initGame() {
            setNewTarget();
            setInterval(spawnBalloon, 1200);
            requestAnimationFrame(updateBalloons);
        }

        function setNewTarget() {
            targetLetter = letters[Math.floor(Math.random() * letters.length)];
            targetDisplay.innerText = targetLetter;
            speakTarget();
        }

        function speakTarget() {
            const utterance = new SpeechSynthesisUtterance(`Find the letter ${targetLetter}`);
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function spawnBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            
            // Random letter (weighted towards target)
            let letter;
            if (Math.random() < 0.3) {
                letter = targetLetter;
            } else {
                letter = letters[Math.floor(Math.random() * letters.length)];
            }
            
            const color = colors[Math.floor(Math.random() * colors.length)];
            b.style.backgroundColor = color;
            b.style.borderBottomColor = color;
            b.innerText = letter;
            
            const size = 100;
            const startX = Math.random() * (window.innerWidth - size);
            b.style.left = startX + 'px';
            b.style.top = window.innerHeight + 'px';
            
            b.dataset.letter = letter;
            b.dataset.y = window.innerHeight;
            b.dataset.speed = 2 + Math.random() * 2.5;
            b.dataset.wobbleSpeed = 0.02 + Math.random() * 0.03;
            b.dataset.wobbleOffset = Math.random() * Math.PI * 2;
            
            b.addEventListener('mousedown', (e) => popBalloon(b, e));
            b.addEventListener('touchstart', (e) => { e.preventDefault(); popBalloon(b, e.touches[0]); });
            
            gameArea.appendChild(b);
        }

        function updateBalloons(time) {
            const balloons = document.querySelectorAll('.balloon');
            balloons.forEach(b => {
                let y = parseFloat(b.dataset.y);
                y -= parseFloat(b.dataset.speed);
                b.dataset.y = y;
                
                let wobble = Math.sin(time * parseFloat(b.dataset.wobbleSpeed) + parseFloat(b.dataset.wobbleOffset)) * 30;
                b.style.transform = `translateX(${wobble}px)`;
                b.style.top = y + 'px';
                
                if (y < -200) {
                    // If target was missed, maybe lose points? (optional)
                    b.remove();
                }
            });
            requestAnimationFrame(updateBalloons);
        }

        function popBalloon(b, e) {
            if (b.dataset.popped) return;
            b.dataset.popped = "true";
            
            const isCorrect = b.dataset.letter === targetLetter;
            
            if (isCorrect) {
                score += 10;
                scoreDisplay.innerText = score;
                showFloatingText("+10!", e.clientX, e.clientY, "#4ECDC4");
                setNewTarget();
                playPopSound(true);
            } else {
                score = Math.max(0, score - 5);
                scoreDisplay.innerText = score;
                showFloatingText("-5", e.clientX, e.clientY, "#FF6B6B");
                playPopSound(false);
            }

            b.style.transform += ' scale(1.5)';
            b.style.opacity = '0';
            b.style.transition = 'all 0.15s';
            
            setTimeout(() => b.remove(), 150);
        }

        function showFloatingText(text, x, y, color) {
            const t = document.createElement('div');
            t.className = 'floating-text';
            t.innerText = text;
            t.style.left = (x - 20) + 'px';
            t.style.top = (y - 40) + 'px';
            t.style.color = color;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1000);
        }

        function playPopSound(correct) {
            // Using Web Audio API or just a synthesized beep for immediate feedback
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if (correct) {
                osc.frequency.setValueAtTime(440, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
            } else {
                osc.frequency.setValueAtTime(220, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.1);
            }
            
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        }

        window.onload = initGame;
    </script>
</body>
</html>
