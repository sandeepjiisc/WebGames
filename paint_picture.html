<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Paint a Picture</title>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #f1f2f6;
        }
        body { margin: 0; background: var(--bg); font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; user-select: none; -webkit-user-select: none; overflow: hidden; display: flex; flex-direction: column; height: 100vh;}
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 10; flex-shrink: 0;}
        .back-to-hub { background: #ff4757; color: white; text-decoration: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 0 #ff0000; transition: transform 0.1s; }
        .back-to-hub:active { transform: translateY(4px); box-shadow: none; }
        
        .nav-controls { display: flex; align-items: center; gap: 15px; }
        .nav-btn { font-size: 24px; background: #1e90ff; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; box-shadow: 0 4px 0 #0984e3; display: flex; justify-content: center; align-items: center;}
        .nav-btn:active { transform: translateY(4px); box-shadow: none; }
        .pic-name { font-size: 26px; font-weight: bold; color: #2f3542; min-width: 200px; text-align: center; }
        
        .clear-btn { background: #a4b0be; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #747d8c; }
        .clear-btn:active { transform: translateY(4px); box-shadow: none; }

        .canvas-area { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; background: radial-gradient(circle, #ffffff, #dfe4ea); }
        canvas { background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 100%; max-height: 100%; object-fit: contain; cursor: pointer; touch-action: none; }
        
        .palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 20px; background: #fff; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); z-index: 10; max-height: 25vh; overflow-y: auto; flex-shrink: 0; touch-action: pan-y;}
        .color-btn { width: 50px; height: 50px; border-radius: 50%; border: 4px solid #f1f2f6; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .color-btn.active { border-color: #2f3542; transform: scale(1.15); box-shadow: 0 0 15px rgba(0,0,0,0.2); }

        /* Mobile Layout */
        @media (max-width: 768px) {
            .header { padding: 10px; flex-wrap: wrap; justify-content: center; gap: 10px; }
            .back-to-hub { position: absolute; top: 10px; left: 10px; padding: 6px 12px; font-size: 12px; }
            .clear-btn { position: absolute; top: 10px; right: 10px; padding: 6px 12px; font-size: 12px; }
            .nav-controls { margin-top: 30px; width: 100%; justify-content: center; }
            .nav-btn { width: 40px; height: 40px; font-size: 20px; }
            .pic-name { font-size: 20px; min-width: 150px; }
            .canvas-area { padding: 10px; }
            .palette { padding: 10px; gap: 8px; max-height: 30vh; }
            .color-btn { width: 40px; height: 40px; border-width: 3px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-to-hub">🏠 Hub</a>
        <div class="nav-controls">
            <button class="nav-btn" onclick="prevPic()">❮</button>
            <div class="pic-name" id="pic-name">Apple 🍎</div>
            <button class="nav-btn" onclick="nextPic()">❯</button>
        </div>
        <button class="clear-btn" onclick="initPicture()">🗑️ Clear</button>
    </div>
    
    <div class="canvas-area" id="canvas-wrapper">
        <canvas id="c" width="800" height="800"></canvas>
    </div>
    
    <div class="palette" id="palette">
        <!-- Generated by JS -->
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const PICS = [
            { name: "Apple", icon: "🍎" },
            { name: "Sun", icon: "☀️" },
            { name: "House", icon: "🏠" },
            { name: "Car", icon: "🚗" },
            { name: "Tree", icon: "🌳" },
            { name: "Flower", icon: "🌸" },
            { name: "Star", icon: "⭐" },
            { name: "Moon", icon: "🌙" },
            { name: "Heart", icon: "❤️" },
            { name: "Boat", icon: "⛵" },
            { name: "Fish", icon: "🐟" },
            { name: "Butterfly", icon: "🦋" },
            { name: "Rocket", icon: "🚀" },
            { name: "Cat", icon: "🐱" },
            { name: "Dog", icon: "🐶" },
            { name: "Bear", icon: "🐻" },
            { name: "Turtle", icon: "🐢" },
            { name: "Cloud", icon: "☁️" },
            { name: "Ice Cream", icon: "🍦" },
            { name: "Pizza", icon: "🍕" },
            { name: "Alien", icon: "👽" },
            { name: "Dinosaur", icon: "🦖" },
            { name: "Unicorn", icon: "🦄" },
            { name: "Cake", icon: "🎂" },
            { name: "Donut", icon: "🍩" },
            { name: "Frog", icon: "🐸" },
            { name: "Elephant", icon: "🐘" },
            { name: "Lion", icon: "🦁" },
            { name: "Crown", icon: "👑" },
            { name: "Present", icon: "🎁" },
            { name: "Boar", icon: "🐗" },
            { name: "Dino 2", icon: "🦕" },
            { name: "Butterfly 2", icon: "🦋" },
            { name: "Train", icon: "🚂" },
            { name: "Tortoise", icon: "🐢" },
            { name: "Plane", icon: "✈️" },
            { name: "Umbrella", icon: "☔" },
            { name: "Whale", icon: "🐳" },
            { name: "Tiger", icon: "🐯" },
            { name: "Rocket 2", icon: "🚀" },
            { name: "Helicopter", icon: "🚁" },
            { name: "Dog 2", icon: "🐶" },
            { name: "Cat 2", icon: "🐱" },
            { name: "Igloo", icon: "🛖" },
            { name: "Snail", icon: "🐌" },
            { name: "Hot Balloon", icon: "🎈" },
            { name: "Bee", icon: "🐝" },
            { name: "Xylophone", icon: "🎹" },
            { name: "Grapes", icon: "🍇" }
        ];

        const COLORS = [
            '#ff4757', '#ff6b81', '#ffa502', '#eccc68', '#2ed573', '#7bed9f', 
            '#1e90ff', '#70a1ff', '#5352ed', '#9c88ff', '#a4b0be', '#2f3542', 
            '#ffffff', '#8b4513', '#cd853f', '#f5f6fa'
        ];

        let currentPicId = 0;
        let currentColor = '#ff4757';

        // Setup Palette
        const paletteDiv = document.getElementById('palette');
        COLORS.forEach(c => {
            let btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = c;
            if (c === currentColor) btn.classList.add('active');
            btn.onclick = () => {
                currentColor = c;
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            paletteDiv.appendChild(btn);
        });

        function prevPic() {
            currentPicId--;
            if (currentPicId < 0) currentPicId = PICS.length - 1;
            initPicture();
        }

        function nextPic() {
            currentPicId++;
            if (currentPicId >= PICS.length) currentPicId = 0;
            initPicture();
        }

        function initPicture() {
            document.getElementById('pic-name').innerText = PICS[currentPicId].name + " " + PICS[currentPicId].icon;
            
            // Clear canvas
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawLines(ctx, currentPicId);
        }

        function drawLines(ctx, id) {
            const cx = 400;
            const cy = 400;
            ctx.lineWidth = 10;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000000';

            const p = () => ctx.beginPath();
            const s = () => ctx.stroke();
            
            switch(id) {
                case 0: // Apple
                    p(); ctx.arc(cx, cy+20, 150, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx, cy-130); ctx.quadraticCurveTo(cx-40, cy-180, cx+40, cy-200); s();
                    p(); ctx.moveTo(cx+10, cy-150); ctx.quadraticCurveTo(cx+100, cy-150, cx+100, cy-250); ctx.quadraticCurveTo(cx+10, cy-250, cx+10, cy-150); s();
                    break;
                case 1: // Sun
                    p(); ctx.arc(cx, cy, 120, 0, Math.PI*2); s();
                    for(let i=0; i<8; i++) { let a = i * Math.PI/4; p(); ctx.moveTo(cx + Math.cos(a)*150, cy + Math.sin(a)*150); ctx.lineTo(cx + Math.cos(a)*250, cy + Math.sin(a)*250); s(); }
                    break;
                case 2: // House
                    p(); ctx.rect(cx-150, cy-20, 300, 220); s();
                    p(); ctx.moveTo(cx-180, cy-20); ctx.lineTo(cx, cy-180); ctx.lineTo(cx+180, cy-20); ctx.closePath(); s();
                    p(); ctx.rect(cx-50, cy+80, 100, 120); s();
                    p(); ctx.rect(cx-110, cy+20, 50, 50); s();
                    p(); ctx.rect(cx+60, cy+20, 50, 50); s();
                    break;
                case 3: // Car
                    p(); ctx.rect(cx-200, cy+50, 400, 80); s();
                    p(); ctx.moveTo(cx-120, cy+50); ctx.lineTo(cx-80, cy-50); ctx.lineTo(cx+80, cy-50); ctx.lineTo(cx+120, cy+50); ctx.closePath(); s();
                    p(); ctx.moveTo(cx, cy+50); ctx.lineTo(cx, cy-50); s();
                    p(); ctx.arc(cx-120, cy+130, 40, Math.PI, 0, false); ctx.closePath(); s();
                    p(); ctx.arc(cx+120, cy+130, 40, Math.PI, 0, false); ctx.closePath(); s();
                    p(); ctx.arc(cx-120, cy+130, 30, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+120, cy+130, 30, 0, Math.PI*2); s();
                    break;
                case 4: // Tree
                    p(); ctx.rect(cx-40, cy, 80, 250); s();
                    p(); ctx.arc(cx-80, cy-50, 100, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+80, cy-50, 100, 0, Math.PI*2); s();
                    p(); ctx.arc(cx, cy-150, 120, 0, Math.PI*2); s();
                    break;
                case 5: // Flower
                    p(); ctx.moveTo(cx, cy+20); ctx.lineTo(cx, cy+250); s();
                    for(let i=0; i<6; i++) { let a = i * Math.PI/3; p(); ctx.arc(cx + Math.cos(a)*80, cy + Math.sin(a)*80, 60, 0, Math.PI*2); s(); }
                    p(); ctx.arc(cx, cy, 60, 0, Math.PI*2); s();
                    break;
                case 6: // Star
                    p(); for(let i=0; i<10; i++) { let r = i%2==0 ? 200 : 80; let a = i * Math.PI/5 - Math.PI/2; if(i==0) ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r); else ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r); } ctx.closePath(); s();
                    break;
                case 7: // Moon
                    p(); ctx.arc(cx-30, cy, 150, Math.PI*1.5, Math.PI*0.5, true); ctx.arc(cx+40, cy, 180, Math.PI*0.5, Math.PI*1.5, false); ctx.closePath(); s();
                    break;
                case 8: // Heart
                    p(); ctx.moveTo(cx, cy-50); ctx.bezierCurveTo(cx+120, cy-180, cx+250, cy+50, cx, cy+200); ctx.bezierCurveTo(cx-250, cy+50, cx-120, cy-180, cx, cy-50); s();
                    break;
                case 9: // Boat
                    p(); ctx.moveTo(cx-120, cy+80); ctx.lineTo(cx+120, cy+80); ctx.lineTo(cx+160, cy); ctx.lineTo(cx-160, cy); ctx.closePath(); s();
                    p(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy-200); ctx.lineTo(cx+120, cy-40); ctx.lineTo(cx, cy-40); ctx.closePath(); s();
                    break;
                case 10: // Fish
                    p(); ctx.ellipse(cx-40, cy, 140, 90, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-180, cy); ctx.lineTo(cx-260, cy-80); ctx.lineTo(cx-260, cy+80); ctx.closePath(); s();
                    p(); ctx.arc(cx+50, cy-30, 15, 0, Math.PI*2); s();
                    break;
                case 11: // Butterfly
                    p(); ctx.ellipse(cx, cy, 20, 120, 0, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-100, cy-60, 100, 120, -Math.PI/4, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+100, cy-60, 100, 120, Math.PI/4, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-80, cy+80, 80, 100, Math.PI/4, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+80, cy+80, 80, 100, -Math.PI/4, 0, Math.PI*2); s();
                    break;
                case 12: // Rocket
                    p(); ctx.ellipse(cx, cy-50, 60, 160, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-50, cy+50); ctx.lineTo(cx-120, cy+150); ctx.lineTo(cx-30, cy+100); ctx.closePath(); s();
                    p(); ctx.moveTo(cx+50, cy+50); ctx.lineTo(cx+120, cy+150); ctx.lineTo(cx+30, cy+100); ctx.closePath(); s();
                    p(); ctx.moveTo(cx-30, cy+100); ctx.lineTo(cx, cy+200); ctx.lineTo(cx+30, cy+100); ctx.closePath(); s();
                    p(); ctx.arc(cx, cy-50, 30, 0, Math.PI*2); s();
                    break;
                case 13: // Cat Face
                    p(); ctx.arc(cx, cy, 130, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-80, cy-100); ctx.lineTo(cx-120, cy-200); ctx.lineTo(cx-20, cy-125); ctx.closePath(); s();
                    p(); ctx.moveTo(cx+80, cy-100); ctx.lineTo(cx+120, cy-200); ctx.lineTo(cx+20, cy-125); ctx.closePath(); s();
                    p(); ctx.arc(cx-50, cy-20, 12, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+50, cy-20, 12, 0, Math.PI*2); s();
                    p(); ctx.arc(cx, cy+30, 12, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx, cy+42); ctx.quadraticCurveTo(cx-50, cy+80, cx-80, cy+50); s();
                    p(); ctx.moveTo(cx, cy+42); ctx.quadraticCurveTo(cx+50, cy+80, cx+80, cy+50); s();
                    p(); ctx.moveTo(cx-60, cy); ctx.lineTo(cx-160, cy-20); s();
                    p(); ctx.moveTo(cx-60, cy+30); ctx.lineTo(cx-160, cy+30); s();
                    p(); ctx.moveTo(cx+60, cy); ctx.lineTo(cx+160, cy-20); s();
                    p(); ctx.moveTo(cx+60, cy+30); ctx.lineTo(cx+160, cy+30); s();
                    break;
                case 14: // Dog Face
                    p(); ctx.arc(cx, cy, 130, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-110, cy, 40, 100, -Math.PI/8, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+110, cy, 40, 100, Math.PI/8, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx, cy+50, 60, 40, 0, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-50, cy-40, 12, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+50, cy-40, 12, 0, Math.PI*2); s();
                    p(); ctx.arc(cx, cy+30, 20, 0, Math.PI*2); s();
                    break;
                case 15: // Bear Face
                    p(); ctx.arc(cx, cy, 130, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-100, cy-100, 50, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+100, cy-100, 50, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx, cy+50, 60, 40, 0, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-50, cy-30, 12, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+50, cy-30, 12, 0, Math.PI*2); s();
                    p(); ctx.arc(cx, cy+40, 15, 0, Math.PI*2); s();
                    break;
                case 16: // Turtle
                    p(); ctx.arc(cx, cy, 130, Math.PI, 0); ctx.lineTo(cx-130, cy); s();
                    p(); ctx.ellipse(cx+160, cy-30, 50, 30, 0, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-80, cy+30, 25, 50, 0, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-20, cy+30, 25, 50, 0, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+40, cy+30, 25, 50, 0, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+100, cy+30, 25, 50, 0, 0, Math.PI*2); s();
                    break;
                case 17: // Cloud
                    p(); ctx.arc(cx-80, cy+30, 70, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+80, cy+30, 70, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-40, cy-50, 90, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+40, cy-50, 90, 0, Math.PI*2); s();
                    break;
                case 18: // Ice Cream
                    p(); ctx.moveTo(cx-80, cy+20); ctx.lineTo(cx+80, cy+20); ctx.lineTo(cx, cy+200); ctx.closePath(); s();
                    p(); ctx.moveTo(cx-60, cy+20); ctx.lineTo(cx+60, cy+160); s();
                    p(); ctx.moveTo(cx+60, cy+20); ctx.lineTo(cx-60, cy+160); s();
                    p(); ctx.arc(cx, cy-40, 90, 0, Math.PI*2); s();
                    p(); ctx.arc(cx, cy-130, 30, 0, Math.PI*2); s();
                    break;
                case 19: // Pizza
                    p(); ctx.moveTo(cx, cy-120); ctx.lineTo(cx-100, cy+100); ctx.lineTo(cx+100, cy+100); ctx.closePath(); s();
                    p(); ctx.moveTo(cx-100, cy+100); ctx.quadraticCurveTo(cx, cy+150, cx+100, cy+100); s();
                    p(); ctx.arc(cx, cy-40, 20, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-40, cy+40, 20, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+40, cy+60, 20, 0, Math.PI*2); s();
                    break;
                case 20: // Alien
                    p(); ctx.ellipse(cx, cy-50, 100, 120, 0, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-40, cy-40, 20, 40, -Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+40, cy-40, 20, 40, Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-20, cy+30); ctx.lineTo(cx+20, cy+30); s();
                    break;
                case 21: // Dinosaur
                    p(); ctx.moveTo(cx-150, cy+150); ctx.lineTo(cx-100, cy-150); ctx.bezierCurveTo(cx, cy-250, cx+100, cy-200, cx+150, cy-100); ctx.lineTo(cx+100, cy); ctx.lineTo(cx-50, cy+150); ctx.closePath(); s();
                    p(); ctx.arc(cx+80, cy-150, 10, 0, Math.PI*2); s();
                    break;
                case 22: // Unicorn
                    p(); ctx.ellipse(cx, cy, 80, 120, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-30, cy-100); ctx.lineTo(cx, cy-250); ctx.lineTo(cx+30, cy-100); ctx.closePath(); s();
                    p(); ctx.moveTo(cx-60, cy-80); ctx.lineTo(cx-100, cy-120); ctx.lineTo(cx-30, cy-40); s();
                    break;
                case 23: // Cake
                    p(); ctx.rect(cx-120, cy, 240, 150); s();
                    p(); ctx.rect(cx-80, cy-100, 160, 100); s();
                    p(); ctx.moveTo(cx-10, cy-100); ctx.lineTo(cx, cy-150); ctx.lineTo(cx+10, cy-100); ctx.closePath(); s();
                    break;
                case 24: // Donut
                    p(); ctx.arc(cx, cy, 150, 0, Math.PI*2); s();
                    p(); ctx.arc(cx, cy, 50, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-120, cy); ctx.bezierCurveTo(cx-80, cy-50, cx-40, cy+50, cx, cy); ctx.bezierCurveTo(cx+40, cy-50, cx+80, cy+50, cx+120, cy); s();
                    break;
                case 25: // Frog
                    p(); ctx.ellipse(cx, cy+50, 150, 100, 0, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-70, cy-50, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+70, cy-50, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-70, cy-50, 15, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+70, cy-50, 15, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-50, cy+50); ctx.quadraticCurveTo(cx, cy+100, cx+50, cy+50); s();
                    break;
                case 26: // Elephant
                    p(); ctx.arc(cx, cy-50, 100, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-120, cy-50, 60, 100, -Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+120, cy-50, 60, 100, Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-20, cy); ctx.lineTo(cx-20, cy+150); ctx.lineTo(cx+20, cy+150); ctx.lineTo(cx+20, cy); s();
                    p(); ctx.arc(cx-30, cy-70, 10, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+30, cy-70, 10, 0, Math.PI*2); s();
                    break;
                case 27: // Lion
                    p(); ctx.arc(cx, cy, 150, 0, Math.PI*2); s();
                    p(); ctx.arc(cx, cy, 100, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-40, cy+40); ctx.lineTo(cx+40, cy+40); ctx.lineTo(cx, cy+80); ctx.closePath(); s();
                    p(); ctx.arc(cx-30, cy-20, 15, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+30, cy-20, 15, 0, Math.PI*2); s();
                    break;
                case 28: // Crown
                    p(); ctx.moveTo(cx-150, cy+100); ctx.lineTo(cx+150, cy+100); ctx.lineTo(cx+180, cy-100); ctx.lineTo(cx+80, cy); ctx.lineTo(cx, cy-150); ctx.lineTo(cx-80, cy); ctx.lineTo(cx-180, cy-100); ctx.closePath(); s();
                    p(); ctx.arc(cx, cy-150, 20, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-180, cy-100, 20, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+180, cy-100, 20, 0, Math.PI*2); s();
                    break;
                case 29: // Present
                    p(); ctx.rect(cx-100, cy-50, 200, 200); s();
                    p(); ctx.rect(cx-120, cy-100, 240, 50); s();
                    p(); ctx.moveTo(cx-30, cy-50); ctx.lineTo(cx-30, cy+150); s();
                    p(); ctx.moveTo(cx+30, cy-50); ctx.lineTo(cx+30, cy+150); s();
                    p(); ctx.moveTo(cx, cy-100); ctx.bezierCurveTo(cx-100, cy-200, cx-100, cy-100, cx-20, cy-100); s();
                    p(); ctx.moveTo(cx, cy-100); ctx.bezierCurveTo(cx+100, cy-200, cx+100, cy-100, cx+20, cy-100); s();
                    break;
                case 30: // Boar
                    p(); ctx.ellipse(cx, cy, 140, 100, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-140, cy); ctx.lineTo(cx-200, cy-40); ctx.lineTo(cx-120, cy-60); s();
                    p(); ctx.arc(cx-90, cy-20, 10, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-140, cy+20); ctx.lineTo(cx-180, cy-10); s();
                    break;
                case 31: // Dino 2
                    p(); ctx.moveTo(cx-100, cy+150); ctx.lineTo(cx-150, cy-50); ctx.bezierCurveTo(cx-200, cy-250, cx, cy-200, cx+150, cy-50); ctx.lineTo(cx+100, cy+150); ctx.closePath(); s();
                    p(); ctx.arc(cx-50, cy-100, 10, 0, Math.PI*2); s();
                    break;
                case 32: // Butterfly 2
                    p(); ctx.ellipse(cx, cy, 30, 150, 0, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-120, cy-80, 120, 140, -Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+120, cy-80, 120, 140, Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-100, cy+100, 100, 120, Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+100, cy+100, 100, 120, -Math.PI/6, 0, Math.PI*2); s();
                    break;
                case 33: // Train
                    p(); ctx.rect(cx-150, cy-50, 200, 150); s();
                    p(); ctx.rect(cx+50, cy+20, 100, 80); s();
                    p(); ctx.arc(cx-100, cy+120, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-10, cy+120, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+100, cy+120, 30, 0, Math.PI*2); s();
                    p(); ctx.rect(cx-120, cy-150, 60, 100); s();
                    break;
                case 34: // Tortoise
                    p(); ctx.arc(cx, cy, 140, Math.PI, 0); ctx.lineTo(cx-140, cy); s();
                    p(); ctx.ellipse(cx+170, cy-40, 60, 40, 0, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-80, cy+40, 30, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+80, cy+40, 30, 0, Math.PI*2); s();
                    break;
                case 35: // Plane
                    p(); ctx.ellipse(cx, cy, 200, 50, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-180, cy); ctx.lineTo(cx-250, cy-100); ctx.lineTo(cx-150, cy-30); s();
                    p(); ctx.moveTo(cx, cy-50); ctx.lineTo(cx-50, cy-150); ctx.lineTo(cx+50, cy-150); ctx.lineTo(cx+50, cy-45); s();
                    break;
                case 36: // Umbrella
                    p(); ctx.arc(cx, cy-50, 180, Math.PI, 0); ctx.closePath(); s();
                    p(); ctx.moveTo(cx, cy-50); ctx.lineTo(cx, cy+180); ctx.arc(cx-30, cy+180, 30, 0, Math.PI); s();
                    p(); ctx.moveTo(cx-180, cy-50); ctx.quadraticCurveTo(cx-90, cy, cx, cy-50); s();
                    p(); ctx.moveTo(cx, cy-50); ctx.quadraticCurveTo(cx+90, cy, cx+180, cy-50); s();
                    break;
                case 37: // Whale
                    p(); ctx.ellipse(cx, cy+50, 200, 120, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-200, cy+50); ctx.lineTo(cx-300, cy-50); ctx.lineTo(cx-250, cy+150); ctx.closePath(); s();
                    p(); ctx.arc(cx+100, cy, 15, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx+50, cy+80); ctx.quadraticCurveTo(cx+100, cy+120, cx+150, cy+80); s();
                    break;
                case 38: // Tiger
                    p(); ctx.arc(cx, cy, 140, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-100, cy-100, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+100, cy-100, 40, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx, cy+50, 70, 50, 0, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-60, cy-30, 15, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+60, cy-30, 15, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-140, cy); ctx.lineTo(cx-80, cy+20); s();
                    p(); ctx.moveTo(cx+140, cy); ctx.lineTo(cx+80, cy+20); s();
                    break;
                case 39: // Rocket 2
                    p(); ctx.moveTo(cx, cy-200); ctx.lineTo(cx-80, cy+100); ctx.lineTo(cx+80, cy+100); ctx.closePath(); s();
                    p(); ctx.moveTo(cx-80, cy+100); ctx.lineTo(cx-150, cy+200); ctx.lineTo(cx-40, cy+100); s();
                    p(); ctx.moveTo(cx+80, cy+100); ctx.lineTo(cx+150, cy+200); ctx.lineTo(cx+40, cy+100); s();
                    p(); ctx.arc(cx, cy-20, 30, 0, Math.PI*2); s();
                    break;
                case 40: // Helicopter
                    p(); ctx.ellipse(cx, cy, 120, 80, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-120, cy); ctx.lineTo(cx-250, cy-20); ctx.lineTo(cx-250, cy+20); ctx.closePath(); s();
                    p(); ctx.moveTo(cx-50, cy-80); ctx.lineTo(cx-50, cy-130); s();
                    p(); ctx.moveTo(cx-150, cy-130); ctx.lineTo(cx+50, cy-130); s();
                    p(); ctx.moveTo(cx-60, cy+80); ctx.lineTo(cx-60, cy+130); s();
                    p(); ctx.moveTo(cx+60, cy+80); ctx.lineTo(cx+60, cy+130); s();
                    p(); ctx.moveTo(cx-100, cy+130); ctx.lineTo(cx+100, cy+130); s();
                    break;
                case 41: // Dog 2
                    p(); ctx.arc(cx, cy, 120, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx-130, cy-50, 40, 120, -Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+130, cy-50, 40, 120, Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx, cy+40, 60, 40, 0, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-40, cy-30, 15, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+40, cy-30, 15, 0, Math.PI*2); s();
                    break;
                case 42: // Cat 2
                    p(); ctx.arc(cx, cy, 120, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-80, cy-80); ctx.lineTo(cx-120, cy-180); ctx.lineTo(cx-30, cy-110); s();
                    p(); ctx.moveTo(cx+80, cy-80); ctx.lineTo(cx+120, cy-180); ctx.lineTo(cx+30, cy-110); s();
                    p(); ctx.arc(cx-40, cy-20, 15, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+40, cy-20, 15, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx, cy+30); ctx.quadraticCurveTo(cx-30, cy+60, cx-60, cy+30); s();
                    p(); ctx.moveTo(cx, cy+30); ctx.quadraticCurveTo(cx+30, cy+60, cx+60, cy+30); s();
                    break;
                case 43: // Igloo
                    p(); ctx.arc(cx, cy+50, 180, Math.PI, 0); ctx.closePath(); s();
                    p(); ctx.arc(cx, cy+50, 60, Math.PI, 0); s();
                    p(); ctx.moveTo(cx-180, cy+50); ctx.lineTo(cx+180, cy+50); s();
                    p(); ctx.moveTo(cx-90, cy+50); ctx.lineTo(cx-90, cy-25); s();
                    p(); ctx.moveTo(cx+90, cy+50); ctx.lineTo(cx+90, cy-25); s();
                    break;
                case 44: // Snail
                    p(); ctx.arc(cx, cy-20, 120, 0, Math.PI*2); s();
                    p(); ctx.arc(cx, cy-20, 60, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx, cy+100, 200, 30, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx+180, cy+90); ctx.lineTo(cx+220, cy+30); s();
                    p(); ctx.moveTo(cx+150, cy+80); ctx.lineTo(cx+190, cy+20); s();
                    break;
                case 45: // Hot Balloon
                    p(); ctx.arc(cx, cy-80, 140, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-100, cy+20); ctx.lineTo(cx-40, cy+150); ctx.lineTo(cx+40, cy+150); ctx.lineTo(cx+100, cy+20); s();
                    p(); ctx.rect(cx-60, cy+150, 120, 80); s();
                    p(); ctx.moveTo(cx, cy-220); ctx.lineTo(cx, cy+60); s();
                    break;
                case 46: // Bee
                    p(); ctx.ellipse(cx, cy, 140, 90, 0, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-40, cy-85); ctx.lineTo(cx-40, cy+85); s();
                    p(); ctx.moveTo(cx+40, cy-85); ctx.lineTo(cx+40, cy+85); s();
                    p(); ctx.ellipse(cx-40, cy-130, 40, 60, Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.ellipse(cx+40, cy-130, 40, 60, -Math.PI/6, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-140, cy); ctx.lineTo(cx-180, cy); s();
                    break;
                case 47: // Xylophone
                    p(); ctx.rect(cx-150, cy-100, 40, 200); s();
                    p(); ctx.rect(cx-80, cy-80, 40, 160); s();
                    p(); ctx.rect(cx-10, cy-60, 40, 120); s();
                    p(); ctx.rect(cx+60, cy-40, 40, 80); s();
                    p(); ctx.rect(cx+130, cy-20, 40, 40); s();
                    p(); ctx.moveTo(cx-150, cy+120); ctx.lineTo(cx+170, cy+50); s();
                    p(); ctx.moveTo(cx-150, cy-120); ctx.lineTo(cx+170, cy-50); s();
                    break;
                case 48: // Grapes
                    p(); ctx.arc(cx-60, cy-80, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+20, cy-80, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-100, cy-20, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-20, cy-20, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+60, cy-20, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-60, cy+40, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx+20, cy+40, 40, 0, Math.PI*2); s();
                    p(); ctx.arc(cx-20, cy+100, 40, 0, Math.PI*2); s();
                    p(); ctx.moveTo(cx-20, cy-120); ctx.lineTo(cx-20, cy-180); ctx.lineTo(cx+60, cy-200); s();
                    break;
            }
        }

        // Fast Scanline Flood Fill Algorithm
        function floodFill(ctx, startX, startY, fillColorHex) {
            const w = ctx.canvas.width;
            const h = ctx.canvas.height;
            
            if (startX < 0 || startX >= w || startY < 0 || startY >= h) return;
            
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            
            const startPos = (startY * w + startX) * 4;
            const startR = data[startPos];
            const startG = data[startPos+1];
            const startB = data[startPos+2];
            const startA = data[startPos+3];

            // Ignore if clicked on a black outline
            if (startR < 50 && startG < 50 && startB < 50) return;

            let fr = parseInt(fillColorHex.substr(1,2), 16);
            let fg = parseInt(fillColorHex.substr(3,2), 16);
            let fb = parseInt(fillColorHex.substr(5,2), 16);

            // Skip if already filled
            if (Math.abs(startR - fr) < 5 && Math.abs(startG - fg) < 5 && Math.abs(startB - fb) < 5) return;

            let stack = [startX, startY];
            
            const match = (x, y) => {
                if (x < 0 || x >= w || y < 0 || y >= h) return false;
                let p = (y * w + x) * 4;
                const r = data[p];
                const g = data[p+1];
                const b = data[p+2];
                return (Math.abs(r - startR) < 80 && Math.abs(g - startG) < 80 && Math.abs(b - startB) < 80);
            };

            const setColor = (x, y) => {
                let p = (y * w + x) * 4;
                data[p] = fr;
                data[p+1] = fg;
                data[p+2] = fb;
                data[p+3] = 255;
            };

            while (stack.length > 0) {
                let y = stack.pop();
                let x = stack.pop();
                
                let upY = y;
                while(upY >= 0 && match(x, upY)) { upY--; }
                upY++;
                
                let reachLeft = false;
                let reachRight = false;
                
                while(upY < h && match(x, upY)) {
                    setColor(x, upY);
                    
                    if (x > 0) {
                        if (match(x - 1, upY)) {
                            if (!reachLeft) { stack.push(x - 1, upY); reachLeft = true; }
                        } else if (reachLeft) { reachLeft = false; }
                    }
                    
                    if (x < w - 1) {
                        if (match(x + 1, upY)) {
                            if (!reachRight) { stack.push(x + 1, upY); reachRight = true; }
                        } else if (reachRight) { reachRight = false; }
                    }
                    
                    upY++;
                }
            }
            
            ctx.putImageData(imgData, 0, 0);
        }

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX = e.clientX !== undefined ? e.clientX : (e.touches && e.touches.length > 0 ? e.touches[0].clientX : 0);
            let clientY = e.clientY !== undefined ? e.clientY : (e.touches && e.touches.length > 0 ? e.touches[0].clientY : 0);

            const x = Math.floor((clientX - rect.left) * scaleX);
            const y = Math.floor((clientY - rect.top) * scaleY);
            
            floodFill(ctx, x, y, currentColor);
            
            // Redraw outlines on top to hide any fill tolerance gaps!
            drawLines(ctx, currentPicId);
        });

        // Initialize First Image
        initPicture();

    </script>
