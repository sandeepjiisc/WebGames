<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Platformer Bros - Ultimate</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #5c94fc; }
        canvas { box-shadow: 0 0 20px #000; image-rendering: pixelated; background: #5c94fc; }
        #ui { position: absolute; top: 60px; left: 20px; right: 20px; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 5; }
        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; text-shadow: 3px 3px 0 #000; text-align: center; background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; cursor: pointer; border: 4px solid white; z-index: 100; min-width: 300px; }
        .back-to-hub { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.6); color: white; border: 2px solid white; padding: 8px 12px; border-radius: 8px; cursor: pointer; z-index: 1000; text-decoration: none; font-family: sans-serif; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        #mobile-controls { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; z-index: 20; pointer-events: none; }
        #mobile-controls .m-btn { pointer-events: auto; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(2, 50px); gap: 5px; }
        .action-btns { display: flex; gap: 10px; align-items: flex-end; }
        .m-btn { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.3); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; user-select: none; touch-action: manipulation; }
        .m-btn:active { background: rgba(255, 255, 255, 0.6); }
        #m-left { grid-column: 1; grid-row: 2; }
        #m-right { grid-column: 3; grid-row: 2; }
        #m-up { grid-column: 2; grid-row: 1; }
        #m-jump { background: rgba(59, 130, 246, 0.5); width: 85px; height: 85px; font-size: 18px; }
        #m-fire { background: rgba(239, 68, 68, 0.5); width: 70px; height: 70px; font-size: 16px; }
        #orientation-hint { position: absolute; top: 10px; right: 10px; background: rgba(255, 165, 0, 0.8); padding: 5px 10px; border-radius: 5px; font-size: 12px; display: none; z-index: 100; }
        @media screen and (orientation: portrait) { #orientation-hint { display: block; } }
        @media screen and (min-width: 800px) { #mobile-controls { display: none; } #ui { font-size: 24px; top: 15px; left: 15%; right: 15%; } #orientation-hint { display: none; } }
    </style>
</head>
<body>
    <a href="index.html" class="back-to-hub">🏠 Hub</a>
    <div id="orientation-hint">🔄 Rotate for better view</div>
    <div id="game-wrapper">
        <div id="ui">
            <div>MARIO<br><span id="score">000000</span></div>
            <div>COINS<br><span id="coins">00</span></div>
            <div>WORLD<br><span id="level">1-1</span></div>
            <div>LIVES<br><span id="lives">3</span></div>
        </div>
        <div id="message">START GAME<br><span style="font-size:14px">Arrows: Move | SPACE: Jump<br>SHIFT: Sprint | Z: Shoot Fireball</span><br><br><span style="color: #FFD700; font-size: 18px; font-weight: bold;">[ TOUCH OR CLICK TO START ]</span></div>
        <canvas id="gameCanvas" width="800" height="480"></canvas>
        <div id="mobile-controls">
            <div class="d-pad">
                <div class="m-btn" id="m-left">⬅️</div>
                <div class="m-btn" id="m-right">➡️</div>
                <div class="m-btn" id="m-up">⬆️</div>
            </div>
            <div class="action-btns">
                <div class="m-btn" id="m-fire">FIRE</div>
                <div class="m-btn" id="m-jump">JUMP</div>
            </div>
        </div>
    </div>
<script>
const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d'); ctx.imageSmoothingEnabled = false;

function resize() {
    const w = window.innerWidth; const h = window.innerHeight; const ratio = 800 / 480;
    let canvasW, canvasH;
    if (w / h > ratio) { canvasH = h; canvasW = h * ratio; } else { canvasW = w; canvasH = w / ratio; }
    canvas.style.width = canvasW + 'px'; canvas.style.height = canvasH + 'px';
}
window.addEventListener('resize', resize); resize();

const PAL = { 'R': '#E52521', 'B': '#0043A6', 'S': '#FFCC99', 'O': '#8B4513', 'Y': '#F8E71C', 'W': '#FFFFFF', 'K': '#000000', 'G': '#4169E1', 'D': '#8B0000', 'L': '#00FF00', 'C': '#FFD700', 'M': '#A0522D', 'Q': '#D2691E', 'P':'#FFB6C1' };
const SPRITE_DESIGNS = {
    playerIdle: ["    RRRRR       ", "   RRRRRRRRR    ", "   OOOSOS       ", "  OSOSSSOSSS    ", "  OSOSSSOSSS    ", "  OOOSSSSO      ", "   SSSSSSS      ", "  RRBRRR        ", " RRRBRRRR       ", "RRRRBBRRRR      ", "OORBBBBOOO      ", "OORB  BROO      ", "  BB  BB        ", " OOO  OOO       ", "OOOO  OOOO      ", "                "],
    playerRun1: ["    RRRRR       ", "   RRRRRRRRR    ", "   OOOSOS       ", "  OSOSSSOSSS    ", "  OSOSSSOSSS    ", "  OOOSSSSO      ", "   SSSSSSS      ", "  RRBRRR        ", " RRRBRRRR       ", "RRRRBBRRRR      ", "OORBBBBOOO      ", "  RB  BR        ", "  BB  BB        ", " OOO   OOO      ", "OOOO    OOOO    ", "                "],
    playerJump: ["    RRRRR       ", "   RRRRRRRRR    ", "   OOOSOS       ", "  OSOSSSOSSS    ", "  OSOSSSOSSS    ", "  OOOSSSSO      ", "   SSSSSSS      ", "  RRBRRR     O  ", " RRRBRRRR   OO  ", "RRRRBBRRRR  OO  ", "OORBBBBOOO  O   ", "OORB  BR        ", "  BB  BB        ", " OOO   OO       ", "OOOO    OO      ", "                "],
    enemyWalk1: ["                ", "                ", "                ", "      OOOO      ", "     OOOOOO     ", "    OOOOOOOO    ", "   OOOWOOOWOO   ", "  OOOOKOOOKOOO  ", "  OOOOOOOOOOOO  ", "  OOOOOOOOOOOO  ", "   OOOOOOOOOO   ", "    SS    SS    ", "   SSSS  SSSS   ", "  SSSS    SSSS  ", "                ", "                "],
    bird1:      ["                ", "    R           ", "   RRR    WWWW  ", "  RRWRR  WWWWW  ", " RRWWWRRWWWW    ", "RRRWWWRRWWW     ", "RRRRRRRRWW      ", " RRYRYRRW       ", "  RRRRR         ", "   RRR          ", "    O           ", "   OOO          ", "                ", "                ", "                ", "                "],
    bird2:      ["    R     WWWW  ", "   RRR   WWWWW  ", "  RRWRR WWWW    ", " RRWWWRRWWW     ", "RRRWWWRRWW      ", "RRRRRRRRW       ", " RRYRYRR        ", "  RRRRR         ", "   RRR          ", "    O           ", "   OOO          ", "                ", "                ", "                ", "                ", "                "],
    brick:      ["OOOOOOOOOOOOOOOO", "OMMMMMMMMMMMMMMO", "OMQMQMQMMQMQMQMO", "OMMMMMMMMMMMMMMO", "OOOOOOOOOOOOOOOO", "MMMMMOOMMMMMMMMO", "QMQMQOOMQMQMQMQO", "MMMMMOOMMMMMMMMO", "OOOOOOOOOOOOOOOO", "OMMMMMMMMMMOOMMM", "OMQMQMQMQMQOOMQM", "OMMMMMMMMMMOOMMM", "OOOOOOOOOOOOOOOO", "MMMMMOOMMMMMMMMO", "QMQMQOOMQMQMQMQO", "MMMMMOOMMMMMMMMO"],
    question:   ["YYYYYYYYYYYYYYYY", "YCCCCCCCCCCCCCCY", "YCCYOOOOOOYYCCCY", "YCYOOYYYYOOYYCCY", "YCYOOYCCYOOYYCCY", "YCYOOYCCYOOYYCCY", "YCCYYYCCYOOYYCCY", "YCCCCCYYOOYYCCCY", "YCCCCYYOOYYCCCCY", "YCCCCYOOYYCCCCCY", "YCCCCYOOYYCCCCCY", "YCCCCCCCCCCCCCCY", "YCCCCYOOYYCCCCCY", "YCCCCYOOYYCCCCCY", "YCCCCCCCCCCCCCCY", "YYYYYYYYYYYYYYYY"],
    ground:     ["LLLLLLLLLLLLLLLL", "LLLLLLLLLLLLLLLL", "OOOOOOOOOOOOOOOO", "OQQOOQQOOQQOOQQO", "OQQOOQQOOQQOOQQO", "OOOOOOOOOOOOOOOO", "QOOQQOOQQOOQQOOQ", "QOOQQOOQQOOQQOOQ", "OOOOOOOOOOOOOOOO", "OQQOOQQOOQQOOQQO", "OQQOOQQOOQQOOQQO", "OOOOOOOOOOOOOOOO", "QOOQQOOQQOOQQOOQ", "QOOQQOOQQOOQQOOQ", "OOOOOOOOOOOOOOOO", "OOOOOOOOOOOOOOOO"],
    mushroom:   ["                ", "      RRRR      ", "    RRRRRRRR    ", "   RRWRRRRWRR   ", "  RRWWRRRRWWRR  ", "  RRRRRRRRRRRR  ", "  RRRRWRRRRWRR  ", "   RRWWRRRWWR   ", "    SSSKKSSS    ", "    SSSSSSSS    ", "     SSSSSS     ", "                ", "                ", "                ", "                ", "                "],
    flower:     ["                ", "     QQQQQQ     ", "    QYYYYYYQ    ", "   QYYRRRRYYQ   ", "   QYRRRRRRYQ   ", "   QYYRRRRYYQ   ", "    QYYYYYYQ    ", "     QQQQQQ     ", "       LL       ", "      LLLL      ", "    LLL  LLL    ", "       LL       ", "       LL       ", "                ", "                ", "                "],
    star:       ["                ", "       KK       ", "      YYYY      ", "     YYYYYY     ", " YYYYYYYYYYYYYY ", "  YYYKYYYYKYYY  ", "   YYYYYYYYYY   ", "    YYYYYYYY    ", "   YYYY  YYYY   ", "  YYYY    YYYY  ", " YY          YY ", "                ", "                ", "                ", "                ", "                "]
};

const sprites = {};
for (let key in SPRITE_DESIGNS) {
    const c = document.createElement('canvas'); c.width = 16; c.height = 16; const cx = c.getContext('2d');
    const design = SPRITE_DESIGNS[key];
    for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) if (design[y][x] !== ' ') { cx.fillStyle = PAL[design[y][x]]; cx.fillRect(x, y, 1, 1); }
    sprites[key] = c;
}

const TILE = 32; const GRAVITY = 0.4; const MAX_FALL = 10; const ACCEL = 0.2; const FRICTION = 0.85; 
const MAX_SPEED = 4; const RUN_SPEED = 6; const JUMP_FORCE = 8.5; const JUMP_SUSTAIN = 0.25;

const levels = [
    { name: "1-1", bg: "#5c94fc", map: [
        "                                                                                                              ",
        "                                                                                                              ",
        "                                                                                                              ",
        "                                     3                                                                        ",
        "                                                                                                              ",
        "                                     1                                                                        ",
        "                                                                                                              ",
        "                          ?   B2B                  E                                                F         ",
        "                                                 BBBB                       X                       #         ",
        "            E                   v                                          XX       X               #         ",
        "P                              p       E                              E   XXX      XX               #         ",
        "################################  ###########################################      ####################       ",
        "################################  ###########################################      ####################       ",
        "################################  ###########################################      ####################       "
    ]},
    { name: "1-2", bg: "#000000", map: [
        "##############################################################################################################",
        "                                                                                                              ",
        "                                                                                                              ",
        "                                                                                                              ",
        "                                 BB2BB                                                                        ",
        "                                                                                                              ",
        "                                                  p                                                           ",
        "                          ?   B1B                      E       v       X                            F         ",
        "                                            X                         XX                            #         ",
        "            E                              XX                 E      XXX                            #         ",
        "P           X           v                 XXX                       XXXX                            #         ",
        "#############   #############################################################      ####################       ",
        "#############   #############################################################      ####################       ",
        "#############   #############################################################      ####################       "
    ]}
];

let state = 'START'; let score = 0, coins = 0, lives = 3, currentLevel = 0, cameraX = 0, frameCount = 0;
let player, blocks, hazards, enemies, items, particles, fireballs, flagPole;
const keys = { left: false, right: false, up: false, shift: false, z: false };

function handleInput(type, val) {
    if (type === 'left') keys.left = val;
    if (type === 'right') keys.right = val;
    if (type === 'up') {
        if (val && !keys.up && state === 'PLAYING' && player.grounded) { player.vy = -JUMP_FORCE; player.grounded = false; player.jumpFrames = 15; }
        keys.up = val; if (!val) player.jumpFrames = 0;
    }
    if (type === 'fire') {
        if (val && !keys.z && state === 'PLAYING' && player.power === 'fire' && fireballs.length < 2) {
            fireballs.push({x: player.dir===1 ? player.x+player.w : player.x-12, y: player.y+8, vx: player.dir*7, vy: 0});
        }
        keys.z = val;
    }
}

window.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') handleInput('left', true);
    if (e.code === 'ArrowRight' || e.code === 'KeyD') handleInput('right', true);
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = true;
    if (e.code === 'KeyZ') handleInput('fire', true);
    if ((e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space')) handleInput('up', true);
});
window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') handleInput('left', false);
    if (e.code === 'ArrowRight' || e.code === 'KeyD') handleInput('right', false);
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = false;
    if (e.code === 'KeyZ') handleInput('fire', false);
    if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') handleInput('up', false);
});

function bindM(id, type) {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); handleInput(type, true); };
    const end = (e) => { e.preventDefault(); handleInput(type, false); };
    el.addEventListener('touchstart', start, {passive: false}); el.addEventListener('mousedown', start);
    el.addEventListener('touchend', end); el.addEventListener('mouseup', end); el.addEventListener('mouseleave', end);
}
bindM('m-left', 'left'); bindM('m-right', 'right'); bindM('m-up', 'up'); bindM('m-jump', 'up'); bindM('m-fire', 'fire');

const msgEl = document.getElementById('message');
const handleStart = (e) => { if(e) e.preventDefault(); startGame(); };
msgEl.addEventListener('touchstart', handleStart, {passive: false});
msgEl.addEventListener('click', handleStart);

function initPlayer() { player = { x: 50, y: 100, w: 24, h: 30, vx: 0, vy: 0, grounded: false, jumpFrames: 0, dir: 1, animState: 'idle', power: 'small', invincTimer: 0, starPower: 0 }; }

function loadLevel(index) {
    if(!player) initPlayer();
    player.vx = 0; player.vy = 0;
    blocks = []; enemies = []; items = []; particles = []; fireballs = []; hazards = []; flagPole = null; cameraX = 0;
    const map = levels[index].map;
    for (let y = 0; y < map.length; y++) {
        for (let x = 0; x < map[y].length; x++) {
            const c = map[y][x]; const px = x * TILE, py = y * TILE;
            if (c === '#') blocks.push({x: px, y: py, w: TILE, h: TILE, type: 'ground'});
            else if (c === 'B') blocks.push({x: px, y: py, w: TILE, h: TILE, type: 'brick'});
            else if (c === '?') blocks.push({x: px, y: py, w: TILE, h: TILE, type: 'question', content: 'coin', active: true});
            else if (c === '1') blocks.push({x: px, y: py, w: TILE, h: TILE, type: 'question', content: 'mushroom', active: true});
            else if (c === '2') blocks.push({x: px, y: py, w: TILE, h: TILE, type: 'question', content: 'flower', active: true});
            else if (c === '3') blocks.push({x: px, y: py, w: TILE, h: TILE, type: 'question', content: 'star', active: true});
            else if (c === 'X') blocks.push({x: px, y: py, w: TILE, h: TILE, type: 'hard_block'});
            else if (c === 'p') blocks.push({x: px, y: py - TILE, w: TILE*2, h: TILE*2, type: 'pipe'});
            else if (c === 'P') { player.x = px; player.y = py; }
            else if (c === 'E') enemies.push({x: px, y: py+2, w: 28, h: 28, vx: -1, vy: 0, type: 'goomba', alive: true});
            else if (c === 'v') enemies.push({x: px, y: py, w: 28, h: 28, vx: -1.5, vy: 0, startY: py, type: 'bird', alive: true});
            else if (c === 'F') flagPole = {x: px + 10, y: py - 300, w: 10, h: 330};
            else if (c === 'L') hazards.push({x: px, y: py + 10, w: TILE, h: TILE - 10, type: 'lava', drawY: py});
        }
    }
    updateHUD();
}

window.startGame = () => {
    const msg = document.getElementById('message');
    if (state === 'LEVEL_CLEAR' && currentLevel >= levels.length - 1) {
        state = 'GAME_OVER_WIN'; msg.innerHTML = "YOU SAVED THE PRINCESS!<br><span style='font-size:16px'>Click to Play Again</span>"; msg.style.display = 'block'; return;
    }
    msg.style.display = 'none';
    if(state === 'START' || state === 'GAME_OVER' || state === 'GAME_OVER_WIN' || state === 'DEAD') { 
        if (state !== 'DEAD' || lives <= 0) { score=0; coins=0; lives=3; currentLevel=0; initPlayer(); }
    }
    else if(state === 'LEVEL_CLEAR') { currentLevel++; }
    state = 'PLAYING'; loadLevel(currentLevel);
    if (!window.loopActive) { window.loopActive = true; gameLoop(); }
};

function updateHUD() {
    document.getElementById('score').innerText = score.toString().padStart(6, '0');
    document.getElementById('coins').innerText = coins.toString().padStart(2, '0');
    document.getElementById('level').innerText = levels[currentLevel] ? levels[currentLevel].name : "WIN";
    document.getElementById('lives').innerText = lives;
}

function rectIntersect(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }

function setPlayerPower(newPower) {
    if(newPower === 'small' && player.power !== 'small') { player.power = 'small'; player.h = 30; player.y += 16; player.invincTimer = 120; }
    else if (newPower === 'big' || newPower === 'fire') { if(player.power === 'small') { player.h = 46; player.y -= 16; } player.power = newPower; }
}

function handlePlayerPhysics() {
    if (player.invincTimer > 0) player.invincTimer--; if (player.starPower > 0) player.starPower--;
    let targetSpeed = keys.shift ? RUN_SPEED : MAX_SPEED;
    if (keys.left) { player.vx -= ACCEL; player.dir = -1; } else if (keys.right) { player.vx += ACCEL; player.dir = 1; } else { player.vx *= FRICTION; }
    if (player.vx > targetSpeed) player.vx = targetSpeed; if (player.vx < -targetSpeed) player.vx = -targetSpeed;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
    player.x += player.vx;
    for (let b of blocks) if (rectIntersect(player, b)) { if (player.vx > 0) { player.x = b.x - player.w; player.vx = 0; } else if (player.vx < 0) { player.x = b.x + b.w; player.vx = 0; } }
    if (player.x < 0) { player.x = 0; player.vx = 0; }
    player.vy += GRAVITY;
    if (keys.up && player.jumpFrames > 0) { player.vy -= JUMP_SUSTAIN; player.jumpFrames--; } else { player.jumpFrames = 0; }
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;
    player.y += player.vy; player.grounded = false;
    for (let b of blocks) {
        if (rectIntersect(player, b)) {
            if (player.vy > 0) { player.y = b.y - player.h; player.grounded = true; player.vy = 0; }
            else if (player.vy < 0) { player.y = b.y + b.h; player.vy = 0; player.jumpFrames = 0; handleBlockHit(b); }
        }
    }
    if (!player.grounded) player.animState = 'jump'; else if (Math.abs(player.vx) > 0.5) player.animState = 'run'; else player.animState = 'idle';
    if (player.y > canvas.height + 50) die();
}

function handleBlockHit(b) {
    if (b.type === 'question' && b.active) {
        b.active = false;
        if(b.content === 'coin') { items.push({x: b.x + 8, y: b.y - TILE, w: 16, h: 16, type: 'coin_anim', vy: -6}); score += 100; coins++; updateHUD(); }
        else if(b.content === 'mushroom') { items.push({x: b.x, y: b.y - TILE, w: 28, h: 28, type: 'mushroom', vx: 2, vy: 0}); }
        else if(b.content === 'flower') { if(player.power==='small') items.push({x: b.x, y: b.y - TILE, w: 28, h: 28, type: 'mushroom', vx: 2, vy: 0}); else items.push({x: b.x, y: b.y - TILE, w: 28, h: 28, type: 'flower', vx: 0, vy: 0}); }
        else if(b.content === 'star') { items.push({x: b.x, y: b.y - TILE, w: 28, h: 28, type: 'star', vx: 2.5, vy: -4}); }
    } else if (b.type === 'brick' && player.power !== 'small') {
        blocks.splice(blocks.indexOf(b), 1); score += 50; updateHUD();
        for(let i=0; i<5; i++) particles.push({ x: b.x+16, y: b.y+16, vx: (Math.random()-0.5)*8, vy: -Math.random()*6-2, life: 30 });
    }
}

function die() {
    state = 'DEAD'; lives--; updateHUD(); const msg = document.getElementById('message');
    if (lives <= 0) { state = 'GAME_OVER'; msg.innerHTML = "GAME OVER<br><span style='font-size:16px'>Click to Restart</span>"; }
    else { msg.innerHTML = "YOU LOST A LIFE<br><span style='font-size:16px'>Click to Retry Level</span>"; }
    msg.style.display = 'block';
}

function hitEnemy(e) { e.alive = false; score += 200; updateHUD(); for(let j=0; j<4; j++) particles.push({ x: e.x+14, y: e.y+14, vx: (Math.random()-0.5)*6, vy: -Math.random()*6-2, life: 20 }); }

function updateEntities() {
    for (let i = fireballs.length - 1; i >= 0; i--) {
        let f = fireballs[i]; f.x += f.vx; f.vy += GRAVITY; f.y += f.vy; let remove = false;
        for (let b of blocks) if (rectIntersect({x: f.x, y: f.y, w: 12, h: 12}, b)) { if (f.vy > 0 && f.y < b.y) { f.y = b.y - 12; f.vy = -4; } else remove = true; }
        for (let e of enemies) if (e.alive && rectIntersect({x: f.x, y: f.y, w: 12, h: 12}, e)) { hitEnemy(e); remove = true; }
        if (f.y > canvas.height || remove) fireballs.splice(i, 1);
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i]; if (!e.alive) continue;
        if (e.type === 'goomba') { e.vy += GRAVITY; if(e.vy > MAX_FALL) e.vy = MAX_FALL; e.x += e.vx; for (let b of blocks) if (rectIntersect(e, b)) { if (e.vx > 0) { e.x = b.x - e.w; e.vx *= -1; } else if (e.vx < 0) { e.x = b.x + b.w; e.vx *= -1; } } e.y += e.vy; for (let b of blocks) if (rectIntersect(e, b)) { if (e.vy > 0) { e.y = b.y - e.h; e.vy = 0; } } }
        else if (e.type === 'bird') { e.x += e.vx; e.y = e.startY + Math.sin(frameCount * 0.05) * 40; }
        if (rectIntersect(player, e)) { if (player.starPower > 0) { hitEnemy(e); } else if (player.vy > 0 && player.y + player.h < e.y + e.h/2 + 10) { e.alive = false; player.vy = -JUMP_FORCE; score += 200; updateHUD(); } else if (player.invincTimer === 0) { if (player.power !== 'small') setPlayerPower('small'); else die(); } }
    }
    for (let i = items.length - 1; i >= 0; i--) { 
        let item = items[i]; 
        if(item.type !== 'flower' && item.type !== 'coin_anim') { item.vy += GRAVITY; item.x += item.vx; for (let b of blocks) if (rectIntersect(item, b)) { if (item.vx > 0) { item.x = b.x - item.w; item.vx *= -1; } else if (item.vx < 0) { item.x = b.x + b.w; item.vx *= -1; } } item.y += item.vy; for (let b of blocks) if (rectIntersect(item, b)) { if (item.vy > 0) { item.y = b.y - item.h; item.vy = (item.type==='star') ? -6 : 0; } } }
        else if (item.type === 'coin_anim') { item.y += item.vy; item.vy += GRAVITY; if (item.vy > 5) { items.splice(i, 1); continue; } }
        if (item.type !== 'coin_anim' && rectIntersect(player, item)) { if(item.type === 'mushroom') { setPlayerPower('big'); score += 1000; } else if(item.type === 'flower') { setPlayerPower('fire'); score += 1000; } else if(item.type === 'star') { player.starPower = 600; score += 1000; } updateHUD(); items.splice(i, 1); }
    }
    for (let h of hazards) if (rectIntersect(player, h) && player.invincTimer===0 && player.starPower===0) { if(player.power !== 'small') { setPlayerPower('small'); player.y -= 20; player.vy = -6; } else die(); }
    for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += GRAVITY; p.life--; if (p.life <= 0) particles.splice(i, 1); }
    if (flagPole && rectIntersect(player, flagPole)) { state = 'LEVEL_CLEAR'; score += 1000; updateHUD(); document.getElementById('message').innerHTML = "COURSE CLEAR!<br><span style='font-size:16px'>Click for Next World</span>"; document.getElementById('message').style.display = 'block'; }
}

function render() {
    let targetCamX = player.x - canvas.width / 2.5; if (targetCamX < 0) targetCamX = 0; cameraX += (targetCamX - cameraX) * 0.1;
    ctx.fillStyle = levels[currentLevel] ? levels[currentLevel].bg : '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(Math.floor(-cameraX), 0);
    for (let b of blocks) {
        if (b.type === 'ground') ctx.drawImage(sprites.ground, b.x, b.y, TILE, TILE);
        else if (b.type === 'brick') ctx.drawImage(sprites.brick, b.x, b.y, TILE, TILE);
        else if (b.type === 'question') { if (b.active) ctx.drawImage(sprites.question, b.x, b.y, TILE, TILE); else { ctx.fillStyle = '#888'; ctx.fillRect(b.x, b.y, TILE, TILE); } }
        else if (b.type === 'hard_block') { ctx.fillStyle = '#cc7722'; ctx.fillRect(b.x, b.y, TILE, TILE); ctx.fillStyle = '#ffaa77'; ctx.fillRect(b.x, b.y, TILE, 4); ctx.fillRect(b.x, b.y, 4, TILE); ctx.fillStyle = '#000'; ctx.strokeRect(b.x, b.y, TILE, TILE); }
        else if (b.type === 'pipe') { let grad = ctx.createLinearGradient(b.x, 0, b.x+b.w, 0); grad.addColorStop(0, '#005500'); grad.addColorStop(0.2, '#00FF00'); grad.addColorStop(1, '#004400'); ctx.fillStyle = grad; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = '#000'; ctx.strokeRect(b.x, b.y, b.w, b.h); ctx.fillStyle = grad; ctx.fillRect(b.x-2, b.y, b.w+4, TILE); ctx.fillStyle = '#000'; ctx.strokeRect(b.x-2, b.y, b.w+4, TILE); }
    }
    for (let h of hazards) if (h.type === 'lava') { ctx.fillStyle = '#FF2200'; ctx.fillRect(h.x, h.drawY, h.w, TILE); ctx.fillStyle = '#FFCC00'; let wave = Math.sin((frameCount + h.x) * 0.1) * 4; ctx.fillRect(h.x, h.drawY + wave + 4, h.w, 4); }
    if(flagPole) { ctx.fillStyle = '#FFF'; ctx.fillRect(flagPole.x, flagPole.y, flagPole.w, flagPole.h); ctx.fillStyle = '#0a0'; ctx.fillRect(flagPole.x + 10, flagPole.y + 20, 40, 30); }
    for (let e of enemies) if (e.alive) {
        if(e.type === 'goomba') { if(Math.floor(frameCount / 15) % 2 === 0) ctx.drawImage(sprites.enemyWalk1, e.x, e.y, e.w, e.h); else { ctx.save(); ctx.translate(e.x + e.w, e.y); ctx.scale(-1, 1); ctx.drawImage(sprites.enemyWalk1, 0, 0, e.w, e.h); ctx.restore(); } }
        else if (e.type === 'bird') ctx.drawImage((Math.floor(frameCount / 10) % 2 === 0) ? sprites.bird1 : sprites.bird2, e.x, e.y, e.w, e.h);
    }
    for (let f of fireballs) { ctx.fillStyle = '#FF4500'; ctx.beginPath(); ctx.arc(f.x+6, f.y+6, 6, 0, Math.PI*2); ctx.fill(); }
    for (let i of items) { if(i.type==='coin_anim') { ctx.fillStyle = '#FFD700'; ctx.fillRect(i.x, i.y, i.w, i.h); } else if(i.type==='mushroom') ctx.drawImage(sprites.mushroom, i.x, i.y, i.w, i.h); else if(i.type==='flower') ctx.drawImage(sprites.flower, i.x, i.y, i.w, i.h); else if(i.type==='star') ctx.drawImage(sprites.star, i.x, i.y, i.w, i.h); }
    for (let p of particles) { ctx.fillStyle = '#8B4513'; ctx.fillRect(p.x, p.y, 6, 6); }
    ctx.save(); if(player.invincTimer > 0 && Math.floor(frameCount/5)%2===0) ctx.globalAlpha = 0.5; if(player.starPower > 0) ctx.filter = 'hue-rotate(' + (frameCount*20)%360 + 'deg) brightness(1.2)'; else if(player.power === 'fire') ctx.filter = 'sepia(1) hue-rotate(180deg) saturate(3)'; if (player.dir === -1) { ctx.translate(player.x + player.w, player.y); ctx.scale(-1, 1); ctx.translate(-player.x, -player.y); } let pSprite = (player.animState === 'jump') ? sprites.playerJump : (player.animState === 'run' && Math.floor(frameCount / 8) % 2 === 0) ? sprites.playerRun1 : sprites.playerIdle; let drawY = player.power === 'small' ? player.y - 2 : player.y; let drawH = player.power === 'small' ? 32 : 48; ctx.drawImage(pSprite, player.x - 4, drawY, 32, drawH); ctx.restore(); ctx.restore();
}

function gameLoop() { if (state === 'PLAYING') { frameCount++; handlePlayerPhysics(); updateEntities(); render(); } requestAnimationFrame(gameLoop); }
ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
</script>
