<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 - Merge & Math Quest</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        h1 {
            margin: 10px 0;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #818cf8;
            background: -webkit-linear-gradient(#60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-info {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .score-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .score-box span {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .score-box strong {
            font-size: 1.5rem;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.1);
            width: 90vmin;
            height: 90vmin;
            max-width: 400px;
            max-height: 400px;
            position: relative;
        }
        .tile {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            transition: all 0.15s ease-in-out;
        }
        .tile[data-val="2"] { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .tile[data-val="4"] { background: #8b5cf6; box-shadow: 0 0 10px #8b5cf6; }
        .tile[data-val="8"] { background: #d946ef; box-shadow: 0 0 10px #d946ef; }
        .tile[data-val="16"] { background: #ec4899; box-shadow: 0 0 10px #ec4899; }
        .tile[data-val="32"] { background: #f43f5e; box-shadow: 0 0 10px #f43f5e; }
        .tile[data-val="64"] { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .tile[data-val="128"] { background: #f59e0b; box-shadow: 0 0 15px #f59e0b; font-size: 1.8rem;}
        .tile[data-val="256"] { background: #eab308; box-shadow: 0 0 20px #eab308; font-size: 1.8rem;}
        .tile[data-val="512"] { background: #10b981; box-shadow: 0 0 20px #10b981; font-size: 1.8rem;}
        .tile[data-val="1024"] { background: #14b8a6; box-shadow: 0 0 25px #14b8a6; font-size: 1.5rem;}
        .tile[data-val="2048"] { background: #06b6d4; box-shadow: 0 0 30px #06b6d4; font-size: 1.5rem;}
        
        .game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .game-over.active {
            opacity: 1;
            pointer-events: auto;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #2563eb;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #2563eb;
        }
        .controls-hint {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
            text-align: center;
        }
    
    </style>
</head>
<body>
    <h1>2048 Quest</h1>
    <div class="header-info">
        <div class="score-box">
            <span>Score</span>
            <strong id="score">0</strong>
        </div>
        <div class="score-box">
            <span>Best</span>
            <strong id="best">0</strong>
        </div>
    </div>
    
    <div id="game-board">
        <!-- 16 tiles -->
        <div class="game-over" id="game-over">
            <h2>Game Over!</h2>
            <button onclick="initGame()">Try Again</button>
        </div>
    </div>

    <div class="controls-hint">Swipe on screen or use Arrow Keys to merge.</div>

    <script>
        const boardSize = 4;
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048_best') || 0;
        const boardEl = document.getElementById('game-board');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const gameOverEl = document.getElementById('game-over');

        bestEl.innerText = bestScore;

        function initGame() {
            board = Array(boardSize).fill().map(() => Array(boardSize).fill(0));
            score = 0;
            scoreEl.innerText = score;
            gameOverEl.classList.remove('active');
            renderBoard();
            addRandomTile();
            addRandomTile();
        }

        function renderBoard() {
            // Remove existing tiles
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(t => t.remove());

            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const tile = document.createElement('div');
                    tile.classList.add('tile');
                    if (board[r][c] !== 0) {
                        tile.innerText = board[r][c];
                        tile.setAttribute('data-val', board[r][c]);
                    }
                    // Positioning for absolute animation could be added, but grid is simpler for now
                    tile.style.gridRow = r + 1;
                    tile.style.gridColumn = c + 1;
                    boardEl.appendChild(tile);
                }
            }
        }

        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let randCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randCell.r][randCell.c] = Math.random() < 0.9 ? 2 : 4;
                renderBoard();
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            let missing = boardSize - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function combine(row) {
            for (let i = 0; i < boardSize - 1; i++) {
                if (row[i] !== 0 && row[i] === row[i+1]) {
                    row[i] *= 2;
                    row[i+1] = 0;
                    score += row[i];
                }
            }
            return row;
        }

        function move(direction) {
            let moved = false;
            let newBoard = JSON.parse(JSON.stringify(board));

            if (direction === 'Left' || direction === 'Right') {
                for (let r = 0; r < boardSize; r++) {
                    let row = newBoard[r];
                    if (direction === 'Right') row.reverse();
                    row = slide(row);
                    row = combine(row);
                    row = slide(row);
                    if (direction === 'Right') row.reverse();
                    newBoard[r] = row;
                }
            } else if (direction === 'Up' || direction === 'Down') {
                for (let c = 0; c < boardSize; c++) {
                    let col = [newBoard[0][c], newBoard[1][c], newBoard[2][c], newBoard[3][c]];
                    if (direction === 'Down') col.reverse();
                    col = slide(col);
                    col = combine(col);
                    col = slide(col);
                    if (direction === 'Down') col.reverse();
                    for (let r = 0; r < boardSize; r++) newBoard[r][c] = col[r];
                }
            }

            if (JSON.stringify(board) !== JSON.stringify(newBoard)) {
                board = newBoard;
                scoreEl.innerText = score;
                if (score > bestScore) {
                    bestScore = score;
                    bestEl.innerText = bestScore;
                    localStorage.setItem('2048_best', bestScore);
                }
                addRandomTile();
                checkGameOver();
            }
        }

        function checkGameOver() {
            let isOver = true;
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (board[r][c] === 0) isOver = false;
                    if (c !== 3 && board[r][c] === board[r][c+1]) isOver = false;
                    if (r !== 3 && board[r][c] === board[r+1][c]) isOver = false;
                }
            }
            if (isOver) {
                gameOverEl.classList.add('active');
            }
        }

        // Keyboard Controls
        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
                move(e.code.replace('Arrow', ''));
            }
        });

        // Touch Swipe Controls
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive: false});

        function handleSwipe(startX, startY, endX, endY) {
            let dx = endX - startX;
            let dy = endY - startY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) move(dx > 0 ? 'Right' : 'Left');
            } else {
                if (Math.abs(dy) > 30) move(dy > 0 ? 'Down' : 'Up');
            }
        }

        initGame();
    </script>
</body>
</html>
