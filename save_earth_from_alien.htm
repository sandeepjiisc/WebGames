<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Save Earth From Aliens</title>
    <link rel="stylesheet" href="save_earth_from_alien_dep/style.css">
    <style>
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 100;
        }
        .mobile-btn {
            width: 90px;
            height: 90px;
            background: rgba(255, 0, 0, 0.4);
            border: 3px solid #ff4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            user-select: none;
            touch-action: manipulation;
        }
        .mobile-btn:active {
            background: rgba(255, 0, 0, 0.7);
        }
        .top-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
        }
        .top-controls button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
        }
    
    </style>
</head>
<body>
    <canvas id="canvas1"></canvas>
    
    <div class="top-controls">
        <button id="fullScreenButton">F</button>
        <button id="resetButton">R</button>
    </div>

    <div id="mobile-controls">
        <div class="mobile-btn" id="btn-shoot">🔥</div>
    </div>

    <div class="hidden">
        <img src="save_earth_from_alien_dep/planet.png" id="planet">
        <img src="save_earth_from_alien_dep/player.png" id="player">
        <img src="save_earth_from_alien_dep/asteroid.png" id="asteroid">
        <img src="save_earth_from_alien_dep/lobstermorph.png" id="lobstermorph">
        <img src="save_earth_from_alien_dep/beetlemorph.png" id="beetlemorph">
        <img src="save_earth_from_alien_dep/rhinomorph.png" id="rhinomorph">
    </div>

    <script src="save_earth_from_alien_dep/script.js"></script>
</body>
</html>
