<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful 2-Player Tank Wars</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a2e; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
        }
        h1 { margin: 0 0 10px 0; color: #e94560; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        canvas { 
            background: linear-gradient(to bottom, #0f3460, #87CEEB, #E0F6FF); 
            border: 4px solid #fff; 
            border-radius: 8px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
            margin-top: 10px; 
        }
        #ui { 
            width: 960px; 
            display: flex; 
            justify-content: space-between; 
            padding: 15px 20px; 
            background: rgba(22, 33, 62, 0.9); 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #0f3460;
        }
        .player-ui { display: flex; flex-direction: column; width: 40%; }
        .controls { font-size: 13px; color: #a9a9a9; margin-top: 8px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px;}
        .turn-indicator { 
            font-size: 24px; 
            font-weight: bold; 
            text-align: center; 
            color: #FFD700; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 1px 1px 2px #000;
        }
        .stat { font-weight: bold; color: #fff; }
        .weapon-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>
    <h1>Tanks of Chaos</h1>
    <div id="ui">
        <div class="player-ui" id="p1-ui">
            <h2 style="color: #FF5722; margin:0 0 5px 0;">Player 1 (Left)</h2>
            <div>Health: <span id="p1-hp" class="stat">100</span> | Power: <span id="p1-power" class="stat">50</span> | Angle: <span id="p1-angle" class="stat">45</span>&deg;</div>
            <div style="margin-top: 5px;">Weapon: <span id="p1-weapon" class="weapon-badge" style="background: #4CAF50;">Standard</span></div>
            <div class="controls"><b>W/S:</b> Angle &nbsp;|&nbsp; <b>A/D:</b> Power &nbsp;|&nbsp; <b>1-4:</b> Weapon &nbsp;|&nbsp; <b>Space:</b> Fire</div>
        </div>
        <div class="turn-indicator" id="turn-display">Player 1's Turn</div>
        <div class="player-ui" style="text-align: right;" id="p2-ui">
            <h2 style="color: #2196F3; margin:0 0 5px 0;">Player 2 (Right)</h2>
            <div>Health: <span id="p2-hp" class="stat">100</span> | Power: <span id="p2-power" class="stat">50</span> | Angle: <span id="p2-angle" class="stat">135</span>&deg;</div>
            <div style="margin-top: 5px;">Weapon: <span id="p2-weapon" class="weapon-badge" style="background: #4CAF50;">Standard</span></div>
            <div class="controls"><b>&uarr;/&darr;:</b> Angle &nbsp;|&nbsp; <b>&larr;/&rarr;:</b> Power &nbsp;|&nbsp; <b>1-4:</b> Weapon &nbsp;|&nbsp; <b>Enter:</b> Fire</div>
        </div>
    </div>
    <canvas id="gameCanvas" width="1000" height="550"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const weapons = [
            { name: "Standard", color: "#4CAF50", bg: "#4CAF50", damage: 20, radius: 45, type: "normal" },
            { name: "Meteor Shower", color: "#FF9800", bg: "#FF9800", damage: 15, radius: 35, type: "meteor" },
            { name: "Laser Beam", color: "#00E5FF", bg: "#00E5FF", damage: 30, radius: 15, type: "laser" },
            { name: "Nuclear Bomb", color: "#FF0055", bg: "#FF0055", damage: 50, radius: 140, type: "nuke" }
        ];

        let p1 = { x: 80, y: 500, w: 46, h: 24, hp: 100, maxHp: 100, color: '#FF5722', angle: 45, power: 60, weaponIdx: 0 };
        let p2 = { x: 870, y: 500, w: 46, h: 24, hp: 100, maxHp: 100, color: '#2196F3', angle: 135, power: 60, weaponIdx: 0 };

        let barriers = [
            { x: 300, y: 350, w: 30, h: 150, hp: 80, maxHp: 80, color: '#8D6E63' },
            { x: 480, y: 250, w: 40, h: 250, hp: 150, maxHp: 150, color: '#546E7A' },
            { x: 670, y: 350, w: 30, h: 150, hp: 80, maxHp: 80, color: '#8D6E63' }
        ];

        let turn = 1; 
        let state = 'aiming'; // aiming, firing
        let projectiles = [];
        let explosions = [];

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        window.addEventListener('keydown', e => {
            if (state !== 'aiming') return;
            let currentPlayer = turn === 1 ? p1 : p2;

            if ((turn === 1 && e.code === 'Space') || (turn === 2 && e.code === 'Enter')) {
                fire(currentPlayer);
            }

            if (['Digit1', 'Digit2', 'Digit3', 'Digit4'].includes(e.code)) {
                let idx = parseInt(e.key) - 1;
                currentPlayer.weaponIdx = idx;
                updateUI();
            }
        });

        function fire(player) {
            state = 'firing';
            let wp = weapons[player.weaponIdx];
            let rad = player.angle * Math.PI / 180;

            // Calculate barrel tip
            let startX = player.x + player.w/2 + Math.cos(rad) * 35;
            let startY = player.y - Math.sin(rad) * 35;

            if (wp.type === 'laser') {
                projectiles.push({
                    x: startX, y: startY,
                    vx: Math.cos(rad) * 50, vy: -Math.sin(rad) * 50,
                    type: 'laser', wp: wp, active: true, life: 50 // frames before it fades if missed
                });
            } else {
                projectiles.push({
                    x: startX, y: startY,
                    vx: Math.cos(rad) * (player.power / 2.5),
                    vy: -Math.sin(rad) * (player.power / 2.5),
                    type: wp.type, wp: wp, active: true
                });
            }
            updateUI();
        }

        function updatePhysics() {
            if (state === 'aiming') {
                if (turn === 1) {
                    if (keys['KeyW']) p1.angle = Math.min(180, p1.angle + 1);
                    if (keys['KeyS']) p1.angle = Math.max(0, p1.angle - 1);
                    if (keys['KeyA']) p1.power = Math.max(10, p1.power - 1);
                    if (keys['KeyD']) p1.power = Math.min(100, p1.power + 1);
                } else {
                    if (keys['ArrowUp']) p2.angle = Math.min(180, p2.angle + 1);
                    if (keys['ArrowDown']) p2.angle = Math.max(0, p2.angle - 1);
                    if (keys['ArrowLeft']) p2.power = Math.max(10, p2.power - 1);
                    if (keys['ArrowRight']) p2.power = Math.min(100, p2.power + 1);
                }
                updateUI();
            }

            projectiles.forEach(p => {
                if (!p.active) return;

                if (p.type === 'laser') {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    if(p.life <= 0) p.active = false;
                } else {
                    p.vy += 0.25; // Gravity
                    p.x += p.vx;
                    p.y += p.vy;
                }

                let hit = false;
                if (p.y > 500) hit = true; // Ground
                if (p.x < -100 || p.x > canvas.width + 100 || p.y > canvas.height) p.active = false; // Out of bounds

                // Collisions with barriers
                barriers.forEach(b => {
                    if (b.hp > 0 && p.x > b.x && p.x < b.x + b.w && p.y > b.y && p.y < b.y + b.h) hit = true;
                });

                // Collisions with tanks
                [p1, p2].forEach(t => {
                    if (t.hp > 0 && p.x > t.x && p.x < t.x + t.w && p.y > t.y && p.y < t.y + t.h) hit = true;
                });

                if (hit && p.active) {
                    p.active = false;
                    createExplosion(p.x, p.y, p.wp);

                    // Meteor shower effect - drops additional meteors from above
                    if (p.type === 'meteor' && !p.isSubMeteor) {
                        for(let i=0; i<6; i++) {
                            projectiles.push({
                                x: p.x - 150 + Math.random()*300,
                                y: -50 - Math.random()*200,
                                vx: (Math.random()-0.5)*3,
                                vy: 4 + Math.random()*6,
                                type: 'normal',
                                wp: p.wp,
                                active: true,
                                isSubMeteor: true
                            });
                        }
                    }
                }
            });

            projectiles = projectiles.filter(p => p.active);

            explosions.forEach(e => e.life -= 1);
            explosions = explosions.filter(e => e.life > 0);

            // Turn switching logic
            if (state === 'firing' && projectiles.length === 0 && explosions.length === 0) {
                turn = turn === 1 ? 2 : 1;
                state = 'aiming';
                updateUI();
            }
        }

        function createExplosion(x, y, wp) {
            explosions.push({ x: x, y: y, radius: wp.radius, life: 35, maxLife: 35, color: wp.color });

            // Apply Damage
            let damageRadius = wp.radius;

            // Damage Tanks
            [p1, p2].forEach(t => {
                if (t.hp <= 0) return;
                let cx = t.x + t.w/2;
                let cy = t.y + t.h/2;
                let dist = Math.hypot(cx - x, cy - y);
                if (dist < damageRadius + 20) {
                    let dmg = Math.floor(wp.damage * (1 - dist/(damageRadius+20)));
                    if (dmg > 0) t.hp = Math.max(0, t.hp - dmg);
                }
            });

            // Damage Barriers
            barriers.forEach(b => {
                if (b.hp <= 0) return;
                let cx = b.x + b.w/2;
                let cy = b.y + b.h/2;
                let dist = Math.hypot(cx - x, cy - y);
                if (dist < damageRadius + 30) {
                    let dmg = Math.floor(wp.damage * (1 - dist/(damageRadius+30)));
                    if (dmg > 0) b.hp = Math.max(0, b.hp - dmg);
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw ground
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(0, 500, canvas.width, 50);

            // Ground decorative grass bits
            ctx.fillStyle = '#388E3C';
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath();
                ctx.moveTo(i, 500);
                ctx.lineTo(i+5, 490);
                ctx.lineTo(i+10, 500);
                ctx.fill();
            }

            // Draw barriers
            barriers.forEach(b => {
                if (b.hp > 0) {
                    // Crate effect
                    ctx.fillStyle = b.color;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                    ctx.strokeStyle = '#3E2723';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(b.x, b.y, b.w, b.h);

                    // HP Bar
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(b.x, b.y - 12, b.w, 6);
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(b.x, b.y - 12, b.w * (b.hp/b.maxHp), 6);
                }
            });

            // Draw tanks
            [p1, p2].forEach(t => {
                if (t.hp <= 0) return;
                ctx.save();
                ctx.translate(t.x + t.w/2, t.y + t.h);

                // Barrel
                ctx.save();
                ctx.rotate(-t.angle * Math.PI / 180);
                ctx.fillStyle = '#424242';
                ctx.fillRect(0, -6, 35, 12);
                ctx.fillStyle = '#212121'; // Barrel tip
                ctx.fillRect(30, -8, 8, 16);
                ctx.restore();

                // Tank Body Top
                ctx.fillStyle = t.color;
                ctx.beginPath();
                ctx.moveTo(-t.w/2 + 5, -t.h);
                ctx.lineTo(t.w/2 - 5, -t.h);
                ctx.lineTo(t.w/2, -t.h/2);
                ctx.lineTo(-t.w/2, -t.h/2);
                ctx.fill();

                // Tank Body Base
                ctx.fillStyle = '#333'; // Treads
                ctx.beginPath();
                ctx.roundRect(-t.w/2 - 5, -t.h/2, t.w + 10, t.h/2, 5);
                ctx.fill();

                // Wheels
                ctx.fillStyle = '#9E9E9E';
                for(let i = -t.w/2; i < t.w/2; i+=12) {
                    ctx.beginPath();
                    ctx.arc(i + 5, -t.h/4, 4, 0, Math.PI*2);
                    ctx.fill();
                }

                ctx.restore();
            });

            // Draw projectiles
            projectiles.forEach(p => {
                if (p.type === 'laser') {
                    ctx.strokeStyle = p.wp.color;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx*1.5, p.y - p.vy*1.5);
                    ctx.stroke();
                    // Glow
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.type === 'nuke' ? 8 : 5, 0, Math.PI*2);
                    ctx.fillStyle = p.wp.color;
                    ctx.fill();
                    // Trail
                    ctx.beginPath();
                    ctx.arc(p.x - p.vx*0.5, p.y - p.vy*0.5, 3, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.fill();
                }
            });

            // Draw explosions
            explosions.forEach(e => {
                ctx.beginPath();
                let r = e.radius * (1 - Math.pow(e.life/e.maxLife - 1, 2)); // Ease out
                ctx.arc(e.x, e.y, r, 0, Math.PI*2);

                let gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.2, '#FFFF00');
                gradient.addColorStop(0.6, e.color);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.fillStyle = gradient;
                ctx.globalAlpha = e.life / e.maxLife;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            });

            // Game Over Text
            if (p1.hp <= 0 || p2.hp <= 0) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 60px Segoe UI';
                ctx.textAlign = 'center';
                let winner = p1.hp > 0 ? "Player 1" : (p2.hp > 0 ? "Player 2" : "Draw");
                ctx.fillText(winner + " Wins!", canvas.width/2, canvas.height/2);
                ctx.font = '24px Segoe UI';
                ctx.fillStyle = '#fff';
                ctx.fillText("Refresh the page to play again", canvas.width/2, canvas.height/2 + 50);
            }
        }

        function updateUI() {
            document.getElementById('p1-hp').innerText = p1.hp;
            document.getElementById('p1-power').innerText = p1.power;
            document.getElementById('p1-angle').innerText = p1.angle;

            let wp1 = weapons[p1.weaponIdx];
            let el1 = document.getElementById('p1-weapon');
            el1.innerText = wp1.name;
            el1.style.background = wp1.bg;

            document.getElementById('p2-hp').innerText = p2.hp;
            document.getElementById('p2-power').innerText = p2.power;
            document.getElementById('p2-angle').innerText = p2.angle;

            let wp2 = weapons[p2.weaponIdx];
            let el2 = document.getElementById('p2-weapon');
            el2.innerText = wp2.name;
            el2.style.background = wp2.bg;

            let turnEl = document.getElementById('turn-display');
            if (state === 'aiming') {
                turnEl.innerText = `Player ${turn}'s Turn`;
                turnEl.style.color = turn === 1 ? p1.color : p2.color;
            } else {
                turnEl.innerText = `FIRE IN THE HOLE!`;
                turnEl.style.color = "#FF9800";
            }
        }

        function loop() {
            updatePhysics();
            draw();
            requestAnimationFrame(loop);
        }

        updateUI();
        loop();
    </script>
</body>
</html>
