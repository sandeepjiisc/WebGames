<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Bangers', cursive;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #canvas1 {
            display: block;
            background: url('space_flight_dep/background1920x1080.jpg');
            background-size: cover;
            background-position: center;
        }
        .controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .controls button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Bangers';
            font-size: 20px;
        }
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 100;
        }
        .movement-controls {
            display: flex;
            gap: 20px;
        }
        .mobile-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            user-select: none;
            touch-action: manipulation;
        }
        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.5);
        }
        #btn-fire {
            background: rgba(255, 0, 0, 0.4);
            border-color: #ff4444;
            width: 90px;
            height: 90px;
        }
        .assets {
            display: none;
        }

        @media screen and (orientation: landscape) {
            #mobile-controls {
                bottom: 15px;
            }
        }
    
    </style>
</head>
<body>
    <canvas id="canvas1"></canvas>

    <div class="controls">
        <button id="fullScreenButton">F</button>
        <button id="resetButton">R</button>
    </div>

    <div id="mobile-controls">
        <div class="movement-controls">
            <div class="mobile-btn" id="btn-left">⬅️</div>
            <div class="mobile-btn" id="btn-right">➡️</div>
        </div>
        <div class="mobile-btn" id="btn-fire">🔥</div>
    </div>

    <div class="assets">
        <img src="space_flight_dep/crew.jpg" id="crew">
        <img src="space_flight_dep/crewSprite.jpg" id="crewSprite">
        <img src="space_flight_dep/beetlemorph.jpg" id="beetlemorph">
        <img src="space_flight_dep/lobstermorph.jpg" id="lobstermorph">
    </div>
    
    <script src="space_flight_dep/enemy.js"></script>
    <script src="space_flight_dep/main.js"></script>
</body>
</html>
